version: 2
project_name: theclose-pp-cli
changelog:
  disable: true
builds:
  - id: theclose-pp-cli
    main: ./cmd/theclose-pp-cli
    binary: theclose-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X theclose-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: theclose-pp-mcp
    main: ./cmd/theclose-pp-mcp
    binary: theclose-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: theclose-pp-cli
    repository:
      owner: cathrynlavery
      name: homebrew-tap
    homepage: "https://github.com/cathrynlavery/theclose-pp-cli"
    description: "Agent-facing API for The Close. Use scoped bearer tokens for transaction, field, document, task, and event workflows."
    install: |
      bin.install "theclose-pp-cli"
      bin.install "theclose-pp-mcp"
