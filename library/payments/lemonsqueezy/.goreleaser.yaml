version: 2
project_name: lemonsqueezy-pp-cli
changelog:
  disable: true
builds:
  - id: lemonsqueezy-pp-cli
    main: ./cmd/lemonsqueezy-pp-cli
    binary: lemonsqueezy-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/payments/lemonsqueezy/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: lemonsqueezy-pp-mcp
    main: ./cmd/lemonsqueezy-pp-mcp
    binary: lemonsqueezy-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: lemonsqueezy-pp-cli
    repository:
      owner: jcastillo725
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Lemon Squeezy resource, plus a local SQLite mirror that surfaces MRR, churn, license seats"
    install: |
      bin.install "lemonsqueezy-pp-cli"
      bin.install "lemonsqueezy-pp-mcp"
