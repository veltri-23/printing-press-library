          enum:
            - app
          type: string
        id:
          description: The id of the app
          nullable: false
          type: string
          minLength: 1
          maxLength: 255
          example: app1a2b3c4
        name:
          description: The name of the app
          nullable: false
          type: string
          minLength: 1
          maxLength: 255
        created_at:
          description: The date when the app was created in ms since epoch
          nullable: false
          type: integer
          format: int64
          example: 1658399423658
        type:
          description: The platform of the app
          nullable: false
          type: string
          enum:
            - app_store
          example: app_store
        project_id:
          description: The id of the project
          nullable: false
          type: string
          minLength: 1
          maxLength: 255
          example: proj1a2b3c4
        app_store:
          description: App Store type details
          type: object
          required:
            - bundle_id
            - app_store_connect_api_key_configured
            - subscription_key_configured
          nullable: false
          additionalProperties: true
          properties:
            bundle_id:
              description: The bundle ID of the app
              type: string
              nullable: false
              minLength: 1
              maxLength: 256
            app_store_connect_api_key_configured:
              description: Whether App Store Connect API key credentials are configured.
              type: boolean
              nullable: false
              example: true
            subscription_key_configured:
              description: >-
                Whether In-App Purchase subscription key credentials are
                configured.
              type: boolean
              nullable: false
              example: true
      additionalProperties: true
    AppStoreAppCreate:
      type: object
      required:
        - name
        - type
        - app_store
      properties:
        name:
          description: The name of the app
          type: string
          minLength: 1
          maxLength: 255
          nullable: false
        type:
          description: >
            The platform of the app.

            Mac App Store is disabled by default. See [Legacy Mac
            Apps](https://www.revenuecat.com/docs/legacy-mac-apps) for more
            details.
          type: string
          enum:
            - app_store
          nullable: false
        app_store:
          description: App Store type details. Should only be used when type is app_store.
          type: object
          required:
            - bundle_id
          nullable: false
          properties:
            bundle_id:
              description: The bundle ID of the app
              type: string
              minLength: 1
              maxLength: 256
              nullable: false
            shared_secret:
              description: The shared secret of the app
              type: string
              minLength: 32
              maxLength: 32
              nullable: false
            subscription_private_key:
              description: >
                PKCS /#8 In App Key downloaded from App Store Connect in PEM
                format. Copy the contents

                of the file in this field. See instructions on how to get it
                in: 

                https://www.revenuecat.com/docs/in-app-purchase-key-configuration
              type: string
              minLength: 1
              maxLength: 4500
              nullable: false
            subscription_key_id:
              description: >-
                In App Key id. The ID of the downloaded in app key. You can get
                it from App Store Connect
              type: string
              minLength: 1
              maxLength: 32
              nullable: false
            subscription_key_issuer:
              description: >-
                The key Issuer id. See instructions on how to obtain this in:
                https://www.revenuecat.com/docs/in-app-purchase-key-configuration#3-providing-the-issuer-id-to-revenuecat 
              type: string
              minLength: 1
              maxLength: 36
              nullable: false
            app_store_connect_api_key:
              description: >
                App Store Connect API Key downloaded from App Store Connect in
                PEM format. Copy the contents

                of the file in this field. This is optional and used for
                advanced features like product imports.
              type: string
              minLength: 1
              maxLength: 4500
              nullable: false
            app_store_connect_api_key_id:
              description: >-
                App Store Connect API Key ID. The ID of the downloaded API key.
                You can get it from App Store Connect.
              type: string
              minLength: 1
              maxLength: 36
              nullable: false
            app_store_connect_api_key_issuer:
              description: App Store Connect API Key Issuer ID.
              type: string
              minLength: 1
              maxLength: 36
              nullable: false
            app_store_connect_vendor_number:
              description: >-
                Your vendor number from App Store Connect. Required for some
                features like financial reports.
              type: string
              minLength: 1
              maxLength: 20
              nullable: false
          additionalProperties: false
      additionalProperties: false
    AuditLog:
      type: object
      required:
        - id
        - project_id
        - action_type
        - target_type
        - target_identifier
        - actor_type
        - actor_identifier
        - occurred_at
        - additional_data
        - object
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - audit_log
          type: string
        id:
          type: string
          maxLength: 255
          example: log1ab2c3d4e5
        project_id:
          nullable: false
          description: ID of the project to which the audit log belongs.
          minLength: 1
          maxLength: 20
          type: string
          example: proj1ab2c3d4
        action_type:
          type: string
          description: Action that was performed.
          example: project_name_updated
        target_type:
          type: string
          description: Type of the target on which the action was performed.
          example: project
        target_identifier:
          type: string
          description: Identifier of the action target.
          example: proj1ab2c3d4
        actor_type:
          type: string
          description: Type of actor that performed the action.
          enum:
            - user
            - system
            - api_key
            - oauth_client
        actor_identifier:
          type: string
          description: Identifier of the actor that performed the action.
          example: user_abc123
        occurred_at:
          nullable: false
          description: Timestamp when the action occurred, in milliseconds since epoch.
          type: integer
          format: int64
          example: 1713297600000
        additional_data:
          type: object
          description: Additional metadata associated with the audit log.
          additionalProperties: true
      additionalProperties: false
    AuthenticatedManagementUrl:
      type: object
      required:
        - management_url
        - object
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - authenticated_management_url
          type: string
        management_url:
          description: >-
            A secure URL that provides temporary access to the subscription
            management portal. For RC Billing subscriptions, this is a
            single-use magic link to the RevenueCat customer portal. For Paddle
            subscriptions, this is a short-lived authenticated Paddle Customer
            Portal URL when the API key has the Customer portal session (Write)
            permission and Paddle returns the required management URLs;
            otherwise a non-authenticated URL (customer signs in via email) or
            `null` if no URL can be generated.
          nullable: true
          type: string
          example: >-
            https://billing.revenuecat.com/app1a2b3c4/sub1ab2c3d4e5?token=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
      additionalProperties: false
    ChartAnnotation:
      type: object
      description: A chart annotation marking a significant event on charts.
      required:
        - object
        - id
        - description
        - start_date
        - end_date
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          type: string
          enum:
            - chart_annotation
          example: chart_annotation
        id:
          description: The ID of the chart annotation.
          type: string
          example: chartannot1a2b3c
        description:
          description: Human-readable description of the event this annotation represents.
          type: string
          example: App version 2.0 released
        start_date:
          description: The start date of the annotated period (ISO 8601 date format).
          type: string
          format: date
          example: '2024-01-15'
        end_date:
          description: >-
            The end date of the annotated period (ISO 8601 date format), or null
            if the annotation is a single-day event.
          type: string
          format: date
          nullable: true
          example: '2024-01-20'
      additionalProperties: false
    ChartData:
      type: object
      description: Chart data response containing time-series data and metadata
      required:
        - object
        - category
        - display_type
        - display_name
        - description
        - resolution
        - values
        - yaxis
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - chart_data
          type: string
        category:
          description: Category the chart belongs to
          type: string
          example: revenue
        display_type:
          description: Type of chart visualization
          type: string
          example: line
        display_name:
          description: Human-readable name of the chart
          type: string
          example: Revenue
        description:
          description: Description of what the chart shows
          type: string
        documentation_link:
          description: Link to documentation for this chart
          nullable: true
          type: string
        last_computed_at:
          description: Timestamp when the chart data was last computed (ms since epoch)
          nullable: true
          type: integer
          format: int64
        start_date:
          description: Start date of the data range (ms since epoch)
          nullable: true
          type: integer
          format: int64
        end_date:
          description: End date of the data range (ms since epoch)
          nullable: true
          type: integer
          format: int64
        yaxis_currency:
          description: Currency used for monetary values
          type: string
          example: USD
        filtering_allowed:
          description: Whether filtering is allowed for this chart
          type: boolean
        segmenting_allowed:
          description: Whether segmentation is allowed for this chart
          type: boolean
        resolution:
          description: Time resolution of the data points
          type: string
          enum:
            - day
            - week
            - month
            - quarter
            - year
          example: day
        values:
          description: >-
            Chart data points. Structure varies by chart type - can be arrays of
            numbers or objects with timestamps and values. Returned as an empty
            array when aggregate operations are requested.
          type: array
          items:
            oneOf:
              - type: array
                items:
                  type: number
                  nullable: true
              - type: object
                additionalProperties: true
        summary:
          description: Summary statistics for the chart data
          nullable: true
          type: object
          additionalProperties: true
        yaxis:
          description: Y-axis configuration including unit
          type: string
          example: $
        segments:
          description: Segment information when data is segmented
          nullable: true
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              display_name:
                type: string
        segments_limit:
          description: Maximum number of segments returned
          nullable: true
          type: integer
        measures:
          description: Measure definitions for the chart (v3 charts)
          nullable: true
          type: array
          items:
            type: object
            additionalProperties: true
        user_selectors:
          description: >-
            Currently selected values for user-configurable selectors (keyed by
            selector name)
          nullable: true
          type: object
          additionalProperties:
            type: string
        unsupported_params:
          description: Parameters that were provided but not supported
          nullable: true
          type: object
          properties:
            filters:
              type: array
              items:
                type: string
            segment:
              type: string
              nullable: true
        annotations:
          description: >-
            Chart annotations for the project, filtered to the chart's date
            window. Only present when include_annotations=true is passed in the
            request.
          type: array
          items:
            $ref: '#/components/schemas/ChartAnnotation'
      additionalProperties: false
    ChartFilterOption:
      type: object
      description: A filter option for a chart
      required:
        - object
        - id
        - display_name
        - options
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - chart_filter_option
          type: string
        id:
          description: Unique identifier for the filter
          type: string
          example: country
        display_name:
          description: Human-readable name for the filter
          type: string
          example: Country
        group_display_name:
          description: Group name for organizing filter options
          nullable: true
          type: string
          example: Geography
        options:
          description: Available values for this filter
          type: array
          items:
            type: object
            required:
              - id
              - display_name
            additionalProperties: true
            properties:
              id:
                description: Unique identifier for the option value
                type: string
                example: US
              display_name:
                description: Human-readable name for the option value
                type: string
                example: United States
      additionalProperties: true
    ChartOptions:
      type: object
      description: Available options for filtering and segmenting a chart
      required:
        - object
        - resolutions
        - segments
        - filters
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - chart_options
          type: string
        resolutions:
          description: Available time resolutions for the chart
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: Resolution ID to use in requests
              display_name:
                type: string
                description: Human-readable name
            required:
              - id
              - display_name
          example:
            - id: '0'
              display_name: day
            - id: '1'
              display_name: week
            - id: '2'
              display_name: month
        segments:
          description: Available segmentation options
          type: array
          items:
            $ref: '#/components/schemas/ChartSegmentOption'
        filters:
          description: Available filter options
          type: array
          items:
            $ref: '#/components/schemas/ChartFilterOption'
        user_selectors:
          description: User-configurable selectors for the chart (keyed by selector name)
          nullable: true
          type: object
          additionalProperties:
            type: object
            properties:
              default:
                type: string
                description: Default value for the selector
              display_name:
                type: string
                description: Human-readable name
              options:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    display_name:
                      type: string
                  required:
                    - id
                    - display_name
      additionalProperties: false
    ChartSegmentOption:
      type: object
      description: A segmentation option for a chart
      required:
        - object
        - id
        - display_name
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - chart_segment_option
          type: string
        id:
          description: Unique identifier for the segment option
          type: string
          example: country
        display_name:
          description: Human-readable name for the segment option
          type: string
          example: Country
        group_display_name:
          description: Group name for organizing segment options
          nullable: true
          type: string
          example: Geography
      additionalProperties: true
    Collaborator:
      type: object
      required:
        - id
        - email
        - role
        - accepted_at
        - has_mfa
        - object
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - collaborator
          type: string
        id:
          description: The id of the collaborator
          nullable: false
          type: string
          minLength: 1
          example: collab1a2b3c4d5
        name:
          description: The name of the collaborator
          nullable: true
          type: string
          example: John Doe
        email:
          description: The email address of the collaborator
          nullable: false
          type: string
          format: email
          example: john.doe@example.com
        role:
          description: The role of the collaborator
          nullable: false
          type: string
          example: admin
        accepted_at:
          description: >-
            The date when the collaborator accepted the invitation in ms since
            epoch
          nullable: true
          type: integer
          format: int64
          example: 1658399423658
        has_mfa:
          description: Whether the collaborator has 2FA enabled
          nullable: false
          type: boolean
          example: true
      additionalProperties: false
