    EntityReferencesArchivedEntitiesError:
      description: >-
        Error returned when attempting to make an entity active, but that entity
        references other entities that are currently inactive (archived). The
        `referenced_object_ids` field lists the IDs of the inactive entities
        that must be made active first.
      allOf:
        - $ref: '#/components/schemas/Error'
        - type: object
          required:
            - referenced_object_ids
          properties:
            type:
              type: string
              enum:
                - entity_references_archived_entities
            referenced_object_ids:
              description: >-
                The IDs of the archived (inactive) entities that need to be made
                active before this operation can succeed.
              type: array
              items:
                type: string
              example:
                - prodabcd1234
                - prodwxyz5678
    Environment:
      type: string
      description: The store environment
      example: production
      nullable: false
      enum:
        - production
        - sandbox
    Error:
      type: object
      required:
        - type
        - message
        - retryable
        - object
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - error
          type: string
          example: error
        type:
          description: The error type
          type: string
          nullable: false
          enum:
            - parameter_error
            - resource_already_exists
            - resource_missing
            - idempotency_error
            - rate_limit_error
            - authentication_error
            - authorization_error
            - store_error
            - server_error
            - resource_locked_error
            - unprocessable_entity_error
            - invalid_request
            - entity_references_archived_entities
          example: parameter_error
        param:
          description: >-
            If the error is parameter-specific, the parameter related to the
            error
          type: string
          nullable: true
          example: customer_id
        doc_url:
          description: A URL to more information about the error reported
          type: string
          nullable: false
          example: https://errors.rev.cat/parameter-error
        message:
          type: string
          description: A message describing the reason of the error
          nullable: false
          example: id shouldn't be longer than 1,500 characters
        retryable:
          description: Indicates if the error is retryable or not
          type: boolean
          nullable: false
          example: false
        backoff_ms:
          description: >-
            The ms the client should wait before retrying the request. Only
            present for retryable errors.
          type: integer
          nullable: true
          example: null
        referenced_object_ids:
          description: >-
            The IDs of related objects relevant to the error, such as the
            archived entities that need to be made active before the operation
            can succeed.
          type: array
          items:
            type: string
          example:
            - prodabcd1234
            - prodwxyz5678
      additionalProperties: false
    ExperimentEnrollment:
      type: object
      required:
        - id
        - name
        - variant
        - object
      nullable: true
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - experiment_enrollment
          type: string
        id:
          type: string
          maxLength: 1500
        name:
          type: string
          maxLength: 1500
        variant:
          nullable: false
          description: >-
            The variant of the Experiment that the Customer was or is assigned
            to, where 'a' represents the Control, and 'b' represents the
            Treatment.
          minLength: 1
          maxLength: 1
          type: string
          example: a
      additionalProperties: false
    ExtendSubscriptionByDuration:
      type: object
      additionalProperties: false
      required:
        - extend_by_days
      properties:
        extend_by_days:
          type: integer
          minimum: 1
          description: |
            Number of days to extend the current billing period by.
            For Apple Store subscriptions, the maximum allowed value is 90.
          example: 14
        extend_reason_code:
          type: string
          enum:
            - undeclared
            - customer_satisfaction
            - other
            - service_issue_or_outage
          description: |
            Reason for the extension. Required for Apple Store subscriptions;
            ignored for Google Play and Web Billing subscriptions.
          example: customer_satisfaction
    ExtendSubscriptionUntilDate:
      type: object
      additionalProperties: false
      required:
        - extend_until_ms
      properties:
        extend_until_ms:
          type: integer
          format: int64
          description: >
            Absolute epoch timestamp (in milliseconds) to which the current
            billing

            period should be extended. Must be after the subscription's current

            `current_period_ends_at`. For Apple Store subscriptions, the
            resulting

            extension cannot exceed 90 days.
          example: 1735689600000
        extend_reason_code:
          type: string
          enum:
            - undeclared
            - customer_satisfaction
            - other
            - service_issue_or_outage
          description: |
            Reason for the extension. Required for Apple Store subscriptions;
            ignored for Google Play and Web Billing subscriptions.
          example: customer_satisfaction
