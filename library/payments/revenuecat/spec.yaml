    InvoiceLineItem:
      type: object
      required:
        - product_identifier
        - product_display_name
        - product_duration
        - quantity
        - unit_amount
        - object
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - invoice.line_item
          type: string
