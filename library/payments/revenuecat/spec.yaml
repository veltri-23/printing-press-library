    Subscription:
      type: object
      required:
        - id
        - customer_id
        - original_customer_id
        - product_id
        - starts_at
        - current_period_starts_at
        - current_period_ends_at
        - ends_at
        - gives_access
        - pending_payment
        - auto_renewal_status
        - status
        - total_revenue_in_usd
        - presented_offering_id
        - entitlements
        - environment
        - store
        - store_subscription_identifier
        - ownership
        - management_url
        - object
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - subscription
          type: string
        id:
          description: The ID of the subscription (generated by RevenueCat)
          nullable: false
          type: string
          minLength: 1
          maxLength: 255
          example: sub1ab2c3d4e5
        customer_id:
          description: The ID of the customer
          nullable: false
          type: string
          minLength: 1
          maxLength: 1500
          example: 19b8de26-77c1-49f1-aa18-019a391603e2
        original_customer_id:
          description: >-
            The ID of the original customer. Relevant for subscriptions that
            were transferred from one customer to another
          nullable: false
          type: string
          minLength: 1
          maxLength: 1500
          example: 19b8de26-77c1-49f1-aa18-019a391603e2
        product_id:
          description: >-
            The RevenueCat ID of the product that the customer is subscribed to.
            Exists for all store types except for promotional.
          nullable: true
          minLength: 1
          maxLength: 255
          type: string
          example: prod1a2b3c4d5e
        starts_at:
          description: The date when the subscription originally started in ms since epoch
          nullable: false
          type: integer
          format: int64
          example: 1658399423658
        current_period_starts_at:
          description: >-
            The date when the subscription billing period started in ms since
            epoch
          nullable: false
          type: integer
          format: int64
          example: 1658399423658
        current_period_ends_at:
          description: >-
            The date when the subscription billing period is expected to end in
            ms since epoch. Can be null if the subscription is paused until an
            indefinite date.
          nullable: true
          type: integer
          format: int64
          example: 1658399423658
        ends_at:
          description: >-
            The date when the latest subscription billing period is expected to
            end in ms since epoch. It will only be different from
            `current_period_ends_at` if `auto_renewal_status` is
            `has_already_renewed`, in which case it indicates the end of the
            next billing period. Can be null if the subscription is paused until
            an indefinite date.
          nullable: true
          type: integer
          format: int64
          example: 1658399423658
        gives_access:
          description: >-
            Determines whether the customer should currently be provided access
            to the entitlements associated with the subscription
          nullable: false
          type: boolean
          example: true
        pending_payment:
          description: >-
            Determines whether there is a pending payment associated with the
            subscription
          nullable: false
          type: boolean
          example: true
        auto_renewal_status:
          description: >
            The auto renewal status of a subscription.<br><br>Possible
            values:<br>• `will_renew`: the subscription is currently set to
            automatically renew<br>• `will_not_renew`: the subscription is
            currently set to expire at the end of the period<br>•
            `will_change_product`: the subscription is currently set to change
            product at the end of the period (which might start a new
            subscription)<br>• `will_pause`: the subscription is currently set
            to pause at the end of the current period<br>•
            `requires_price_increase_consent`: the subscription will expire at
            the end of the current period unless the customer consents to the
            price increase<br>• `has_already_renewed`: the customer has already
            been charged for the upcoming renewal (so the renewal will take
            place even if the customer opts out of auto-renewal before the end
            of the period)
          nullable: false
          type: string
          enum:
            - will_renew
            - will_not_renew
            - will_change_product
            - will_pause
            - requires_price_increase_consent
            - has_already_renewed
          example: will_renew
        status:
          description: >
            The status of a subscription. Please note that additional states
            might be added in the future. To determine whether or not a
            subscription currently provides access to any associated
            entitlements, use the _gives_access_ field.<br><br>Possible
            values:<br>• `trialing`: the subscription is in a free trial
            period<br>• `active`: the subscription is active, in a paid
            period<br>• `expired`: the subscription is expired and no longer
            active<br>• `in_grace_period`: the subscription is past its regular
            expiry date and experienced a billing issue, but is currently still
            in an access-granting grace period<br>• `in_billing_retry`: the
            subscription has experienced a billing issue. Billing is being
            retried, access is suspended.-paused: the subscription is currently
            paused and should not provide access.<br>• `unknown`: the
            subscription is in an unknown state. Refer to the _gives_access_
            field to determine whether or not to grant access.<br>•
            `incomplete`: the subscription is in an incomplete state, maybe due
            to incorrect billing details or because it's scheduled to start in
            the future.
          nullable: false
          type: string
          enum:
            - trialing
            - active
            - expired
            - in_grace_period
            - in_billing_retry
            - paused
            - unknown
            - incomplete
          example: trialing
        total_revenue_in_usd:
          description: Total revenue generated by a subscription in USD
          nullable: false
          oneOf:
            - $ref: '#/components/schemas/MonetaryAmount'
        presented_offering_id:
          description: >-
            The ID of the offering the customer saw when purchasing the
            subscription
          nullable: true
          type: string
          minLength: 1
          maxLength: 200
          example: ofrnge1a2b3c4d5
        entitlements:
          required:
            - items
            - next_page
            - object
            - url
          title: EntitlementList
          type: object
          properties:
            object:
              description: >-
                String representing the object's type. Objects of the same type
                share the same value. Always has the value `list`.
              enum:
                - list
              type: string
            items:
              description: Details about each object.
              items:
                $ref: '#/components/schemas/Entitlement'
              type: array
            next_page:
              description: >-
                URL to access the next page of the customer's entitlements. If
                not present / null, there is no next page
              type: string
              nullable: true
              example: >-
                /v2/projects/proj1ab2c3d4/subscriptions/sub1a2b3c4d5e/entitlements?status=active&starting_after=entlab21dac
            url:
              description: The URL where this list can be accessed.
              maxLength: 5000
              type: string
              example: >-
                /v2/projects/proj1ab2c3d4/subscriptions/sub1a2b3c4d5e/entitlements
        environment:
          description: The store environment
          nullable: false
          oneOf:
            - $ref: '#/components/schemas/Environment'
        store:
          description: Store the subscription belongs to
          nullable: false
          type: string
          enum:
            - amazon
            - app_store
            - mac_app_store
            - play_store
            - promotional
            - stripe
            - rc_billing
            - external
            - roku
            - paddle
            - paypal
            - galaxy
            - test_store
          example: amazon
        store_subscription_identifier:
          description: >-
            The subscription identifier as per the store (e.g, for Apple App
            Store, the `transaction_id` of the latest transaction of the
            subscription, or for Google Play Store, the Order ID of the last
            renewal of the subscription)
          nullable: false
          type: string
          minLength: 1
          maxLength: 255
          example: 12345678
        ownership:
          description: Ownership of the subscription
          nullable: false
          oneOf:
            - $ref: '#/components/schemas/Ownership'
        pending_changes:
          description: >-
            Expected changes to the subscription that will occur at the end of
            the current period. Present when the subscription has a pending
            product change, has already renewed for the next period, or has a
            failed upcoming renewal. Only fields that differ from the current
            subscription state are included.
          nullable: true
          type: object
          additionalProperties: true
          properties:
            product:
              description: The product that will be active as of the next renewal
              nullable: true
              allOf:
                - $ref: '#/components/schemas/Product'
            current_period_starts_at:
              description: >-
                Expected start of the next billing period in ms since epoch.
                Omitted when unchanged from the current subscription.
              nullable: true
              type: integer
              format: int64
              example: 1658399423658
            current_period_ends_at:
              description: >-
                Expected end of the next billing period in ms since epoch.
                Omitted when unchanged from the current subscription.
              nullable: true
              type: integer
              format: int64
              example: 1660991423658
            store_subscription_identifier:
              description: >-
                Expected store subscription identifier for the next period.
                Omitted when unchanged from the current subscription.
              nullable: true
              type: string
              minLength: 1
              maxLength: 255
              example: 12345679
            auto_renewal_status:
              description: >-
                Expected auto renewal status for the next period. Omitted when
                unchanged from the current subscription.
              nullable: true
              type: string
              enum:
                - will_renew
                - will_not_renew
                - will_change_product
                - will_pause
                - requires_price_increase_consent
                - has_already_renewed
              example: will_renew
            status:
              description: >-
                Expected subscription status for the next period. Omitted when
                unchanged from the current subscription.
              nullable: true
              type: string
              enum:
                - trialing
                - active
                - expired
                - in_grace_period
                - in_billing_retry
                - paused
                - unknown
                - incomplete
              example: active
            pending_payment:
              description: >-
                Expected pending payment flag for the next period. Omitted when
                unchanged from the current subscription.
              nullable: true
              type: boolean
              example: false
            gives_access:
              description: >-
                Expected access flag for the next period. Omitted when unchanged
                from the current subscription.
              nullable: true
              type: boolean
              example: true
        country:
          $ref: '#/components/schemas/Country'
          description: Billing country in ISO alpha 2 code
          nullable: true
        management_url:
          description: The URL to manage the subscription
          nullable: true
          type: string
          example: https://apps.apple.com/account/subscriptions
      additionalProperties: false
    SubscriptionProduct:
      type: object
      required:
        - duration
        - grace_period_duration
        - trial_duration
      nullable: true
      properties:
        duration:
          type: string
          pattern: >-
            ^(-?)P(?=\d|T\d)(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)([DW]))?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+(?:\.\d+)?)S)?)?$
          nullable: true
          description: The duration of the subscription in ISO-8601 standard
          example: P1M
        grace_period_duration:
          type: string
          pattern: >-
            ^(-?)P(?=\d|T\d)(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)([DW]))?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+(?:\.\d+)?)S)?)?$
          nullable: true
          description: The duration of the subscription's grace period in ISO-8601 standard
          example: P3D
        trial_duration:
          type: string
          pattern: >-
            ^(-?)P(?=\d|T\d)(?:(\d+)Y)?(?:(\d+)M)?(?:(\d+)([DW]))?(?:T(?:(\d+)H)?(?:(\d+)M)?(?:(\d+(?:\.\d+)?)S)?)?$
          nullable: true
          description: The duration of the subscription's trial period in ISO-8601 standard
          example: P1W
      additionalProperties: true
    SubscriptionTransaction:
      type: object
      required:
        - id
        - purchased_at
        - product_store_identifier
        - object
      additionalProperties: false
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - subscription_transaction
          type: string
        id:
          description: The ID of the subscription transaction in the store
          nullable: false
          type: string
          minLength: 1
          maxLength: 255
          example: GPA.0000-0000-0000-00000
        purchased_at:
          description: The date of the transaction in ms since epoch
          nullable: false
          type: integer
          format: int64
          example: 1658399423658
        product_store_identifier:
          description: The store identifier of the purchased product
          nullable: false
          type: string
          minLength: 1
          maxLength: 511
          example: com.example.product
        revenue_in_local_currency:
          description: >-
            The revenue generated by the transaction in the customer's purchased
            currency
          nullable: true
          oneOf:
            - $ref: '#/components/schemas/MonetaryAmount'
        revenue_in_usd:
          description: The revenue generated by the transaction in USD
          nullable: true
          oneOf:
            - $ref: '#/components/schemas/MonetaryAmount'
        expiration_date:
          description: The expiration date of the transaction in ms since epoch
          nullable: true
          type: integer
          format: int64
          example: 1658399423658
        effective_expiration_date:
          description: >-
            The effective expiration date of the transaction in ms since epoch,
            including potential grace period
          nullable: true
          type: integer
          format: int64
          example: 1658399423658
    TestStoreApp:
      type: object
      required:
        - object
        - id
        - name
        - type
        - created_at
        - project_id
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - app
          type: string
        id:
          description: The id of the app
          nullable: false
          type: string
          minLength: 1
          maxLength: 255
          example: app1a2b3c4
        name:
          description: The name of the app
          nullable: false
          type: string
          minLength: 1
          maxLength: 255
        created_at:
          description: The date when the app was created in ms since epoch
          nullable: false
          type: integer
          format: int64
          example: 1658399423658
        type:
          description: The platform of the app
          nullable: false
          type: string
          enum:
            - test_store
          example: test_store
        project_id:
          description: The id of the project
          nullable: false
          type: string
          minLength: 1
          maxLength: 255
          example: proj1a2b3c4
      additionalProperties: true
    Transfer:
      type: object
      title: TransferResult
      required:
        - source_customer
        - target_customer
      properties:
        source_customer:
          description: The original customer before the transfer
          $ref: '#/components/schemas/Customer'
        target_customer:
          description: The target customer after the transfer
          $ref: '#/components/schemas/Customer'
      additionalProperties: true
    UpdateWebhookIntegrationInput:
      type: object
      properties:
        name:
          description: The display name of the webhook integration
          type: string
          minLength: 1
          maxLength: 1500
          example: Customer updates webhook
        url:
          description: The URL RevenueCat will send webhook notifications to
          type: string
          format: uri
          maxLength: 5000
          example: https://hooks.example.com/revenuecat
        authorization_header:
          description: >-
            Optional authorization header that will be sent with webhook
            notifications
          type: string
          nullable: true
          maxLength: 5000
          example: Bearer 123456
        environment:
          description: The environment the webhook integration is configured for
          type: string
          nullable: true
          enum:
            - production
            - sandbox
            - null
        event_types:
          description: Event types that will trigger the webhook
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/WebhookEventType'
        app_id:
          description: The ID of the app the webhook integration is scoped to
          type: string
          nullable: true
          minLength: 1
          maxLength: 255
          example: app_1234567890abcdef
      additionalProperties: false
    VirtualCurrency:
      type: object
      required:
        - project_id
        - code
        - name
        - state
        - created_at
        - object
      properties:
        state:
          description: Whether the virtual currency is active or inactive (archived).
          nullable: false
          type: string
          enum:
            - active
            - inactive
          example: active
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - virtual_currency
          type: string
        project_id:
          description: ID of the project to which the virtual currency belongs
          nullable: false
          minLength: 1
          maxLength: 20
          type: string
          example: proj1ab2c3d4
        code:
          description: The unique code for this virtual currency
          nullable: false
          type: string
          minLength: 1
          maxLength: 10
          pattern: ^[a-zA-Z0-9_]+$
          example: GLD
        name:
          description: The display name of the virtual currency
          nullable: false
          type: string
          minLength: 1
          maxLength: 50
          example: Gold
        created_at:
          description: The date the virtual currency was created at in ms since epoch
          nullable: false
          type: integer
          format: int64
          example: 1658399423658
        description:
          description: Description of the virtual currency
          nullable: true
          type: string
          minLength: 1
          maxLength: 1500
          example: Gold currency used in the game
        product_grants:
          description: The grants that define how products grant this virtual currency
          nullable: true
          type: array
          items:
            $ref: '#/components/schemas/VirtualCurrencyProductGrant'
      additionalProperties: false
    VirtualCurrencyBalance:
      type: object
      title: VirtualCurrencyBalance
      required:
        - object
        - currency_code
        - balance
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - virtual_currency_balance
          type: string
        currency_code:
          description: The code of the virtual currency.
          type: string
        balance:
          description: The balance of the virtual currency.
          type: integer
        description:
          description: The description of the virtual currency.
          type: string
        name:
          description: The name of the virtual currency.
          type: string
      additionalProperties: false
    VirtualCurrencyProductGrant:
      type: object
      required:
        - object
        - product_ids
        - amount
        - trial_amount
        - expire_at_cycle_end
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the same value.
          enum:
            - virtual_currency.product_grant
          type: string
        product_ids:
          description: The list of product IDs that grant this virtual currency
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
            maxLength: 255
            example: prode1a2b3c4d5
        amount:
          description: The amount of virtual currency granted
          type: integer
          minimum: 1
          example: 100
        trial_amount:
          description: The amount of virtual currency granted during trial period
          nullable: false
          type: integer
          minimum: 0
          example: 0
        expire_at_cycle_end:
          description: Whether the grant expires at the end of the subscription cycle
          nullable: false
          type: boolean
          example: false
      additionalProperties: false
    VirtualCurrencyProductGrantInput:
      type: object
      required:
        - product_ids
        - amount
      properties:
        product_ids:
          description: The list of product IDs that grant this virtual currency
          type: array
          minItems: 1
          items:
            type: string
            minLength: 1
            maxLength: 255
            example: prode1a2b3c4d5
        amount:
          description: The amount of virtual currency granted
          type: integer
          minimum: 1
          example: 100
        trial_amount:
          description: The amount of virtual currency granted during trial period
          nullable: true
          type: integer
          minimum: 0
          example: 0
        expire_at_cycle_end:
          description: Whether the grant expires at the end of the subscription cycle
          nullable: true
          type: boolean
          example: false
      additionalProperties: false
    WebhookEventType:
      type: string
      description: The type of event that triggers the webhook
      example: initial_purchase
      enum:
        - initial_purchase
        - renewal
        - product_change
        - cancellation
        - billing_issue
        - non_renewing_purchase
        - uncancellation
        - transfer
        - subscription_paused
        - expiration
        - subscription_extended
        - invoice_issuance
        - temporary_entitlement_grant
        - refund_reversed
        - virtual_currency_transaction
    WebhookIntegration:
      type: object
      required:
        - id
        - name
        - url
        - project_id
        - object
        - created_at
        - app_id
        - environment
      properties:
        object:
          description: >-
            String representing the object's type. Objects of the same type
            share the

            same value.
          enum:
            - webhook_integration
          type: string
        id:
          description: The ID of the webhook integration
          type: string
          minLength: 1
          maxLength: 255
          example: wh_1234567890abcdef
        project_id:
          description: The ID of the project the webhook integration belongs to
          type: string
          minLength: 1
          maxLength: 255
          example: proj_1234567890abcdef
        name:
          description: The display name of the webhook integration
          type: string
          minLength: 1
          maxLength: 1500
          example: Customer updates webhook
        url:
          description: The URL RevenueCat will send webhook notifications to
          type: string
          format: uri
          maxLength: 5000
          example: https://hooks.example.com/revenuecat
        environment:
          description: >-
            The environment the webhook integration is configured for. Only
            events for the selected environment will be sent.
          type: string
          nullable: true
          enum:
            - production
            - sandbox
            - null
        event_types:
          description: >-
            Event types that will trigger the webhook. Only events for the
            selected event types will be sent.
          type: array
          nullable: true
          items:
            type: string
            description: >-
              The event type. Known values include: initial_purchase, renewal,
              product_change, cancellation, billing_issue,
              non_renewing_purchase, uncancellation, transfer,
              subscription_paused, expiration, subscription_extended,
              invoice_issuance, temporary_entitlement_grant, refund_reversed,
              virtual_currency_transaction. New event types may be added in the
              future.
            example: initial_purchase
        app_id:
          description: >-
            The ID of the app the webhook integration is scoped to. If not
            provided, the webhook integration will be scoped to all apps in the
            project.
          type: string
          nullable: true
          minLength: 1
          maxLength: 255
          example: app_1234567890abcdef
        created_at:
          description: >-
            The timestamp in ms since epoch when the webhook integration was
            created
          type: integer
          format: int64
          example: 1658399423658
      additionalProperties: false
  headers:
    RateLimitCurrentLimit:
      required: true
      description: The rate limit for this endpoint, expressed in requests per minute.
      schema:
        type: integer
      example: 30
    RateLimitCurrentUsage:
      required: true
      description: >-
        The current number of requests used for the current limit (including the
        current request).
      schema:
        type: integer
      example: 25
    RateLimitRetryAfter:
      required: true
      description: >-
        The number of seconds to wait before retrying a rate limited
        request.Only present when a request is rate limited.
      schema:
        type: integer
      example: 10
  responses:
    BadGateway:
      description: Bad gateway
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - server_error
            example:
              object: error
              type: server_error
              message: Upstream service returned an invalid response
              retryable: true
              doc_url: https://errors.rev.cat/server-error
              backoff_ms: 1000
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - parameter_error
                      - invalid_request
          examples:
            parameter_error:
              value:
                object: error
                type: parameter_error
                param: customer_id
                message: id is too long
                retryable: false
                doc_url: https://errors.rev.cat/parameter-error
            invalid_request:
              value:
                object: error
                type: invalid_request
                message: Content-Type not application/json
                retryable: false
                doc_url: https://errors.rev.cat/invalid-request
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - resource_already_exists
                      - idempotency_error
                      - invalid_request
          examples:
            resource_already_exists:
              value:
                object: error
                type: resource_already_exists
                message: Name is already taken
                retryable: false
                doc_url: https://errors.rev.cat/resource-already-exists
            idempotency_error:
              value:
                object: error
                type: idempotency_error
                message: Idempotency key already used for a different request
                retryable: false
                doc_url: https://errors.rev.cat/idempotency-error
            invalid_request:
              value:
                object: error
                type: invalid_request
                message: Request conflicts with the current resource state
                retryable: false
                doc_url: https://errors.rev.cat/invalid-request
    Forbidden:
      description: Access denied
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - authorization_error
            example:
              object: error
              type: authorization_error
              message: You're not authorized to access this resource
              retryable: false
              doc_url: https://errors.rev.cat/authorization-error
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - server_error
            example:
              object: error
              type: server_error
              message: There was an internal server error
              retryable: true
              doc_url: https://errors.rev.cat/server-error
              backoff_ms: 1000
    Locked:
      description: Locked
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - resource_locked_error
            example:
              object: error
              type: resource_locked_error
              message: The resource is currently being modified by a concurrent request
              retryable: true
              doc_url: https://errors.rev.cat/resource-locked-error
              backoff_ms: 1000
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - resource_missing
            example:
              object: error
              type: resource_missing
              message: Resource not found
              retryable: false
              doc_url: https://errors.rev.cat/resource-missing
    RateLimited:
      description: >-
        The request could not be completed because the rate limiting domain for
        this endpoint is currently at its limit for this project.
      headers:
        RevenueCat-Rate-Limit-Current-Usage:
          $ref: '#/components/headers/RateLimitCurrentUsage'
        RevenueCat-Rate-Limit-Current-Limit:
          $ref: '#/components/headers/RateLimitCurrentLimit'
        Retry-After:
          $ref: '#/components/headers/RateLimitRetryAfter'
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - rate_limit_error
            example:
              object: error
              type: rate_limit_error
              message: Rate limit exceeded
              retryable: true
              doc_url: https://errors.rev.cat/rate-limit-error
              backoff_ms: 1000
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - authentication_error
            example:
              object: error
              type: authentication_error
              message: Invalid API key
              retryable: false
              doc_url: https://errors.rev.cat/authentication-error
    UnprocessableEntity:
      description: Unprocessable entity
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/Error'
              - type: object
                properties:
                  type:
                    type: string
                    enum:
                      - unprocessable_entity_error
                      - parameter_error
                      - store_error
                      - entity_references_archived_entities
          examples:
            unprocessable_entity:
              value:
                object: error
                type: unprocessable_entity_error
                message: Cannot delete a product that has purchases
                retryable: false
                doc_url: https://errors.rev.cat/unprocessable-entity-error
            parameter_error:
              value:
                object: error
                type: parameter_error
                message: Date must in the future
                retryable: false
                doc_url: https://errors.rev.cat/parameter-error
            store_error:
              value:
                object: error
                type: store_error
                message: There was a problem on the App Store
                retryable: true
                doc_url: https://errors.rev.cat/store-error
                backoff_ms: 1000
            entity_references_archived_entities:
              value:
                object: error
                type: entity_references_archived_entities
                message: >-
                  This offering references inactive products. You will need to
                  make the products active first before making the offering
                  active.
                retryable: false
                doc_url: https://errors.rev.cat/entity-references-archived-entities
                referenced_object_ids:
                  - prodabcd1234
                  - prodwxyz5678
