  /projects/{project_id}/charts/{chart_name}:
    get:
      summary: Get chart data
      description: >-
        Returns time-series data for a specific chart.


        **Response Structure**


        The response includes:

        - Chart metadata (category, display_name, description)

        - Time boundaries (start_date, end_date, last_computed_at)

        - Data values (array of data points)

        - Summary statistics

        - Segment information (when segmented)


        **Chart Types**


        Different charts may return data in slightly different formats:

        - Standard charts: values as arrays of data points with timestamps

        - Cohort charts: values include cohort-specific data structures

        - Segmented charts: include segment information in the response


        **Filtering and Segmentation**


        Use the `/charts/{chart_name}/options` endpoint to discover available

        filters and segments for a specific chart before making requests.


        Filter parameters vary by chart and can be passed as additional query
        parameters.


        **Aggregation**


        Use `aggregate` to request summary-only output for supported charts.

        When `aggregate` is provided, `values` is returned as an empty array and

        `summary` includes only the requested aggregate operations.


        **Incomplete data**

        For the most recent periods, data may be flagged as incomplete, and may
        not be appropriate to use for analysis.
         This endpoint requires the following permission(s): <code>charts_metrics:charts:read</code>. This endpoint belongs to the <strong>Charts & Metrics</strong> domain, which has a default rate limit of <strong>15 requests per minute</strong>.
      operationId: get-chart-data
      x-revenuecat-rate-limiting-domain: charts_metrics
      x-scopes:
        - charts_metrics:charts:read
      x-release-status: public
      tags:
        - Charts & Metrics
      parameters:
        - name: project_id
          description: ID of the project
          required: true
          in: path
          schema:
            type: string
            maxLength: 255
            example: proj1ab2c3d4
        - name: chart_name
          description: >
            Name of the chart to retrieve:

            - actives: Active (paying) subscriptions 

            - actives_movement: Period-over-period delta of active (paying)
            subscriptions

            - actives_new: New paying subscriptions, including trial
            conversions, resubscriptions, and product changes

            - arr: Annual recurring revenue

            - churn: Churn rate: active and expired subscriptions per period

            - cohort_explorer: allows measuring the performance of various
            cohort definitions over time for revenue, retained subscriptions,
            and cohort LTV

            - conversion_to_paying: Conversion of new customers to paying

            - customers_new: Newly seen customers

            - ltv_per_customer: Realized LTV per customer, also known as ARPU,
            cohorted by first seen date

            - ltv_per_paying_customer: Realized LTV per paying customer, also
            known as ARPPU, cohorted by first seen date

            - mrr: Monthly recurring revenue

            - mrr_movement: Period-over-period delta of monthly recurring
            revenue

            - prediction_explorer: similar to cohort_explorer but including
            future predictions

            - refund_rate: transactions per period, refunds, refund rate

            - revenue: revenue (gross, net of taxes, or proceeds net of taxes
            and commissions) and number of transactions (subscriptions and
            non-subscriptions) per period

            - subscription_retention: Per-period retention of paying
            subscriptions by duration

            - subscription_status: Break down paying subscriptions, trials, MRR,
            ARR, or revenue by whether the subscription is set to renew,
            cancelled, or in billing recovery

            - trials: Active trials

            - trials_movement: Movement of active trials

            - trials_new: New trials

            - customers_active: Customers seen during the period (also known as
            DAU/MAU/WAU/etc.)

            - trial_conversion_rate: Number of trials started in a period and
            ratio of them converting to paying

            - non-subscription_purchases: Number of non-subscription purchases
            per period
          required: true
          in: path
          schema:
            type: string
            maxLength: 255
            enum:
              - actives
              - actives_movement
              - actives_new
              - arr
              - churn
              - cohort_explorer
              - conversion_to_paying
              - customers_new
              - ltv_per_customer
              - ltv_per_paying_customer
              - mrr
              - mrr_movement
              - prediction_explorer
              - refund_rate
              - revenue
              - subscription_retention
              - subscription_status
              - trials
              - trials_movement
              - trials_new
              - customers_active
              - trial_conversion_rate
              - non-subscription_purchases
            example: revenue
        - name: realtime
          description: >-
            Whether to request real-time (v3) charts. Defaults to true. Set to
            false to request the v2 charts.
          in: query
          schema:
            type: boolean
            default: true
        - name: filters
          description: JSON array of chart filters. Each filter is a ChartFilter object.
          in: query
          schema:
            type: string
          example: '[{"name":"country","values":["US","UK"]}]'
        - name: selectors
          description: JSON object of chart selectors.
          in: query
          schema:
            type: string
          example: '{"conversion_timeframe":"7_days","revenue_type":"proceeds"}'
        - name: aggregate
          description: >
            Comma-separated aggregate operations to return in `summary` without
            raw `values`.
          in: query
          style: form
          explode: false
          schema:
            type: array
            minItems: 1
            uniqueItems: true
            items:
              type: string
              enum:
                - average
                - total
            example: average,total
        - name: currency
          description: The currency to return metrics data in
          in: query
          schema:
            type: string
            enum:
              - USD
              - EUR
              - GBP
              - AUD
              - CAD
              - JPY
              - BRL
              - KRW
              - CNY
              - MXN
              - SEK
              - PLN
          example: EUR
        - name: resolution
          description: >
            Time resolution for the chart data.

            Use the chart options endpoint to discover available resolutions and
            their IDs.
          in: query
          schema:
            type: string
            example: '0'
        - name: start_date
          description: Start date for the data range (ISO 8601 format)
          in: query
          schema:
            type: string
            format: date
            example: '2024-01-01'
        - name: end_date
          description: End date for the data range (ISO 8601 format)
          in: query
          schema:
            type: string
            format: date
            example: '2024-12-31'
        - name: segment
          description: |
            Segment the data by this dimension. Use the chart options endpoint
            to discover available segments for a chart.
          in: query
          schema:
            type: string
            example: country
        - name: limit_num_segments
          description: >
            If set, limits the number of segments returned to the top N by
            value.

            All remaining segments are aggregated into an "Other" segment.

            Only applies when a segment is specified.
          in: query
          schema:
            type: integer
            minimum: 1
            example: 10
        - name: include_annotations
          in: query
          required: false
          description: >-
            When true, includes chart annotations for the project in the
            response, filtered to the chart's date window.
          schema:
            type: boolean
            default: false
            example: true
      responses:
        '200':
          description: Chart data retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChartData'
          headers:
            RevenueCat-Rate-Limit-Current-Usage:
              $ref: '#/components/headers/RateLimitCurrentUsage'
            RevenueCat-Rate-Limit-Current-Limit:
              $ref: '#/components/headers/RateLimitCurrentLimit'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '423':
          $ref: '#/components/responses/Locked'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
        '503':
          $ref: '#/components/responses/InternalError'
