        <code>project_configuration:products:read</code>. This endpoint belongs
        to the <strong>Project Configuration</strong> domain, which has a
        default rate limit of <strong>60 requests per minute</strong>.
    post:
      summary: Create a product
      operationId: create-product
      x-revenuecat-rate-limiting-domain: project_configuration
      x-scopes:
        - project_configuration:products:read_write
      x-release-status: public
      tags:
        - Product
      parameters:
        - name: project_id
          description: ID of the project
          required: true
          in: path
          schema:
            type: string
            maxLength: 255
            example: proj1ab2c3d4
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - store_identifier
                - app_id
                - type
              properties:
                store_identifier:
                  description: >
                    The store identifier of the product.

                    - For Apple App Store products this is the product ID of the
                    subscription or in-app product.

                    - For Google's Play Store, it should follow the format
                    'productId:basePlanId' for subscription products and SKU for
                    one-time purchase products.

                    - For Stripe, the product identifier that always starts with
                    "prod_"

                    - For Amazon, if it's a subscription, the term SKU of the
                    subscription. If it's a one-time purchase, the SKU of the
                    product.

                    - For Roku, this is the product identifier of the
                    subscription or one-time purchase product.
                  type: string
                  minLength: 1
                  maxLength: 200
                  example: com.revenuecat.magicweather.monthly
                app_id:
                  description: The ID of the app
                  type: string
                  minLength: 1
                  maxLength: 255
                  example: app1a2b3c4
                type:
                  description: The product type
                  nullable: false
                  $ref: '#/components/schemas/ProductType'
                display_name:
                  description: The display name of the product
                  nullable: true
                  type: string
                  minLength: 1
                  maxLength: 1500
                  example: Premium Monthly 2023
                subscription:
                  nullable: true
                  description: >-
                    Subscription parameters. Only supported for test store
                    products.
                  $ref: '#/components/schemas/ProductSubscriptionInput'
                title:
                  description: >-
                    The user-facing title of the product. This field is required
                    for Test Store products.
                  nullable: true
                  type: string
                  minLength: 1
                  maxLength: 1500
                  example: Premium Monthly 2023
              additionalProperties: false
            examples:
              App Store:
                value:
                  store_identifier: com.revenuecat.magicweather.monthly9.99
                  app_id: app1a2b3c4
                  type: subscription
                  display_name: Premium Monthly 2023
              Play Store Billing Client 4:
                value:
                  store_identifier: com.revenuecat.magicweather.monthly
                  app_id: app1a2b3c4
                  type: subscription
                  display_name: Premium Monthly 2023
              Stripe:
                value:
                  store_identifier: prod_LryUFGrmehs0tk
                  app_id: app1a2b3c4
                  type: subscription
                  display_name: Premium Monthly 2023
              Amazon:
                value:
                  store_identifier: com.mysubscription.weekly
                  app_id: app1a2b3c4
                  type: subscription
                  display_name: Premium Monthly 2023
              Play Store Subscription Billing Client 5:
                value:
                  store_identifier: mySubscription:basePlanId
                  app_id: app1a2b3c4
                  type: subscription
                  display_name: Premium Monthly 2023
              Play Store One-time Billing Client 5:
                value:
                  store_identifier: myProductSku
                  app_id: app1a2b3c4
                  type: one_time
                  display_name: Premium Lifetime 2023
              Test Store:
                value:
                  store_identifier: monthly_premium
                  app_id: app1a2b3c4
                  type: subscription
                  display_name: Premium Monthly
                  subscription:
                    duration: P1M
      responses:
        '201':
          description: Success. The product was created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
          headers:
            RevenueCat-Rate-Limit-Current-Usage:
