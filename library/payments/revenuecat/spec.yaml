    CreateAppStoreConnectSubscriptionInput:
      type: object
      required:
        - duration
        - subscription_group_name
      properties:
        duration:
          type: string
          enum:
            - ONE_WEEK
            - ONE_MONTH
            - TWO_MONTHS
            - THREE_MONTHS
            - SIX_MONTHS
            - ONE_YEAR
          description: The subscription duration period
        subscription_group_name:
          type: string
          minLength: 1
