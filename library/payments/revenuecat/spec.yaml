  /projects/{project_id}/metrics/revenue:
    get:
      summary: Get revenue for a project
      description: >-
        Returns the total revenue for the project across all of its apps for the

        given inclusive date range `[start_date, end_date]`. The value is
        expressed

        in the project's primary currency unless `currency` is provided.


        This endpoint is backed by the same realtime (v3) revenue chart that
        powers

        the dashboard. It is intended for cases where an app needs an
        authoritative

        revenue total without inferring it from the transaction list.


        Note that the most recent day in the range may be partial if it includes

        today, since transactions for today are still arriving.
         This endpoint requires the following permission(s): <code>charts_metrics:overview:read</code>. This endpoint belongs to the <strong>Charts & Metrics</strong> domain, which has a default rate limit of <strong>15 requests per minute</strong>.
      operationId: get-revenue-metric
      x-revenuecat-rate-limiting-domain: charts_metrics
      x-scopes:
        - charts_metrics:overview:read
      x-release-status: public
      tags:
        - Charts & Metrics
      parameters:
        - name: project_id
          description: ID of the project
          required: true
          in: path
          schema:
            type: string
            maxLength: 255
            example: proj1ab2c3d4
        - name: start_date
          description: Start date for the data range (ISO 8601 format)
          in: query
          required: true
          schema:
            type: string
            format: date
            example: '2024-01-01'
        - name: end_date
          description: End date for the data range (ISO 8601 format)
          in: query
