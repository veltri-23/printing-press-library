# agentcookie.toml: secrets-bus adoption manifest v2
# See docs/spec-agentcookie-secrets-bus-v2-adoption.md
schema_version = 2
name = "breezedoc-pp-cli"
display_name = "BreezeDoc"
description = "E-signature and invoicing API for documents, templates, recipients, teams, and invoice workflows."
project_kind = "cli"

[secrets.file]
path = "~/.config/breezedoc-pp-cli/config.toml"

[sync]
default = false

[sync.keys]
BREEZEDOC_API_TOKEN = true
BREEZEDOC_BEARER_AUTH = true
BREEZEDOC_BEARER_TOKEN = true
