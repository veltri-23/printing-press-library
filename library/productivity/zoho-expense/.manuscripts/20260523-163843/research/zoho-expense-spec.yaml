        path: "/trips"
        description: "List trips"
        params:
          - name: page
            type: int
          - name: per_page
            type: int
        response:
          type: array
          item: Trip
      get:
        method: GET
        path: "/trips/{trip_id}"
        description: "Get a trip"
        params:
          - name: trip_id
            type: string
            positional: true
            required: true
        response:
          type: object
          item: Trip
      create:
        method: POST
        path: "/trips"
        description: "Create a trip"
        body:
          - name: trip_name
            type: string
            required: true
          - name: from_date
            type: string
            format: date
          - name: to_date
            type: string
            format: date
          - name: destination
            type: string
          - name: purpose
            type: string
        response:
          type: object
          item: Trip
      update:
        method: PUT
        path: "/trips/{trip_id}"
        description: "Update a trip"
        params:
          - name: trip_id
            type: string
            positional: true
            required: true
        body:
          - name: trip_name
            type: string
          - name: from_date
            type: string
          - name: to_date
            type: string
          - name: destination
            type: string
          - name: purpose
            type: string
      delete:
        method: DELETE
        path: "/trips/{trip_id}"
        description: "Delete a trip"
        params:
          - name: trip_id
            type: string
            positional: true
            required: true
      approve:
        method: POST
        path: "/trips/{trip_id}/approve"
        description: "Approve a trip"
        params:
          - name: trip_id
            type: string
            positional: true
            required: true
      reject:
        method: POST
        path: "/trips/{trip_id}/reject"
        description: "Reject a trip"
        params:
          - name: trip_id
            type: string
            positional: true
            required: true
      cancel:
        method: POST
        path: "/trips/{trip_id}/cancel"
        description: "Cancel a trip"
        params:
          - name: trip_id
            type: string
            positional: true
            required: true
      close:
        method: POST
        path: "/trips/{trip_id}/close"
        description: "Close a trip (no further expenses can be added)"
        params:
          - name: trip_id
            type: string
            positional: true
            required: true

  currencies:
    description: "Currencies and exchange rates"
    endpoints:
      list:
        method: GET
        path: "/settings/currencies"
        description: "List currencies configured in the org"
        response:
          type: array
          item: Currency
      get:
        method: GET
        path: "/settings/currencies/{currency_id}"
        description: "Get a currency"
        params:
          - name: currency_id
            type: string
            positional: true
            required: true
        response:
          type: object
          item: Currency
      create:
        method: POST
        path: "/settings/currencies"
        description: "Add a currency to the org"
        body:
          - name: currency_code
            type: string
            required: true
            description: "ISO currency code (e.g. USD, INR)"
          - name: exchange_rate
            type: number
            description: "Initial exchange rate to base currency"
        response:
          type: object
          item: Currency
      update:
        method: PUT
        path: "/settings/currencies/{currency_id}"
        description: "Update a currency"
        params:
          - name: currency_id
            type: string
            positional: true
            required: true
        body:
          - name: exchange_rate
            type: number
      delete:
        method: DELETE
        path: "/settings/currencies/{currency_id}"
        description: "Delete a currency"
        params:
          - name: currency_id
            type: string
            positional: true
            required: true

  taxes:
    description: "Taxes (GST in India) applied to expenses"
    endpoints:
      list:
        method: GET
        path: "/settings/taxes"
        description: "List taxes"
        response:
          type: array
          item: Tax
      get:
        method: GET
        path: "/settings/taxes/{tax_id}"
        description: "Get a tax"
        params:
          - name: tax_id
            type: string
            positional: true
            required: true
        response:
          type: object
          item: Tax
      create:
        method: POST
        path: "/settings/taxes"
        description: "Create a tax"
        body:
          - name: tax_name
            type: string
            required: true
          - name: tax_percentage
            type: number
            required: true
          - name: tax_type
            type: string
            description: "tax | tax_group"
        response:
          type: object
          item: Tax
      update:
        method: PUT
        path: "/settings/taxes/{tax_id}"
        description: "Update a tax"
        params:
          - name: tax_id
            type: string
            positional: true
            required: true
        body:
          - name: tax_name
            type: string
          - name: tax_percentage
            type: number
      delete:
        method: DELETE
        path: "/settings/taxes/{tax_id}"
        description: "Delete a tax"
        params:
          - name: tax_id
            type: string
            positional: true
            required: true

extra_commands:
  - name: "auth login"
    description: "Exchange a 10-min self-client authorization code for a refresh token (India region)"
  - name: "auth refresh"
    description: "Force-refresh the access token using the stored refresh token"
  - name: "auth status"
    description: "Show token validity, organization, and connected account"
  - name: "org use"
    args: "<organization_id>"
    description: "Set the active organization for subsequent commands"
  - name: "receipt upload"
    args: "<file>"
    description: "Upload a receipt file, poll until autoscan completes, return the populated expense (the Hermes hot path)"
  - name: "invoice ingest"
    args: "<dir-or-file>"
    description: "Batch upload invoices from a directory with hash dedup, parallel autoscan polling, and auto-tag from local merchant→category memory"
  - name: "expense tag"
    args: "<expense_id>"
    description: "Tag an expense with category, project, customer, billable flag, reporting tags via flags (--category, --project, --tag name=option)"
  - name: "expense untagged"
    description: "List expenses missing a category (typically scanned receipts awaiting tagging)"
  - name: "close"
    description: "Close out a month: bundle unreported expenses for the month, alert on still-processing autoscans and untagged items, create/submit the report"
  - name: "merchant list"
    description: "List merchants synthesized from local expense history with learned category mapping"
  - name: "merchant map"
    args: "<merchant>"
    description: "Train the local merchant→category/project mapping for future auto-tag"
  - name: "gst-split"
    args: "<expense_id>"
    description: "India-specific: parse tax_id and line items, compute CGST/SGST/IGST split, emit the breakdown"
  - name: "sync"
    description: "Sync expenses, categories, reporting tags, projects, customers into the local SQLite store"
  - name: "search"
    args: "<query>"
    description: "Full-text search across synced expenses (merchant, description, line items, reference numbers)"
  - name: "stale"
    description: "Show what local data is older than configured staleness thresholds and would benefit from a sync"
  - name: "doctor"
    description: "Check auth, region, organization, and API reachability"

