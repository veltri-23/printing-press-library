version: 2
project_name: toodledo-pp-cli
changelog:
  disable: true
builds:
  - id: toodledo-pp-cli
    main: ./cmd/toodledo-pp-cli
    binary: toodledo-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/productivity/toodledo/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: toodledo-pp-mcp
    main: ./cmd/toodledo-pp-mcp
    binary: toodledo-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: toodledo-pp-cli
    repository:
      owner: wwilson1017
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Toodledo feature from the terminal, plus an offline SQLite mirror, GTD reviews"
    install: |
      bin.install "toodledo-pp-cli"
      bin.install "toodledo-pp-mcp"
