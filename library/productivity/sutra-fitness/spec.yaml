openapi: 3.0.3
info:
    title: Partner API
    description: |
        The Partner API allows partners to access and manage their own data using API keys. 
        This RESTful API provides secure, authenticated access to partner resources including 
        locations, classes, clients, reservations, purchases, and referrals.

        ## Core Resources

        - **Locations** - Partner studio locations
        - **Rooms** - Rooms within locations
        - **Classes** - Fitness classes and sessions
        - **Clients** - Customer/client information
        - **Purchases** - Client packages and subscriptions
        - **Referrals** - Referral program data
        - **Reservations** - Class reservations and bookings

        ## Key Features

        - **Authentication** - API key authentication via Bearer token or X-API-Key header
        - **Pagination** - Cursor-based pagination for list endpoints
        - **Filtering** - Date range and ID-based filtering
        - **Batch Operations** - Fetch multiple resources by ID
        - **CRUD Operations** - Create, read, update operations for reservations

        ## Authentication

        All API requests require authentication using one of these methods:
        - `Authorization: Bearer {api_key}` header
        - `X-API-Key: {api_key}` header

        ## Base URL

        All endpoints are relative to your partner-specific base URL:
        - Production: `https://us-central1-sutra-prod.cloudfunctions.net/partnerApi/v0`

        ## Example Usage

        ### Get Partner Locations

        ```bash
        curl -H "Authorization: Bearer YOUR_API_KEY" \
             "https://us-central1-sutra-prod.cloudfunctions.net/partnerApi/v0/your-partner-id/locations"
        ```

        ### Create a Reservation

        ```bash
        curl -X POST \
             -H "Authorization: Bearer YOUR_API_KEY" \
             -H "Content-Type: application/json" \
             -d '{
               "firstName": "Jane",
               "lastName": "Smith",
               "email": "jane@example.com",
               "phone": "+1234567890"
             }' \
             "https://us-central1-sutra-prod.cloudfunctions.net/partnerApi/v0/your-partner-id/classes/class123/reservations"
        ```

        ## Error Handling

        The API uses standard HTTP status codes and returns error responses in this format:

        ```json
        {
            "error": {
                "name": "ERROR_NAME",
                "code": 400,
                "message": "Human readable error message"
            }
        }
        ```

        Common error codes:
        - `400` - Bad Request (invalid parameters)
        - `401` - Unauthorized (invalid API key)
        - `403` - Forbidden (access denied to partner data)
        - `404` - Not Found (resource doesn't exist)
        - `500` - Internal Server Error

        ## Rate Limiting

        API requests are subject to rate limiting.

    version: 0.1.0

    license:
        name: Proprietary

servers:
    - url: https://us-central1-sutra-prod.cloudfunctions.net/partnerApi/v0
      description: Production server

security:
    - ApiKeyAuth: []

paths:
    /{partnerId}/locations:
        get:
            summary: List partner locations
            description: Retrieve a paginated list of partner locations with optional filtering
            operationId: getPartnerLocations
            tags:
                - Locations
            parameters:
                - $ref: "#/components/parameters/PartnerId"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/StartAfter"
                - $ref: "#/components/parameters/UpdatedAtMin"
                - $ref: "#/components/parameters/UpdatedAtMax"
                - $ref: "#/components/parameters/Ids"
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    items:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Location"
                                    pagination:
                                        $ref: "#/components/schemas/Pagination"
                            example:
                                items:
                                    - id: "loc123"
                                      name: "Main Studio"
                                      description: "Primary location"
                                      deleted: false
                                      address:
                                          line1: "123 Main St"
                                          line2: "Suite 100"
                                          city: "San Francisco"
                                          state: "CA"
                                          postal_code: "94105"
                                          country: "US"
                                      updated_at: "2024-03-20T12:00:00Z"
                                pagination:
                                    limit: 10
                                    nextStartAfterId: null
                                    hasMore: false
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "500":
                    $ref: "#/components/responses/ServerError"

    /{partnerId}/locations/{locationId}/rooms:
        get:
            summary: List location rooms
            description: Retrieve a paginated list of rooms for a specific location
            operationId: getLocationRooms
            tags:
                - Rooms
            parameters:
                - $ref: "#/components/parameters/PartnerId"
                - $ref: "#/components/parameters/LocationId"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/StartAfter"
                - $ref: "#/components/parameters/UpdatedAtMin"
                - $ref: "#/components/parameters/UpdatedAtMax"
                - $ref: "#/components/parameters/Ids"
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    items:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Room"
                                    pagination:
                                        $ref: "#/components/schemas/Pagination"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "500":
                    $ref: "#/components/responses/ServerError"

    /{partnerId}/classes:
        get:
            summary: List partner classes
            description: Retrieve a paginated list of partner classes with optional filtering
            operationId: getPartnerClasses
            tags:
                - Classes
            parameters:
                - $ref: "#/components/parameters/PartnerId"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/StartAfter"
                - $ref: "#/components/parameters/LocationId"
                - name: start_date
                  in: query
                  description: Filter classes starting from this date (ISO 8601)
                  required: false
                  schema:
                      type: string
                      format: date-time
                - name: end_date
                  in: query
                  description: Filter classes ending before this date (ISO 8601)
                  required: false
                  schema:
                      type: string
                      format: date-time
                - $ref: "#/components/parameters/Ids"
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    items:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Class"
                                    pagination:
                                        $ref: "#/components/schemas/Pagination"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "500":
                    $ref: "#/components/responses/ServerError"

    /{partnerId}/classes/{classId}:
        get:
            summary: Get single class
            description: Retrieve details for a specific class
            operationId: getPartnerClass
            tags:
                - Classes
            parameters:
                - $ref: "#/components/parameters/PartnerId"
                - $ref: "#/components/parameters/ClassId"
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    item:
                                        $ref: "#/components/schemas/Class"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/ServerError"

    /{partnerId}/classes/{classId}/reservations:
        get:
            summary: List class reservations
            description: Retrieve reservations for a specific class
            operationId: getClassReservations
            tags:
                - Reservations
            parameters:
                - $ref: "#/components/parameters/PartnerId"
                - $ref: "#/components/parameters/ClassId"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/StartAfter"
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    items:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Reservation"
                                    pagination:
                                        $ref: "#/components/schemas/Pagination"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/ServerError"

        post:
            summary: Create reservation
            description: Create a reservation for a class with either an existing client or new client
            operationId: createReservation
            tags:
                - Reservations
            parameters:
                - $ref: "#/components/parameters/PartnerId"
                - $ref: "#/components/parameters/ClassId"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            oneOf:
                                - $ref: "#/components/schemas/CreateReservationWithExistingClient"
                                - $ref: "#/components/schemas/CreateReservationWithNewClient"
                        examples:
                            existing_client:
                                summary: Create reservation with existing client
                                value:
                                    clientId: "client123"
                                    purchaseId: "purchase123"
                            new_client:
                                summary: Create reservation with new client
                                value:
                                    firstName: "Jane"
                                    lastName: "Smith"
                                    email: "jane.smith@example.com"
                                    phone: "+1234567890"
                                    purchaseId: "purchase123"
            responses:
                "201":
                    description: Reservation created successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    item:
                                        $ref: "#/components/schemas/Reservation"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/ServerError"

    /{partnerId}/classes/{classId}/reservations/{reservationId}:
        put:
            summary: Cancel reservation
            description: Cancel an existing reservation with optional refund
            operationId: cancelReservation
            tags:
                - Reservations
            parameters:
                - $ref: "#/components/parameters/PartnerId"
                - $ref: "#/components/parameters/ClassId"
                - $ref: "#/components/parameters/ReservationId"
            requestBody:
                required: true
                content:
                    application/json:
                        schema:
                            $ref: "#/components/schemas/CancelReservationRequest"
            responses:
                "200":
                    description: Reservation canceled successfully
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    item:
                                        type: object
                                        properties:
                                            success:
                                                type: boolean
                                                example: true
                                            updated_at:
                                                type: string
                                                format: date-time
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/ServerError"

    /{partnerId}/classes/{classId}/reservations/{reservationId}/check-in:
        post:
            summary: Check in reservation
            description: Mark a reservation as checked in
            operationId: checkInReservation
            tags:
                - Reservations
            parameters:
                - $ref: "#/components/parameters/PartnerId"
                - $ref: "#/components/parameters/ClassId"
                - $ref: "#/components/parameters/ReservationId"
            responses:
                "200":
                    description: Check-in successful
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    item:
                                        type: object
                                        properties:
                                            success:
                                                type: boolean
                                                example: true
                                            updated_at:
                                                type: string
                                                format: date-time
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/ServerError"

    /{partnerId}/clients:
        get:
            summary: List partner clients
            description: Retrieve a paginated list of partner clients with optional filtering
            operationId: getPartnerClients
            tags:
                - Clients
            parameters:
                - $ref: "#/components/parameters/PartnerId"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/StartAfter"
                - $ref: "#/components/parameters/UpdatedAtMin"
                - $ref: "#/components/parameters/UpdatedAtMax"
                - $ref: "#/components/parameters/Ids"
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    items:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Client"
                                    pagination:
                                        $ref: "#/components/schemas/Pagination"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "500":
                    $ref: "#/components/responses/ServerError"

    /{partnerId}/clients/{clientId}:
        get:
            summary: Get single client
            description: Retrieve details for a specific client
            operationId: getPartnerClient
            tags:
                - Clients
            parameters:
                - $ref: "#/components/parameters/PartnerId"
                - $ref: "#/components/parameters/ClientId"
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    item:
                                        $ref: "#/components/schemas/Client"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "404":
                    $ref: "#/components/responses/NotFound"
                "500":
                    $ref: "#/components/responses/ServerError"

    /{partnerId}/purchases:
        get:
            summary: List partner purchases
            description: Retrieve a paginated list of partner purchases with optional filtering
            operationId: getPartnerPurchases
            tags:
                - Purchases
            parameters:
                - $ref: "#/components/parameters/PartnerId"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/StartAfter"
                - $ref: "#/components/parameters/UpdatedAtMin"
                - $ref: "#/components/parameters/UpdatedAtMax"
                - $ref: "#/components/parameters/Ids"
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    items:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Purchase"
                                    pagination:
                                        $ref: "#/components/schemas/Pagination"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "500":
                    $ref: "#/components/responses/ServerError"

    /{partnerId}/referrals:
        get:
            summary: List partner referrals
            description: Retrieve a paginated list of partner referrals with optional filtering
            operationId: getPartnerReferrals
            tags:
                - Referrals
            parameters:
                - $ref: "#/components/parameters/PartnerId"
                - $ref: "#/components/parameters/Limit"
                - $ref: "#/components/parameters/StartAfter"
                - $ref: "#/components/parameters/UpdatedAtMin"
                - $ref: "#/components/parameters/UpdatedAtMax"
                - $ref: "#/components/parameters/Ids"
            responses:
                "200":
                    description: Successful response
                    content:
                        application/json:
                            schema:
                                type: object
                                properties:
                                    items:
                                        type: array
                                        items:
                                            $ref: "#/components/schemas/Referral"
                                    pagination:
                                        $ref: "#/components/schemas/Pagination"
                "400":
                    $ref: "#/components/responses/BadRequest"
                "401":
                    $ref: "#/components/responses/Unauthorized"
                "403":
                    $ref: "#/components/responses/Forbidden"
                "500":
                    $ref: "#/components/responses/ServerError"

components:
    securitySchemes:
        ApiKeyAuth:
            type: apiKey
            in: header
            name: X-API-Key
            description: API key for authentication
            x-auth-env-vars:
                - SUTRA_API_KEY
        BearerAuth:
            type: http
            scheme: bearer
            bearerFormat: JWT
            description: Bearer token for authentication

    parameters:
        PartnerId:
            name: partnerId
            in: path
            required: true
            description: Partner identifier
            schema:
                type: string
                example: "partner123"
        LocationId:
            name: locationId
            in: path
            required: true
            description: Location identifier
            schema:
                type: string
                example: "loc123"
        ClassId:
            name: classId
            in: path
            required: true
            description: Class identifier
            schema:
                type: string
                example: "class123"
        ClientId:
            name: clientId
            in: path
            required: true
            description: Client identifier
            schema:
                type: string
                example: "client123"
        ReservationId:
            name: reservationId
            in: path
            required: true
            description: Reservation identifier
            schema:
                type: string
                example: "reservation123"
        Limit:
            name: limit
            in: query
            required: false
            description: Number of items to return (default 10, max 100)
            schema:
                type: integer
                minimum: 1
                maximum: 100
                default: 10
                example: 10
        StartAfter:
            name: start_after
            in: query
            required: false
            description: ID to start after for pagination
            schema:
                type: string
                example: "item123"
        UpdatedAtMin:
            name: updated_at_min
            in: query
            required: false
            description: Filter by minimum updated timestamp (ISO 8601)
            schema:
                type: string
                format: date-time
                example: "2024-03-20T00:00:00Z"
        UpdatedAtMax:
            name: updated_at_max
            in: query
            required: false
            description: Filter by maximum updated timestamp (ISO 8601)
            schema:
                type: string
                format: date-time
                example: "2024-03-21T23:59:59Z"
        Ids:
            name: ids
            in: query
            required: false
            description: Comma-separated list of IDs to fetch
            schema:
                type: string
                example: "id1,id2,id3"

    schemas:
        Error:
            type: object
            required:
                - error
            properties:
                error:
                    type: object
                    required:
                        - name
                        - code
                        - message
                    properties:
                        name:
                            type: string
                            example: "BAD_REQUEST"
                        code:
                            type: integer
                            example: 400
                        message:
                            type: string
                            example: "Invalid request parameters"

        Pagination:
            type: object
            properties:
                limit:
                    type: integer
                    example: 10
                nextStartAfterId:
                    type: string
                    nullable: true
                    example: "item123"
                hasMore:
                    type: boolean
                    example: false

        Address:
            type: object
            properties:
                line1:
                    type: string
                    example: "123 Main St"
                line2:
                    type: string
                    nullable: true
                    example: "Suite 100"
                city:
                    type: string
                    example: "San Francisco"
                state:
                    type: string
                    example: "CA"
                postal_code:
                    type: string
                    example: "94105"
                country:
                    type: string
                    example: "US"

        Location:
            type: object
            properties:
                id:
                    type: string
                    example: "loc123"
                name:
                    type: string
                    example: "Main Studio"
                description:
                    type: string
                    nullable: true
                    example: "Primary location"
                deleted:
                    type: boolean
                    example: false
                address:
                    $ref: "#/components/schemas/Address"
                updated_at:
                    type: string
                    format: date-time
                    example: "2024-03-20T12:00:00Z"

        Spot:
            type: object
            properties:
                id:
                    type: string
                    example: "spot1"
                name:
                    type: string
                    example: "Spot 1"
                type:
                    type: string
                    enum: ["client", "instructor"]
                    example: "client"
                xPercent:
                    type: number
                    example: 10.0
                yPercent:
                    type: number
                    example: 20.0
                status:
                    type: string
                    enum: ["available", "occupied", "reserved"]
                    example: "available"

        Room:
            type: object
            properties:
                id:
                    type: string
                    example: "room123"
                name:
                    type: string
                    example: "Studio A"
                description:
                    type: string
                    nullable: true
                    example: "Main yoga studio"
                location_id:
                    type: string
                    example: "loc123"
                updated_at:
                    type: string
                    format: date-time
                    example: "2024-03-20T12:00:00Z"
                spot_map:
                    type: object
                    additionalProperties:
                        $ref: "#/components/schemas/Spot"

        Class:
            type: object
            properties:
                id:
                    type: string
                    example: "class123"
                name:
                    type: string
                    example: "Morning Yoga"
                deleted:
                    type: boolean
                    example: false
                description:
                    type: string
                    nullable: true
                    example: "Start your day right"
                start_time:
                    type: string
                    format: date-time
                    example: "2024-03-20T08:00:00Z"
                duration:
                    type: integer
                    example: 60
                location_id:
                    type: string
                    example: "loc123"
                room_id:
                    type: string
                    example: "room123"
                max_capacity:
                    type: integer
                    example: 20
                total_booked:
                    type: integer
                    example: 15
                canceled:
                    type: boolean
                    example: false
                updated_at:
                    type: string
                    format: date-time
                    example: "2024-03-20T12:00:00Z"
                instructor_name:
                    type: string
                    nullable: true
                    example: "John Smith"

        Client:
            type: object
            properties:
                id:
                    type: string
                    example: "client123"
                first_name:
                    type: string
                    example: "John"
                last_name:
                    type: string
                    example: "Doe"
                email:
                    type: string
                    format: email
                    example: "john@example.com"
                phone:
                    type: string
                    nullable: true
                    example: "+1234567890"
                created_at:
                    type: string
                    format: date-time
                    example: "2024-03-20T12:00:00Z"
                updated_at:
                    type: string
                    format: date-time
                    example: "2024-03-20T12:00:00Z"
                removed:
                    type: boolean
                    example: false
                date_of_birth:
                    type: string
                    format: date
                    nullable: true
                    example: "1990-01-01"
                gender:
                    type: string
                    enum: ["male", "female", "other", "prefer_not_to_say"]
                    nullable: true
                    example: "male"

        Purchase:
            type: object
            properties:
                id:
                    type: string
                    example: "purchase123"
                client_id:
                    type: string
                    example: "client123"
                type:
                    type: string
                    enum: ["subscription", "class_pack", "drop_in"]
                    example: "subscription"
                offering_id:
                    type: string
                    example: "offering123"
                status:
                    type: string
                    enum: ["ACTIVE", "EXPIRED", "CANCELED", "SUSPENDED"]
                    example: "ACTIVE"
                start_date:
                    type: string
                    format: date-time
                    example: "2024-03-20T12:00:00Z"
                end_date:
                    type: string
                    format: date-time
                    nullable: true
                    example: "2024-04-20T12:00:00Z"
                updated_at:
                    type: string
                    format: date-time
                    example: "2024-03-20T12:00:00Z"
                name:
                    type: string
                    example: "Monthly Unlimited"
                remaining_uses:
                    type: integer
                    nullable: true
                    example: 30
                price:
                    type: number
                    format: float
                    nullable: true
                    example: 99.99

        Referral:
            type: object
            properties:
                id:
                    type: string
                    example: "referral123"
                referred_user_id:
                    type: string
                    example: "client123"
                referring_user_id:
                    type: string
                    example: "client456"
                referral_date:
                    type: string
                    format: date-time
                    example: "2024-03-20T12:00:00Z"
                referred_user_reward:
                    type: object
                    properties:
                        type:
                            type: string
                            enum: ["amount", "percentage", "free_classes"]
                            example: "amount"
                        value:
                            type: number
                            example: 10.00
                referring_user_reward:
                    type: object
                    properties:
                        type:
                            type: string
                            enum: ["amount", "percentage", "free_classes"]
                            example: "amount"
                        value:
                            type: number
                            example: 10.00
                updated_at:
                    type: string
                    format: date-time
                    example: "2024-03-20T12:00:00Z"

        Reservation:
            type: object
            properties:
                id:
                    type: string
                    example: "reservation123"
                client_id:
                    type: string
                    example: "client123"
                class_id:
                    type: string
                    example: "class123"
                client:
                    type: object
                    properties:
                        first_name:
                            type: string
                            example: "John"
                        last_name:
                            type: string
                            example: "Doe"
                        email:
                            type: string
                            format: email
                            example: "john@example.com"
                        phone:
                            type: string
                            nullable: true
                            example: "+1234567890"
                status:
                    type: string
                    enum: ["BOOKED", "CANCELED", "CHECKED_IN", "NO_SHOW"]
                    example: "BOOKED"
                checked_in:
                    type: boolean
                    example: false
                checked_in_at:
                    type: string
                    format: date-time
                    nullable: true
                    example: null
                created_at:
                    type: string
                    format: date-time
                    example: "2024-03-20T12:00:00Z"
                updated_at:
                    type: string
                    format: date-time
                    example: "2024-03-20T12:00:00Z"
                spot_id:
                    type: string
                    nullable: true
                    example: "spot1"
                spot_name:
                    type: string
                    nullable: true
                    example: "Spot 1"

        CreateReservationWithExistingClient:
            type: object
            required:
                - clientId
                - purchaseId
            properties:
                clientId:
                    type: string
                    description: ID of existing client
                    example: "client123"
                purchaseId:
                    type: string
                    description: ID of purchase to use for reservation
                    example: "purchase123"

        CreateReservationWithNewClient:
            type: object
            required:
                - firstName
                - lastName
                - email
            properties:
                firstName:
                    type: string
                    description: Client's first name
                    example: "Jane"
                lastName:
                    type: string
                    description: Client's last name
                    example: "Smith"
                email:
                    type: string
                    format: email
                    description: Client's email address
                    example: "jane.smith@example.com"
                phone:
                    type: string
                    description: Client's phone number
                    nullable: true
                    example: "+1234567890"
                purchaseId:
                    type: string
                    description: ID of purchase to use for reservation (optional for new clients)
                    nullable: true
                    example: "purchase123"

        CancelReservationRequest:
            type: object
            properties:
                isLateCancel:
                    type: boolean
                    description: Whether this is a late cancellation
                    default: false
                    example: false
                issueRefund:
                    type: boolean
                    description: Whether to issue a refund
                    default: false
                    example: false

    responses:
        BadRequest:
            description: Bad request - invalid parameters
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                    example:
                        error:
                            name: "BAD_REQUEST"
                            code: 400
                            message: "Invalid request parameters"

        Unauthorized:
            description: Unauthorized - invalid or missing API key
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                    example:
                        error:
                            name: "UNAUTHORIZED"
                            code: 401
                            message: "Invalid API key"

        Forbidden:
            description: Forbidden - access denied to partner data
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                    example:
                        error:
                            name: "FORBIDDEN"
                            code: 403
                            message: "Access denied to partner data"

        NotFound:
            description: Resource not found
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                    example:
                        error:
                            name: "NOT_FOUND"
                            code: 404
                            message: "Resource not found"

        ServerError:
            description: Internal server error
            content:
                application/json:
                    schema:
                        $ref: "#/components/schemas/Error"
                    example:
                        error:
                            name: "SERVER_ERROR"
                            code: 500
                            message: "Internal server error"

