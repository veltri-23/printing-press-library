version: 2
project_name: calendly-pp-cli
changelog:
  disable: true
builds:
  - id: calendly-pp-cli
    main: ./cmd/calendly-pp-cli
    binary: calendly-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X calendly-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: calendly-pp-mcp
    main: ./cmd/calendly-pp-mcp
    binary: calendly-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: calendly-pp-cli
    repository:
      owner: debgotwired
      name: homebrew-tap
    homepage: "https://github.com/debgotwired/calendly-pp-cli"
    description: "Read-first Calendly API surface for scheduling, availability, event, invitee, and webhook inspection."
    install: |
      bin.install "calendly-pp-cli"
      bin.install "calendly-pp-mcp"
