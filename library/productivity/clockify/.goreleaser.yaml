version: 2
project_name: clockify-pp-cli
changelog:
  disable: true
builds:
  - id: clockify-pp-cli
    main: ./cmd/clockify-pp-cli
    binary: clockify-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/productivity/clockify/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: clockify-pp-mcp
    main: ./cmd/clockify-pp-mcp
    binary: clockify-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: clockify-pp-cli
    repository:
      owner: melanson633
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Clockify feature, plus a local time database that reconstructs your weekly timesheet, finds untracked gaps,..."
    install: |
      bin.install "clockify-pp-cli"
      bin.install "clockify-pp-mcp"
