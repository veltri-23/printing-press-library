version: 2
project_name: supermemory-admin-pp-cli
changelog:
  disable: true
builds:
  - id: supermemory-admin-pp-cli
    main: ./cmd/supermemory-admin-pp-cli
    binary: supermemory-admin-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X supermemory-admin-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: supermemory-admin-pp-mcp
    main: ./cmd/supermemory-admin-pp-mcp
    binary: supermemory-admin-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: supermemory-admin-pp-cli
    repository:
      owner: hnshah
      name: homebrew-tap
    homepage: "https://github.com/hnshah/supermemory-admin-pp-cli"
    description: "The Memory API for the AI era"
    install: |
      bin.install "supermemory-admin-pp-cli"
      bin.install "supermemory-admin-pp-mcp"
