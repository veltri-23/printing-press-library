# agentcookie.toml: secrets-bus adoption manifest v2
# See docs/spec-agentcookie-secrets-bus-v2-adoption.md
schema_version = 2
name = "tidycal-pp-cli"
display_name = "TidyCal"
description = "Scheduling and booking API for meetings, contacts, booking types, and team calendars."
project_kind = "cli"

[secrets.file]
path = "~/.config/tidycal-pp-cli/config.toml"

[sync]
default = false

[sync.keys]
TIDYCAL_API_TOKEN = true
TIDYCAL_BEARER_AUTH = true
