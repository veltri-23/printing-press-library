        type: string
      - name: query
        type: string
      - name: filters_json
        type: string
      - name: last_sync_anchor
        type: string

  Review:
    fields:
      - name: id
        type: string
      - name: product_id
        type: string
      - name: roaster
        type: string
      - name: bean_name
        type: string
      - name: score
        type: int
      - name: descriptors_json
        type: string
