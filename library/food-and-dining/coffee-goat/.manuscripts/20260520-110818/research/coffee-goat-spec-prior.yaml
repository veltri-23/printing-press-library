# All hand-written novel-feature commands declared so SKILL.md documents
# them. The actual Cobra commands are hand-authored in internal/cli/ during
# Phase 3 — none of these are code-generated.
extra_commands:
  # Sync + corpus
  - name: sync
    description: "Pull catalogs from all 24 roasters into the local store"
    args: "[--roaster <slug>] [--limit N]"
  - name: roasters list
    description: "List the 24 known roasters with tier, country, and last-synced timestamps"
  - name: roasters show
    description: "Show one roaster's details and current product count"
    args: "<slug>"

  # Personal data verbs (cellar + brew log)
  - name: beans add
    description: "Add a bag to your cellar"
    args: "--product <slug> --roast-date <YYYY-MM-DD> [--mass <g>]"
  - name: beans list
    description: "List beans in your cellar with freshness flags"
  - name: beans use
    description: "Record bean usage; decrements current_mass_g"
    args: "<bean-id> --grams <N>"
  - name: beans rate
    description: "Rate a bean and add notes"
    args: "<bean-id> --score <N> --notes <text>"
  - name: beans archive
    description: "Archive a bean (e.g. finished or thrown out)"
    args: "<bean-id>"
  - name: brews log
    description: "Log a brew session"
    args: "--bean <id> --method <m> --dose <g> --yield <g> --time <s> --rating <N> [...more]"
  - name: brews list
    description: "List brews with optional filters"
  - name: methods list
    description: "List brewing method profiles"
  - name: water add
    description: "Add a water profile"
    args: "--name <n> --tds <ppm> --hardness <ppm> [...]"
  - name: cup score
    description: "Record an SCA cupping score for a bean"
    args: "<bean-id> --score <N> --aromatics <...> --acidity <N> --body <N> --finish <N>"
  - name: cafe checkin
    description: "Record a cafe visit"
    args: "<cafe-name> [--bean <id>] [--rating <N>]"

  # Bag scan (LLM-powered, opt-in)
  - name: beans scan
    description: "Identify roaster + bean from a photo of a coffee bag (requires OPENROUTER_API_KEY)"
    args: "<photo-path>"

  # 13 transcendence features (HEADLINE)
  - name: search
    description: "Cross-roaster FTS5 search over the synced corpus"
    args: "<query> [--origin --process --price-lt --in-stock]"
  - name: dial-in
    description: "Bayesian recipe recommendation from your brew history of similar beans"
    args: "<bean> [--method <m>]"
  - name: shelf
    description: "Your cellar with per-method freshness windows (espresso 8-21d, filter 5-28d)"
    args: "[--by freshness|rating|roaster]"
  - name: watch
    description: "Persisted query; emits new matches on sync diff (cron-safe, silent when empty)"
    args: "<query>"
  - name: compare
    description: "Side-by-side bean table with deltas + Coffee Review scores"
    args: "<bean-a> <bean-b> [<bean-c>...]"
  - name: twin
    description: "Closest current match for a bean across all 24 roasters via attribute similarity"
    args: "<bean> [--top N]"
  - name: blind-cup
    description: "Blind cupping session; reveals correlate user scores with Coffee Review (Spearman ρ)"
    args: "[--beans N] [--from-shelf]"
  - name: fx
    description: "FX-normalized $/oz across roasters + curated ship-to landed cost"
    args: "<roaster|bean> [--ship-to <country>]"
  - name: producer
    description: "Track a producer or farm across every synced roaster, multi-year"
    args: "<name> [--years N]"
  - name: refill-plan
    description: "Consumption-rate from brews + shelf depletion + ranked replacement picks"
  - name: roaster-style
    description: "Per-roaster fingerprint (origin/process mix, $/oz median); --similar-to ranks similar roasters"
    args: "<name> [--similar-to]"
  - name: drift
    description: "OLS regression on rating-vs-day across beans; flags grinder/water/technique drift"
    args: "[--window <Nd>]"
  - name: whats-next
    description: "Recommend what to brew next from your shelf, scored by descriptor match × rating affinity × freshness"
    args: "[--method <m>] [--mood <fruity|chocolate|floral>]"

  # Editorial sync
  - name: reviews sync
    description: "Sync Coffee Review WP REST score corpus into the local store"
  - name: reviews show
    description: "Show Coffee Review entries matched to a bean or roaster"
    args: "<bean-or-roaster>"

  # Auth (cookie-based for Sprudge editorial fallback only)
  - name: auth sprudge
    description: "Import current Chrome cookies for Sprudge Cloudflare clearance"
    args: "[--chrome]"

mcp:
  transport: [stdio, http]
