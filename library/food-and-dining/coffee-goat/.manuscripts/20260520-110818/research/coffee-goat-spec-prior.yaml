name: coffee-goat
display_name: "Coffee GOAT"
description: "The third-wave coffee terminal: cross-roaster search across 24 elite specialty roasters, a local brew log, and analytics that diagnose your grinder from your rating drift."
cli_description: "Search 24 elite specialty roasters, log brews, and let the CLI diagnose your grinder from your rating drift."
kind: synthetic
spec_source: community
http_transport: standard
version: "0.1.0"
base_url: "https://coffee-goat.local"
website_url: "https://github.com/justinwfu/coffee-goat-pp-cli"
category: food-and-dining
owner: justinwfu
owner_name: "Justin Fu"
printer: justinwfu
printer_name: "Justin Fu"

auth:
  type: none

config:
  format: toml
  path: "~/.config/coffee-goat/config.toml"

# Anchor resource: the unified Product corpus. Synthetic — every command
# that touches roaster_products is hand-authored against the local store
# rather than emitted from the spec. The list endpoint exists so the
# generator has a structural anchor for the store/types layer.
resources:
  products:
    description: "Unified roaster product corpus synced from 24 specialty coffee roasters"
    endpoints:
      list:
        method: GET
        path: "/products"
        description: "List synced roaster products with structured filters"
        params:
          - name: roaster
            type: string
            description: "Filter by roaster slug"
          - name: origin
            type: string
            description: "Filter by origin country (e.g. Ethiopia, Colombia, Kenya)"
          - name: process
            type: string
            description: "Filter by process (washed, natural, anaerobic, honey)"
          - name: in_stock
            type: bool
            description: "Show only beans currently in stock"
          - name: limit
            type: int
            description: "Maximum rows to return"
        response:
          type: array
          item: Product

types:
  Product:
    fields:
      - name: id
        type: string
      - name: roaster
        type: string
      - name: title
        type: string
      - name: handle
        type: string
      - name: vendor
        type: string
      - name: product_type
        type: string
      - name: origin
        type: string
      - name: region
        type: string
      - name: producer
        type: string
      - name: process
        type: string
      - name: varietal
        type: string
      - name: altitude_m_min
        type: int
      - name: altitude_m_max
        type: int
      - name: roast_level
        type: string
      - name: tags
        type: string
      - name: price_cents
        type: int
      - name: currency
        type: string
      - name: weight_g
        type: int
      - name: url
        type: string
      - name: image_url
        type: string
      - name: in_stock
        type: bool
      - name: body_text
        type: string
      - name: published_at
        type: string
      - name: updated_at
        type: string

  Roaster:
    fields:
      - name: slug
        type: string
      - name: name
        type: string
      - name: country
        type: string
      - name: website
        type: string
      - name: sync_url
        type: string
      - name: source_tier
        type: string
      - name: transport
        type: string
      - name: last_synced_at
        type: string

  Bean:
    fields:
      - name: id
        type: string
      - name: product_id
        type: string
      - name: roaster
        type: string
      - name: name
        type: string
      - name: roast_date
        type: string
      - name: purchase_date
        type: string
      - name: purchase_price_cents
        type: int
      - name: current_mass_g
        type: int
      - name: rating
        type: int
      - name: notes
        type: string

  Brew:
    fields:
      - name: id
        type: string
      - name: bean_id
        type: string
      - name: method
        type: string
      - name: grind
        type: string
