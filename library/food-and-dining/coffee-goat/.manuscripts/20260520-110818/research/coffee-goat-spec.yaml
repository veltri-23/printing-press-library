# All hand-written novel-feature commands declared so SKILL.md documents
# them. The actual Cobra commands are hand-authored in internal/cli/ during
# Phase 3 — none of these are code-generated.
extra_commands:
  # Vertical-slice transcendence commands (Phase 3 — actually shipped).
  # 14 more transcendence commands and 7 more source adapters are documented
  # in proofs/<run-id>-fix-coffee-goat-pp-cli-handoff.md and deferred.

  - name: search
    description: "Cross-roaster FTS5 search over the synced roaster_products corpus"
    args: "[query] [--in-stock] [--origin <s>] [--process <s>] [--price-lt <cents>] [--limit <N>]"
  - name: watch save
    description: "Save a cross-roaster query that emits only new matches on subsequent runs"
    args: "<name> <query>"
  - name: watch list
    description: "List saved watch queries with last-sync-anchor"
  - name: watch run
    description: "Run a saved (or all) watch queries; emits only newly-arrived matching products"
    args: "[<name>]"
  - name: twin
    description: "Find the closest match to a bean across all roasters via attribute + descriptor similarity"
    args: "<roaster-or-product-slug> [--top <N>]"
  - name: creator-review
    description: "Lookup Hoffmann/Hedrick YouTube clips mentioning a bean or roaster (with transcript excerpts)"
    args: "<bean-or-roaster-slug>"
  - name: flavor-wheel
    description: "Map your rated brews onto the official SCA Coffee Tasters' Flavor Wheel hierarchy"
  - name: friend-pick palate-export
    description: "Export a portable JSON palate profile derived from your brews + ratings + descriptors"
    args: "<name> --out <file>"
  - name: friend-pick palate-import
    description: "Import a friend's palate profile into the local store"
    args: "<file>"
  - name: friend-pick pick
    description: "Recommend bags ranked against an imported friend's palate signature (not yours)"
    args: "<name> [--from market|shelf] [--top <N>]"
  - name: god-cup
    description: "Headline meta-recommendation: one brew pick from your shelf + one buy pick across the market, integrating shelf freshness, brew history, Coffee Review scores, and creator coverage"
    args: "[--method espresso|v60|aeropress|...]"

mcp:
  transport: [stdio, http]
