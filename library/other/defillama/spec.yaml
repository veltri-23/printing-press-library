  /equities/v1/price-history:
    get:
      tags:
      - Equities
      x-api-plan-only: true
      x-scalar-stability: beta
      summary: Get historical price data for a company
      description: 'Returns daily closing prices as two-element arrays: ISO 8601 date-time
        string, then numeric price. Sorted by date descending (newest first).'
      security:
      - ApiKeyAuth: []
      parameters:
      - name: ticker
        in: query
        description: Stock ticker symbol (case-insensitive)
        required: true
        schema:
          type: string
          example: AAPL
      - name: timeframe
        in: query
        description: Optional lookback window (case-insensitive). Omit or empty for
          full history (`MAX`).
        required: false
        schema:
          type: string
          enum:
          - 1W
          - 1M
          - 6M
          - 1Y
          - 5Y
          - MAX
          default: MAX
          example: 1Y
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                description: 'Each item is `[timestamp, price]`: ISO 8601 string,
                  then closing price.'
                items:
                  type: array
                  minItems: 2
                  maxItems: 2
                  items:
                    anyOf:
                    - type: string
                      description: ISO 8601 date-time
                    - type: number
                      description: Closing price
                example:
                - - 2026-03-21 13:33:10+00:00
                  - 197.5
                - - 2026-03-20 00:00:00+00:00
                  - 196.2
        '400':
          description: Missing required `ticker` or invalid `timeframe`
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: Invalid timeframe
                  validTimeframes:
                    type: array
                    items:
                      type: string
                    example:
                    - 1W
                    - 1M
                    - 6M
                    - 1Y
                    - 5Y
                    - MAX
        '401':
          description: Unauthorized
        '404':
          description: Prices not found for ticker
        '500':
          description: Internal server error
      servers:
      - url: https://pro-api.llama.fi
