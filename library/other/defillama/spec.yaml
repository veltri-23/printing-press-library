        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                description: Financial statements containing income statement, balance
                  sheet, and cash flow data broken down by quarterly and annual periods.
                properties:
                  incomeStatement:
                    type: object
                    description: Income statement data. The `labels` array defines
                      the rows; `values` is a parallel array of arrays where each
                      inner array holds one row's values across all periods.
                    properties:
                      labels:
                        type: array
                        description: Ordered list of income statement line items.
                          Each index corresponds to an inner array in `quarterly.values`
                          and `annual.values`.
                        items:
                          type: string
                        example:
                        - Total Revenue
                        - Cost of Revenue
                        - Gross Profit
                        - Operating Expense
                        - Operating Income
                        - Non-operating Items
                        - Income Before Tax
                        - Income Tax
                        - Net Income
                        - Net Income to Common
                        - EPS Basic
                        - EPS Diluted
                        - Weighted Average Shares Basic
                        - Weighted Average Shares Diluted
                      children:
                        type: object
                        description: Metadata describing which top-level labels have
                          child breakdowns and what those child labels are, separately
                          for quarterly and annual periods.
                        properties:
                          quarterly:
                            type: object
                            description: Child label definitions for quarterly data.
                              Keys are parent label names from `labels`.
                            additionalProperties:
                              type: object
                              properties:
                                labels:
                                  type: array
                                  description: Child line item names for this parent.
                                    Each index corresponds to an inner array in `quarterly.children[label].values`.
                                  items:
                                    type: string
                          annual:
                            type: object
                            description: Child label definitions for annual data.
                              Keys are parent label names from `labels`.
                            additionalProperties:
                              type: object
                              properties:
                                labels:
                                  type: array
                                  items:
                                    type: string
