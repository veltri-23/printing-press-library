        tokens.'
      parameters:
      - name: protocol
        in: path
        required: true
        description: protocol slug
        schema:
          type: string
          example: aave
      - name: key
        in: query
        required: false
        description: Token filter. Omit to exclude OwnTokens (default). Use "OwnTokens"
          to return only the protocol's own tokens, or "all" for the sum of all tokens
          including OwnTokens.
        schema:
          type: string
          enum:
          - OwnTokens
          - all
          example: OwnTokens
      responses:
        '200':
          description: 'Array of [timestamp, chainBreakdown] pairs. Each entry is
