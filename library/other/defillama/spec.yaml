          example: AAPL
      - name: timeframe
        in: query
        description: Optional lookback window (case-insensitive). Same values as price
          history. Omit or empty for full history (`MAX`).
        required: false
        schema:
          type: string
          enum:
          - 1W
          - 1M
          - 6M
          - 1Y
          - 5Y
          - MAX
          default: MAX
          example: 6M
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: array
                description: Each item is `[timestamp, open, high, low, close, volume]`.
                  `timestamp` is Unix epoch seconds (UTC).
                items:
                  type: array
                  minItems: 6
                  maxItems: 6
                  items:
                    type: number
                example:
                - - 1773964800
                  - 247.98
                  - 249.2
                  - 246
                  - 247.99
                  - 88268000
                - - 1773878400
                  - 249.4
