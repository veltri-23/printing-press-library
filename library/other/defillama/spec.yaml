  /api/v2/metrics/financial-statement/protocol/{protocol}:
    get:
      tags:
      - Financial Statements
      x-api-plan-only: true
      x-api-beta: true
      summary: Get protocol income statement report
      description: 'Returns protocol metadata, methodology details, and aggregated
        financial statement data (yearly, quarterly, monthly). Each period contains
        line items such as Gross Protocol Revenue, Cost Of Revenue, Gross Profit,
        Token Holder Net Income, Incentives, and Earnings, with values and optional
        label breakdowns.


        When querying a parent protocol (e.g. `aave`), the response includes a `childProtocols`
        array with per-version methodology. When querying a child protocol (e.g. `aave-v3`),
        methodology and breakdownMethodology are at the top level.'
      parameters:
      - name: protocol
        in: path
        required: true
        description: protocol slug (e.g. aave-v3, hyperliquid)
        schema:
          type: string
          example: aave-v3
      responses:
        '200':
          description: Protocol income statement report
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: Protocol ID. Parent protocols use 'parent#slug' format.
                    example: '1599'
                  name:
                    type: string
                    example: Aave V3
                  address:
                    type: string
                    nullable: true
                    example: '0x7fc66500c84a76ad7e9c93437bfc5ac33e2ddae9'
                  symbol:
                    type: string
                    nullable: true
                    example: AAVE
                  url:
                    type: string
                    example: https://aave.com
                  description:
                    type: string
                    example: Earn interest, borrow assets, and build applications
                  chain:
                    type: string
                    nullable: true
                    description: Primary chain (present for child protocols)
                    example: Optimism
                  logo:
                    type: string
                    example: https://icons.llamao.fi/icons/protocols/aave-v3.png
                  audits:
                    type: string
                    nullable: true
                    example: '2'
                  audit_links:
                    type: array
                    nullable: true
                    items:
                      type: string
                    example:
                    - https://aave.com/security
                  category:
                    type: string
                    nullable: true
                    description: Protocol category (present for child protocols)
                    example: Lending
                  chains:
                    type: array
                    items:
                      type: string
                    example:
                    - Polygon
                    - Arbitrum
                    - Avalanche
                    - OP Mainnet
                    - Ethereum
                    - Base
                  oraclesBreakdown:
                    type: array
                    nullable: true
                    description: Oracles used by the protocol
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: Chainlink
                        type:
                          type: string
                          example: Primary
                        proof:
                          type: array
                          items:
                            type: string
                  module:
                    type: string
                    nullable: true
                    example: aave-v3
                  twitter:
                    type: string
                    nullable: true
                    example: aave
                  github:
                    type: array
                    nullable: true
                    items:
                      type: string
                  listedAt:
                    type: integer
                    nullable: true
                    description: Unix timestamp when protocol was listed
                    example: 1648776877
                  parentProtocol:
                    type: string
                    nullable: true
                    description: Parent protocol ID (present for child protocols)
                    example: parent#aave
                  dimensions:
                    type: object
                    nullable: true
                    description: Available dimension adapters for this protocol
                    additionalProperties:
                      type: object
                      properties:
                        adapter:
                          type: string
                        genuineSpikes:
                          type: array
                    example:
                      fees:
                        genuineSpikes:
                        - - 2024-08-05
                          - '-'
                        adapter: aave-v3
                  methodology:
                    type: object
                    nullable: true
                    description: Maps line item names to descriptions. Present at
                      top level for child protocols, inside childProtocols for parent
                      protocols.
                    additionalProperties:
                      type: string
                    example:
                      Gross Protocol Revenue: Include borrow interest, flashloan fee,
                        liquidation fee, penalty paid by borrowers and swap fees from
                        Paraswap.
                      Cost Of Revenue: Amount of fees distributed to suppliers.
                      Gross Profit: Amount of fees go to Aave treasury.
                      Token Holder Net Income: Aave starts buy back AAVE tokens using
                        Aave Treasury after 9th April 2025.
                  breakdownMethodology:
                    type: object
                    nullable: true
                    description: Maps line item names to objects mapping label names
                      to descriptions. Present at top level for child protocols, inside
                      childProtocols for parent protocols.
                    additionalProperties:
                      type: object
                      additionalProperties:
                        type: string
                    example:
                      Gross Protocol Revenue:
                        Borrow Interest: All interest paid by borrowers from all markets
                          (excluding GHO).
                        Borrow Interest GHO: All interest paid by borrowers from GHO
                          only.
                        Liquidation Fees: Fees from liquidation penalty and bonuses.
                        Flashloan Fees: Flashloan fees paid by flashloan borrowers
                          and executors.
                        Paraswap Partner Fees: Swap fees share from Paraswap from
                          users by using Aave frontend.
                      Cost Of Revenue:
                        Borrow Interest: Amount of interest distributed to lenders
                          from all markets (excluding GHO).
                        Liquidation Fees: Fees from liquidation penalty and bonuses
                          are distributed to lenders.
                      Gross Profit:
                        Borrow Interest: A portion of interest paid by borrowers from
                          all markets (excluding GHO).
                        Borrow Interest GHO: All 100% interest paid by GHO borrowers.
                        Liquidation Fees: A portion of fees from liquidation penalty
                          and bonuses.
                      Token Holder Net Income:
                        Token Buy Back: Aave starts buy back AAVE tokens using Aave
                          Treasury after 9th April 2025.
                  methodologyURL:
                    type: string
                    nullable: true
                    example: https://github.com/DefiLlama/dimension-adapters/blob/master/fees/aave-v3.ts
                  tvlCodePath:
                    type: string
                    nullable: true
                    example: https://github.com/DefiLlama/DefiLlama-Adapters/blob/main/projects/aave-v3/index.js
                  hallmarks:
                    type: array
                    nullable: true
                    description: Notable events as [timestamp, description] pairs
                    items:
                      type: array
                      items: {}
                    example:
                    - - 1650412800
                      - Start AVAX Rewards
                    - - 1659571200
                      - Start OP Rewards
                  linkedProtocols:
                    type: array
                    items:
                      type: string
                    example:
                    - Aave
                    - Aave V2
                    - Aave V3
                  childProtocols:
                    type: array
                    nullable: true
                    description: Child protocol versions with their methodology details.
                      Only present for parent protocols.
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                          example: Aave V3
                        defillamaId:
                          type: string
                          example: '1599'
                        displayName:
                          type: string
                        methodologyURL:
                          type: string
                          nullable: true
                        methodology:
                          type: object
                          additionalProperties:
                            type: string
                        breakdownMethodology:
                          type: object
                          additionalProperties:
                            type: object
                            additionalProperties:
                              type: string
                  hasLabelBreakdown:
                    type: boolean
                    example: true
                  defillamaId:
                    type: string
                    example: '1599'
                  displayName:
                    type: string
                    example: Aave V3
                  slug:
                    type: string
                    example: aave-v3
                  protocolType:
                    type: string
                    example: protocol
                  aggregates:
                    type: object
                    description: Financial data aggregated by time period
                    properties:
                      yearly:
                        type: object
                        description: Keyed by year (e.g. '2024'). Each value is an
                          object of line items.
                        additionalProperties:
                          type: object
                          description: Financial line items for a time period. Common
                            line items include Gross Protocol Revenue, Cost Of Revenue,
                            Gross Profit, Token Holder Net Income, Incentives, and
                            Earnings. Each line item has a value and optional by-label
                            breakdown.
                          additionalProperties:
                            type: object
                            properties:
                              value:
                                type: number
                                description: Total USD value for this line item in
                                  the period
                                example: 456472580
                              by-label:
                                type: object
                                description: Breakdown by label (e.g. Borrow Interest,
                                  Liquidation Fees, Flash Loans). Not present for
                                  all line items.
                                nullable: true
                                additionalProperties:
                                  type: number
                                example:
                                  Borrow Interest: 416862749
                                  Liquidation Fees: 31413361
                                  Flashloan Fees: 1441
                          example:
                            Gross Protocol Revenue:
                              value: 456472580
                              by-label:
                                Borrow Interest: 416862749
                                Liquidation Fees: 31413361
                                Flashloan Fees: 1441
                            Cost Of Revenue:
                              value: 384670312
                              by-label:
                                Borrow Interest: 356424169
                                Liquidation Fees: 28246110
                            Gross Profit:
                              value: 71802305
                            Token Holder Net Income:
                              value: 0
                            Incentives:
                              value: 4895806.72
                              by-label:
                                stkAAVE Rewards: 19461161.65
                                Lending/Borrowing Rewards: 1197840.72
                            Earnings:
                              value: 66906498.28
                      quarterly:
                        type: object
                        description: Keyed by quarter (e.g. '2024-Q1'). Each value
                          is an object of line items.
                        additionalProperties:
                          type: object
                          description: Financial line items for a time period.
                          additionalProperties:
                            type: object
                            properties:
                              value:
                                type: number
                                description: Total USD value for this line item in
                                  the period
                                example: 456472580
                              by-label:
                                type: object
                                description: Breakdown by label. Not present for all
                                  line items.
                                nullable: true
                                additionalProperties:
                                  type: number
                      monthly:
                        type: object
                        description: Keyed by month (e.g. '2024-01'). Each value is
                          an object of line items.
                        additionalProperties:
                          type: object
                          description: Financial line items for a time period.
                          additionalProperties:
                            type: object
                            properties:
                              value:
                                type: number
                                description: Total USD value for this line item in
                                  the period
                                example: 456472580
                              by-label:
                                type: object
                                description: Breakdown by label. Not present for all
                                  line items.
                                nullable: true
                                additionalProperties:
                                  type: number
        '404':
          description: Protocol not found
      servers:
      - url: https://pro-api.llama.fi
