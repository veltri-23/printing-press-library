      x-api-beta: true
      summary: Get historical treasury chart for a protocol
      description: Returns an array of [timestamp, value] pairs representing the protocol's
        treasury value over time. By default excludes the protocol's own tokens (OwnTokens).
      parameters:
      - name: protocol
        in: path
        required: true
        description: protocol slug
        schema:
          type: string
          example: uniswap
      - name: key
        in: query
        required: false
        description: Token filter. Omit to exclude OwnTokens (default). Use "OwnTokens"
          to return only the protocol's own tokens, or "all" for the sum of all tokens
          including OwnTokens.
        schema:
          type: string
          enum:
          - OwnTokens
          - all
          example: all
      responses:
        '200':
          description: Array of [timestamp, value] pairs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: array
                  items:
                    type: number
                  minItems: 2
                  maxItems: 2
                  example:
                  - 1609459200
                  - 120000000
        '404':
          description: Protocol not found
      servers:
      - url: https://pro-api.llama.fi
