openapi: 3.1.1
info:
  description: "## Using AI?\n\nDefiLlama offers two ways to use our data with AI:\n\
    \n| Resource | For | Description |\n|---|---|---|\n| <a href='/llms.txt'><b>llms.txt</b></a>\
    \ | AI assistants (ChatGPT, Claude, Cursor, etc.) | Paste this link into your\
    \ AI assistant for LLM-optimized docs |\n| <a href='https://defillama.com/mcp'><b>MCP\
    \ Server</b></a> | AI agents | Connect your agent directly to DefiLlama data \u2014\
    \ 23 tools, requires an API plan |\n\n**Quick start (MCP)** \u2014 paste this\
    \ into your AI agent:\n```\nRead https://raw.githubusercontent.com/DefiLlama/defillama-skills/refs/heads/master/defillama-setup/SKILL.md\
    \ and follow the instructions to connect to DefiLlama MCP\n```\n\n---\n\nNeed\
    \ higher rate limits or priority support? We offer a premium plan for 300$/mo.\
    \ To get it, go to https://defillama.com/subscription\n\n## SDK\n\n**JavaScript**\
    \ \u2014 `npm install @defillama/api` \u2014 [GitHub](https://github.com/DefiLlama/api-sdk)\n\
    \n**Python** \u2014 `pip install defillama-sdk` \u2014 [GitHub](https://github.com/DefiLlama/python-sdk)\n\
    \nQuick start (JavaScript):\n```ts\nimport { DefiLlama } from '@defillama/api'\n\
    \nconst client = new DefiLlama()\nconst protocols = await client.tvl.getProtocols()\n\
    ```\n\nQuick start (Python):\n```py\nfrom defillama_sdk import DefiLlama\n\nclient\
    \ = DefiLlama()\nprotocols = client.tvl.getProtocols()\n```"
  version: 1.0.0-oas3
  title: DefiLlama API
  x-scalar-sdk-installation:
  - lang: node
    description: 'Install the DefiLlama JavaScript SDK:'
    source: npm install @defillama/api
  - lang: js
    description: 'Install the DefiLlama JavaScript SDK:'
    source: npm install @defillama/api
  - lang: python
    description: 'Install the DefiLlama Python SDK:'
    source: pip install defillama-sdk
tags:
- name: TVL
  description: Retrieve TVL data
- name: coins
  description: General blockchain data used by defillama and open-sourced
- name: stablecoins
  description: Data from our stablecoins dashboard
- name: yields
  description: Data from our yields/APY dashboard
- name: volumes
  description: Data from our volumes dashboards
- name: fees and revenue
  description: Data from our fees and revenue dashboard
servers:
- url: https://api.llama.fi
paths:
  /protocols:
    get:
      tags:
      - TVL
      summary: List all protocols on defillama along with their tvl
      responses:
        '200':
          description: Array of all protocols with their TVL data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      example: '2269'
                    name:
                      type: string
                      example: Aave
                    symbol:
                      type: string
                      example: AAVE
                    category:
                      type: string
                      example: Lending
                    chains:
                      type: array
                      items:
                        type: string
                      example:
                      - Ethereum
                      - Polygon
                    tvl:
                      type: number
                      example: 5200000000
                    chainTvls:
                      type: object
                      additionalProperties:
                        type: number
                      example:
                        Ethereum: 3200000000
                        Polygon: 2000000000
                    change_1d:
                      type: number
                      example: 2.1
                    change_7d:
                      type: number
                      example: -5.3
      x-codeSamples:
      - lang: javascript
        label: JavaScript SDK
        source: const result = await client.tvl.getProtocols()
      - lang: python
        label: Python SDK
        source: result = client.tvl.getProtocols()
  /protocol/{protocol}:
    get:
      tags:
      - TVL
      summary: Get historical TVL of a protocol and breakdowns by token and chain
      parameters:
      - name: protocol
        in: path
        description: protocol slug
        required: true
        schema:
          type: string
          example: aave
      responses:
        '200':
          description: Protocol details with historical TVL data and chain breakdowns
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: parent#aave
                  name:
                    type: string
                    example: AAVE
                  symbol:
                    type: string
                    example: AAVE
                  category:
                    type: string
                    example: Lending
                  chains:
                    type: array
                    items:
                      type: string
                    example:
                    - Ethereum
                    - Polygon
                    - Avalanche
                  currentChainTvls:
                    type: object
                    additionalProperties:
                      type: number
                    example:
                      Ethereum: 3200000000
                      Polygon: 1500000000
                  chainTvls:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        tvl:
                          type: array
                          items:
                            type: object
                            properties:
                              date:
                                type: number
                                example: 1609459200
                              totalLiquidityUSD:
                                type: number
                                example: 1000000
                        tokens:
                          type: array
                          items:
                            type: object
                            properties:
                              date:
                                type: number
                                example: 1609459200
                              tokens:
                                type: object
                                additionalProperties:
                                  type: number
                                example:
                                  USDC: 1000000
                                  USDT: 800000
        '404':
          description: Protocol not found
      x-codeSamples:
      - lang: javascript
        label: JavaScript SDK
        source: const result = await client.tvl.getProtocol('<protocol>')
      - lang: python
        label: Python SDK
        source: result = client.tvl.getProtocol('<protocol>')
  /v2/historicalChainTvl:
    get:
      tags:
      - TVL
      summary: Get historical TVL (excludes liquid staking and double counted tvl)
        of DeFi on all chains
      responses:
        '200':
          description: Historical TVL data for all chains combined
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    date:
                      type: number
                      description: Unix timestamp
                      example: 1609459200
                    tvl:
                      type: number
                      description: Total Value Locked in USD across all chains
                      example: 15000000000
      x-codeSamples:
      - lang: javascript
        label: JavaScript SDK
        source: const result = await client.tvl.getHistoricalChainTvl()
      - lang: python
        label: Python SDK
        source: result = client.tvl.getHistoricalChainTvl()
  /v2/historicalChainTvl/{chain}:
    get:
      tags:
      - TVL
      summary: Get historical TVL (excludes liquid staking and double counted tvl)
        of a chain
      parameters:
      - name: chain
        in: path
        required: true
        description: chain slug, you can get these from /chains or the chains property
          on /protocols
        schema:
          type: string
          example: Ethereum
      responses:
        '200':
          description: Historical TVL data for the specified chain
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    date:
                      type: number
                      description: Unix timestamp
                      example: 1609459200
                    tvl:
                      type: number
                      description: Total Value Locked in USD for this chain
                      example: 45000000000
        '404':
          description: Chain not found
      x-codeSamples:
      - lang: javascript
        label: JavaScript SDK
        source: const result = await client.tvl.getHistoricalChainTvl('<chain>')
      - lang: python
        label: Python SDK
        source: result = client.tvl.getHistoricalChainTvl()
  /tvl/{protocol}:
    get:
      tags:
      - TVL
      summary: Simplified endpoint to get current TVL of a protocol
      description: Simplified endpoint that only returns a number, the current TVL
        of a protocol
      parameters:
      - name: protocol
        in: path
        required: true
        description: protocol slug
        schema:
          type: string
          example: uniswap
      responses:
        '200':
          description: Current TVL of the protocol in USD
          content:
            application/json:
              schema:
                type: number
                description: Total Value Locked in USD
                example: 4962012809.795062
        '404':
          description: Protocol not found
      x-codeSamples:
      - lang: javascript
        label: JavaScript SDK
        source: const result = await client.tvl.getTvl('<protocol>')
      - lang: python
        label: Python SDK
        source: result = client.tvl.getTvl('<protocol>')
  /v2/chains:
    get:
      tags:
      - TVL
      summary: Get current TVL of all chains
      responses:
        '200':
          description: Array of all chains with their TVL data
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    gecko_id:
                      type: string
                      nullable: true
                      description: CoinGecko ID for the chain's native token
                      example: ethereum
                    tvl:
                      type: number
                      description: Total Value Locked in USD
                      example: 65998652431.40251
                    tokenSymbol:
                      type: string
                      nullable: true
                      description: Native token symbol
                      example: ETH
                    cmcId:
                      type: string
                      nullable: true
                      description: CoinMarketCap ID
                      example: '1027'
                    name:
                      type: string
                      description: Chain name
                      example: Ethereum
                    chainId:
                      type: number
                      nullable: true
                      description: Chain ID number
                      example: 1
      x-codeSamples:
      - lang: javascript
        label: JavaScript SDK
        source: const result = await client.tvl.getChains()
      - lang: python
        label: Python SDK
        source: result = client.tvl.getChains()
  /prices/current/{coins}:
    get:
      tags:
      - coins
      summary: Get current prices of tokens by contract address
      description: "The goal of this API is to price as many tokens as possible, including\
        \ exotic ones that never get traded, which makes them impossible to price\
        \ by looking at markets.\n\nThe base of our data are prices pulled from coingecko,\
        \ which is then extended through multiple means:\n- We price all bridged tokens\
        \ by using the price of the token in it's original chain, so we fetch all\
        \ bridged versions of USDC on arbitrum, fantom, avax... and price all them\
        \ using the price for the token on Ethereum, which we know. Right now we support\
        \ 10 different bridging protocols.\n- We have multiple adapters to price specialized\
        \ sets of tokens by running custom code:\n  - We price yearn's yToken LPs\
        \ by checking how much underlying token can be withdrawn for each LP\n  -\
        \ Aave, compound and euler LP tokens are also priced based on their relationship\
        \ against underlying tokens\n  - Uniswap, curve, balancer and stargate LPs\
        \ are priced using the underlying tokens in each pair\n  - GMX's GLP token\
        \ is priced based on the value of tokens given on withdrawal (which includes\
        \ calculations based on trader's PnL)\n  \n  - Synthetix tokens are priced\
        \ using forex prices of the coin they are pegged to\n- For tokens that we\
        \ haven't been able to price in any other way, we find the pool with most\
        \ liquidity for each on uniswap, curve and serum and then use the prices provided\
        \ on those exchanges.\n  \n  Unlike all the other tokens, we can't confirm\
        \ that these prices are correct, so we only ingest the ones that have sufficient\
        \ liquidity and, even in that case, we attach a `confidence` value to them\
        \ that is related to the depth of liquidity and which represents our confidence\
        \ in the quality of each price. API consumers can choose to filter out prices\
        \ with low confidence values.\n  \n Our API server is fully open source and\
        \ we are constantly adding more pricing adapters, extending the amount of\
        \ tokens we support.\n\n  \nTokens are queried using {chain}:{address}, where\
        \ chain is an identifier such as ethereum, bsc, polygon, avax... You can also\
        \ get tokens by coingecko id by setting `coingecko` as the chain, eg: coingecko:ethereum,\
        \ coingecko:bitcoin. Examples:\n  - ethereum:0xdF574c24545E5FfEcb9a659c229253D4111d87e1\n\
        \  - bsc:0x762539b45a1dcce3d36d080f74d1aed37844b878\n  - coingecko:ethereum\n\
        \  - arbitrum:0x4277f8f2c384827b5273592ff7cebd9f2c1ac258\n"
      servers:
      - url: https://coins.llama.fi
      parameters:
      - name: coins
        in: path
        required: true
        description: set of comma-separated tokens defined as {chain}:{address}
        schema:
          type: string
          example: ethereum:0xdF574c24545E5FfEcb9a659c229253D4111d87e1,coingecko:ethereum,bsc:0x762539b45a1dcce3d36d080f74d1aed37844b878,ethereum:0xdB25f211AB05b1c97D595516F45794528a807ad8
      - name: searchWidth
        in: query
        required: false
        description: time range on either side to find price data, defaults to 6 hours
        schema:
          type: string
          example: 4h
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  coins:
                    type: object
                    properties:
                      ethereum:0xdF574c24545E5FfEcb9a659c229253D4111d87e1:
                        type: object
                        required:
                        - price
                        - symbol
                        - timestamp
                        properties:
                          decimals:
                            type: number
                            description: Token decimals. Omitted for coingecko-native
                              assets (e.g. coingecko:ethereum).
                            example: 8
                          price:
                            type: number
                            example: 0.022053735051098835
                          symbol:
                            type: string
                            example: cDAI
                          timestamp:
                            type: number
                            example: 0.99
                          confidence:
                            type: number
                            description: Confidence score between 0 and 1 indicating
                              the reliability of the price.
                            example: 0.99
        '502':
          description: Internal error
      x-codeSamples:
      - lang: javascript
        label: JavaScript SDK
        source: const result = await client.prices.getCurrentPrices(['<coins>'])
      - lang: python
        label: Python SDK
        source: result = client.prices.getCurrentPrices(['<coins>'])
  /prices/historical/{timestamp}/{coins}:
    get:
      tags:
      - coins
      summary: Get historical prices of tokens by contract address
      description: See /prices/current for explanation on how prices are sourced.
      servers:
      - url: https://coins.llama.fi
      parameters:
      - name: coins
        in: path
        required: true
        description: set of comma-separated tokens defined as {chain}:{address}
        schema:
          type: string
          example: ethereum:0xdF574c24545E5FfEcb9a659c229253D4111d87e1,coingecko:ethereum,bsc:0x762539b45a1dcce3d36d080f74d1aed37844b878,ethereum:0xdB25f211AB05b1c97D595516F45794528a807ad8
      - name: timestamp
        in: path
        required: true
        description: UNIX timestamp of time when you want historical prices
        schema:
          type: number
          example: 1648680149
      - name: searchWidth
        in: query
        required: false
        description: time range on either side to find price data, defaults to 6 hours
        schema:
          type: string
          example: 4h
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  coins:
                    type: object
                    properties:
                      ethereum:0xdF574c24545E5FfEcb9a659c229253D4111d87e1:
                        type: object
                        required:
                        - price
                        - symbol
                        - timestamp
                        properties:
                          decimals:
                            type: number
                            description: Token decimals. Omitted for coingecko-native
                              assets (e.g. coingecko:ethereum).
                            example: 8
                          price:
                            type: number
                            example: 0.022053735051098835
                          symbol:
                            type: string
                            example: cDAI
                          timestamp:
                            type: number
                            example: 1648680149
                          confidence:
                            type: number
                            description: Confidence score between 0 and 1 indicating
                              the reliability of the price.
                            example: 0.99
        '502':
          description: Internal error
      x-codeSamples:
      - lang: javascript
        label: JavaScript SDK
        source: const result = await client.prices.getHistoricalPrices(1704067200,
          ['<coins>'])
      - lang: python
        label: Python SDK
        source: result = client.prices.getHistoricalPrices(1704067200, ['<coins>'])
  /batchHistorical:
    get:
      tags:
      - coins
      summary: Get historical prices for multiple tokens at multiple different timestamps
      description: "Strings accepted by period and searchWidth:\nCan use regular chart\
        \ candle notion like \u20184h\u2019 etc where:\nW = week, D = day, H = hour,\
        \ M = minute (not case sensitive)\n"
      servers:
      - url: https://coins.llama.fi
      parameters:
      - name: coins
        in: query
        required: true
        description: object where keys are coins in the form {chain}:{address}, and
          values are arrays of requested timestamps
        schema:
          type: string
          example: '{"avax:0xb97ef9ef8734c71904d8002f8b6bc66dd9c48a6e": [1666876743,
            1666862343], "coingecko:ethereum": [1666869543, 1666862343]}

            '
      - name: searchWidth
        in: query
        required: false
        description: time range on either side to find price data, defaults to 6 hours
        schema:
          type: string
          example: 600
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  coins:
                    type: object
                    properties:
                      avax:0xb97ef9ef8734c71904d8002f8b6bc66dd9c48a6e:
                        type: object
                        properties:
                          symbol:
                            type: string
                            example: USDC
                          prices:
                            type: array
                            items:
                              type: object
                              properties:
                                timestamp:
                                  type: number
                                  example: 1666876674
                                price:
                                  type: number
                                  example: 0.999436
                                confidence:
                                  type: number
                                  example: 0.99
        '502':
          description: Internal error
      x-codeSamples:
      - lang: javascript
        label: JavaScript SDK
        source: 'const result = await client.prices.getBatchHistoricalPrices({ ''<coins>'':
          [1704067200] })'
      - lang: python
        label: Python SDK
        source: result = client.prices.getBatchHistoricalPrices(['<coins>'], '<List[int]]>')
  /chart/{coins}:
    get:
      tags:
      - coins
      summary: Get token prices at regular time intervals
      description: "Strings accepted by period and searchWidth:\nCan use regular chart\
        \ candle notion like \u20184h\u2019 etc where:\nW = week, D = day, H = hour,\
        \ M = minute (not case sensitive)\n"
      servers:
      - url: https://coins.llama.fi
      parameters:
      - name: coins
        in: path
        required: true
        description: set of comma-separated tokens defined as {chain}:{address}
        schema:
          type: string
          example: ethereum:0xdF574c24545E5FfEcb9a659c229253D4111d87e1,coingecko:ethereum,bsc:0x762539b45a1dcce3d36d080f74d1aed37844b878,ethereum:0xdB25f211AB05b1c97D595516F45794528a807ad8
      - name: start
        in: query
        required: false
        description: unix timestamp of earliest data point requested
        schema:
          type: number
          example: 1664364537
      - name: end
        in: query
        required: false
        description: unix timestamp of latest data point requested
        schema:
          type: number
          example: null
      - name: span
        in: query
        required: false
        description: number of data points returned, defaults to 0
        schema:
          type: number
          example: 10
      - name: period
        in: query
        required: false
        description: duration between data points, defaults to 24 hours
        schema:
          type: string
          example: 2d
      - name: searchWidth
        in: query
        required: false
        description: time range on either side to find price data, defaults to 10%
          of period
        schema:
          type: string
          example: 600
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  coins:
                    type: object
                    properties:
                      ethereum:0xdF574c24545E5FfEcb9a659c229253D4111d87e1:
                        type: object
                        required:
                        - confidence
                        - prices
                        - symbol
                        properties:
                          decimals:
                            type: number
                            description: Token decimals. Omitted for coingecko-native
                              assets (e.g. coingecko:ethereum).
                            example: 8
                          confidence:
                            type: number
                            description: Confidence score between 0 and 1 indicating
                              the reliability of the price.
                            example: 0.99
                          prices:
                            type: array
                            items:
                              type: object
                              properties:
                                timestamp:
                                  type: number
                                  example: 1666790570
                                price:
                                  type: number
                                  example: 0.984519
                          symbol:
                            type: string
                            example: HUSD
        '502':
          description: Internal error
      x-codeSamples:
      - lang: javascript
        label: JavaScript SDK
        source: const result = await client.prices.getChart(['<coins>'])
      - lang: python
        label: Python SDK
        source: result = client.prices.getChart(['<coins>'])
  /percentage/{coins}:
    get:
      tags:
      - coins
      summary: Get percentage change in price over time
      description: "Strings accepted by period:\nCan use regular chart candle notion\
        \ like \u20184h\u2019 etc where:\nW = week, D = day, H = hour, M = minute\
        \ (not case sensitive)\n"
      servers:
      - url: https://coins.llama.fi
      parameters:
      - name: coins
        in: path
        required: true
        description: set of comma-separated tokens defined as {chain}:{address}
        schema:
          type: string
          example: ethereum:0xdF574c24545E5FfEcb9a659c229253D4111d87e1,coingecko:ethereum,bsc:0x762539b45a1dcce3d36d080f74d1aed37844b878,ethereum:0xdB25f211AB05b1c97D595516F45794528a807ad8
      - name: timestamp
        in: query
        required: false
        description: timestamp of data point requested, defaults to time now
        schema:
          type: number
          example: 1664364537
      - name: lookForward
        in: query
        required: false
        description: whether you want the duration after your given timestamp or not,
          defaults to false (looking back)
        schema:
          type: boolean
          example: false
      - name: period
        in: query
        required: false
        description: duration between data points, defaults to 24 hours
        schema:
          type: string
          example: 3w
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  coins:
                    type: object
                    properties:
                      ethereum:0xdF574c24545E5FfEcb9a659c229253D4111d87e1:
                        type: number
                        example: -2.3009954568977147
        '502':
          description: Internal error
      x-codeSamples:
      - lang: javascript
        label: JavaScript SDK
        source: const result = await client.prices.getPercentageChange(['<coins>'])
      - lang: python
        label: Python SDK
        source: result = client.prices.getPercentageChange(['<coins>'])
  /prices/first/{coins}:
    get:
      tags:
      - coins
