  /api/v2/chart/treasury/protocol/{protocol}/token-breakdown:
    get:
      tags:
      - Treasury
      x-api-plan-only: true
      x-api-beta: true
      summary: Get historical treasury chart for a protocol broken down by token
      description: 'Returns an array of [timestamp, { token: value }] pairs showing
        treasury value per token over time. By default excludes OwnTokens and values
        are in USD. Use key and currency params to customize.'
      parameters:
      - name: protocol
        in: path
        required: true
        description: protocol slug
        schema:
          type: string
          example: aave
      - name: key
        in: query
        required: false
        description: Token filter. Omit to exclude OwnTokens (default). Use "OwnTokens"
          to return only the protocol's own tokens, or "all" for the sum of all tokens
          including OwnTokens.
        schema:
          type: string
          enum:
          - OwnTokens
          - all
          example: OwnTokens
      - name: currency
        in: query
        required: false
        description: Set to "tokens" to return values denominated in raw token amounts
          instead of USD
        schema:
          type: string
          enum:
          - usd
          - token
          - raw
          example: usd
      responses:
        '200':
          description: 'Array of [timestamp, tokenBreakdown] pairs. Each entry is
            a two-element array: first element is a unix timestamp, second is an object
            mapping token names to treasury values (USD by default, raw token amounts
            if currency=tokens).'
          content:
            application/json:
              schema:
                type: array
                example:
                - - 1609459200
