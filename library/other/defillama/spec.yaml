      summary: Get historical RWA metric breakdown by chain
      description: Returns time series rows with one column per chain for the selected
        RWA metric.
      parameters:
      - name: key
        in: query
        required: false
        description: Metric to break down by chain. Defaults to onChainMcap.
        schema:
          type: string
          enum:
          - onChainMcap
          - activeMcap
          - defiActiveTvl
          example: activeMcap
