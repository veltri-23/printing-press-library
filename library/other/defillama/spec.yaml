  /api/v2/chart/tvl/protocol/{protocol}:
    get:
      tags:
      - TVL
      x-api-plan-only: true
      x-api-beta: true
      summary: Get historical TVL chart for a protocol
      description: Returns an array of [timestamp, value] pairs representing the protocol's
        TVL over time. By default returns the base TVL metric. Use the `key` parameter
        to select a different metric or aggregate all metrics.
      parameters:
      - name: protocol
        in: path
        required: true
        description: protocol slug
        schema:
          type: string
          example: uniswap
      - name: key
        in: query
        required: false
        description: Metric to return. Omit for default TVL. Use "all" for the sum
          of tvl+borrowed+staking+pool2+vesting, or a specific metric like "staking",
          "borrowed", "vesting", "pool2".
        schema:
          type: string
          enum:
          - all
          - staking
          - borrowed
          - vesting
          - pool2
          example: all
      responses:
        '200':
          description: Array of [timestamp, value] pairs
          content:
            application/json:
              schema:
                type: array
                items:
                  type: array
                  items:
                    type: number
                  minItems: 2
                  maxItems: 2
                  example:
                  - 1609459200
                  - 5200000000
        '404':
          description: Protocol not found
      servers:
      - url: https://pro-api.llama.fi
  /api/v2/chart/tvl/protocol/{protocol}/chain-breakdown:
    get:
      tags:
      - TVL
      x-api-plan-only: true
      x-api-beta: true
      summary: Get historical TVL chart for a protocol broken down by chain
      description: 'Returns an array of [timestamp, { chain: value }] pairs showing
        the selected metric per chain over time.'
      parameters:
      - name: protocol
        in: path
        required: true
        description: protocol slug
        schema:
          type: string
          example: euler
      - name: key
        in: query
        required: false
        description: Metric to return. Omit for default TVL. Use "all" for the sum
          of tvl+borrowed+staking+pool2+vesting, or a specific metric like "staking",
          "borrowed", "vesting", "pool2".
        schema:
          type: string
          enum:
          - all
          - staking
          - borrowed
          - vesting
          - pool2
          example: borrowed
      responses:
        '200':
          description: 'Array of [timestamp, chainBreakdown] pairs. Each entry is
            a two-element array: first element is a unix timestamp, second is an object
            mapping chain names to values.'
          content:
            application/json:
              schema:
                type: array
                example:
                - - 1609459200
                  - Ethereum: 3200000000
                    Polygon: 1500000000
                - - 1609545600
                  - Ethereum: 3250000000
                    Polygon: 1520000000
        '404':
          description: Protocol not found
      servers:
      - url: https://pro-api.llama.fi
  /api/v2/chart/tvl/protocol/{protocol}/token-breakdown:
    get:
      tags:
      - TVL
      x-api-plan-only: true
      x-api-beta: true
      summary: Get historical TVL chart for a protocol broken down by token
      description: 'Returns an array of [timestamp, { token: value }] pairs showing
        TVL per token over time. Values are in USD by default, set currency=tokens
        for raw token amounts.'
      parameters:
      - name: protocol
        in: path
        required: true
        description: protocol slug
        schema:
          type: string
          example: aave
      - name: key
        in: query
        required: false
        description: Metric to return. Omit for default TVL. Use "all" for the sum
          of tvl+borrowed+staking+pool2+vesting, or a specific metric like "staking",
          "borrowed", "vesting", "pool2".
        schema:
          type: string
          enum:
          - all
          - staking
          - borrowed
          - vesting
          - pool2
      - name: currency
        in: query
        required: false
        description: Set to "tokens" to return values denominated in raw token amounts
          instead of USD
        schema:
          type: string
          enum:
          - usd
          - token
          - raw
          example: usd
      responses:
        '200':
          description: 'Array of [timestamp, tokenBreakdown] pairs. Each entry is
            a two-element array: first element is a unix timestamp, second is an object
            mapping token names to values (USD by default, raw token amounts if currency=tokens).'
          content:
            application/json:
              schema:
                type: array
                example:
