      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  coins:
                    type: object
                    properties:
                      ethereum:0xdF574c24545E5FfEcb9a659c229253D4111d87e1:
                        type: object
                        properties:
                          price:
                            type: number
                            example: 0.9992047673109988
                          symbol:
                            type: string
                            example: HUSD
                          timestamp:
                            type: number
                            example: 1568883821
        '502':
          description: Internal error
      x-codeSamples:
      - lang: javascript
        label: JavaScript SDK
        source: const result = await client.prices.getFirstPrices(['<coins>'])
      - lang: python
        label: Python SDK
        source: result = client.prices.getFirstPrices(['<coins>'])
  /block/{chain}/{timestamp}:
    get:
      tags:
      - coins
      summary: Get the closest block to a timestamp
      description: 'Runs binary search over a blockchain''s blocks to get the closest
        one to a timestamp.

        Every time this is run we add new data to our database, so each query permanently
        speeds up future queries.

        '
      servers:
      - url: https://coins.llama.fi
      parameters:
      - name: chain
        in: path
        description: Chain which you want to get the block from
        required: true
        schema:
          type: string
          example: ethereum
      - name: timestamp
        in: path
        description: UNIX timestamp of the block you are searching for
        required: true
        schema:
          type: integer
          example: 1603964988
      responses:
        '200':
          description: successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  height:
                    type: integer
                    format: uint
                    example: 11150916
                  timestamp:
                    type: integer
                    format: uint
                    example: 1603964988
        '400':
          description: Invalid chain or timestamp provided
      x-codeSamples:
      - lang: javascript
        label: JavaScript SDK
        source: const result = await client.prices.getBlockAtTimestamp('<chain>',
          1704067200)
      - lang: python
        label: Python SDK
        source: result = client.prices.getBlockAtTimestamp('<chain>', 1704067200)
