        snapshot (no `ticker` / `name` fields); use `GET /equities/v1/companies` for
        the list shape that includes company identity and balance-sheet highlights.
      security:
      - ApiKeyAuth: []
      parameters:
      - name: ticker
        in: query
        description: Stock ticker symbol (case-insensitive)
        required: true
        schema:
          type: string
          example: AAPL
      responses:
        '200':
          description: Successful operation
          content:
            application/json:
              schema:
                type: object
                properties:
                  currentPrice:
                    type: number
                    example: 247.99
                  volume:
                    type: number
                    example: 87981315
                  marketCap:
                    type: number
                    example: 3644938780672
                  fiftyTwoWeekHigh:
                    type: number
                    example: 288.62
                  fiftyTwoWeekLow:
                    type: number
                    example: 169.21
                  dividendYield:
                    type: number
                    nullable: true
                    example: 0.4137
                  trailingPE:
                    type: number
                    nullable: true
                    example: 31.35
                  priceChangePercentage1d:
                    type: number
                    example: -0.39
                  priceToBook:
                    type: number
                    nullable: true
                    example: 41.35
                  updatedAt:
                    type: string
                    format: date-time
                    example: 2026-03-21 07:31:15+00:00
                  priceChangePercentage7d:
                    type: number
                    example: -1.91
                  priceChangePercentage1m:
                    type: number
                    example: -4.83
                  revenueTTM:
                    type: number
                    nullable: true
                    example: 435617000000
                  grossProfitTTM:
                    type: number
                    nullable: true
                    example: 206157000000
                  totalAssets:
                    type: number
                    nullable: true
                    example: 379297000000
                  earningsTTM:
                    type: number
                    nullable: true
                    example: 117777000000
        '400':
          description: Missing required ticker parameter
        '401':
          description: Unauthorized
        '404':
          description: Summary not found for ticker
        '500':
          description: Internal server error
      servers:
      - url: https://pro-api.llama.fi
