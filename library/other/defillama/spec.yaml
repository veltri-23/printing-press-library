                type: object
                properties:
                  error:
                    type: string
                    example: Invalid timeframe
                  validTimeframes:
                    type: array
                    items:
                      type: string
                    example:
                    - 1W
                    - 1M
                    - 6M
                    - 1Y
                    - 5Y
                    - MAX
        '401':
          description: Unauthorized
        '404':
          description: OHLCV not found for ticker
        '500':
          description: Internal server error
      servers:
      - url: https://pro-api.llama.fi
