      summary: Get all transactions for a bridge within a date range
      servers:
      - url: https://pro-api.llama.fi
      parameters:
      - name: id
        in: path
        required: true
        description: bridge ID, you can get these from /bridges
        schema:
          type: integer
          example: 1
      - name: starttimestamp
        in: query
        required: false
        description: start timestamp (Unix Timestamp) for date range
        schema:
          type: integer
          example: 1667260800
      - name: endtimestamp
        in: query
        required: false
        description: end timestamp (Unix timestamp) for date range
        schema:
          type: integer
          example: 1667347200
      - name: sourcechain
        in: query
        required: false
        description: Returns only transactions that are bridging from the specified
          source chain.
        schema:
          type: string
          example: Polygon
      - name: address
        in: query
        required: false
        description: Returns only transactions with specified address as "from" or
          "to". Addresses are quried in the form {chain}:{address}, where chain is
          an identifier such as ethereum, bsc, polygon, avax... .
        schema:
          type: string
          example: ethereum:0x69b4B4390Bd1f0aE84E090Fe8af7AbAd2d95Cc8E
