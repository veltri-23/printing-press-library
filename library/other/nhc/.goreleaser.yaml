version: 2
project_name: nhc-pp-cli
changelog:
  disable: true
builds:
  - id: nhc-pp-cli
    main: ./cmd/nhc-pp-cli
    binary: nhc-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/nhc/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: nhc-pp-mcp
    main: ./cmd/nhc-pp-mcp
    binary: nhc-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: nhc-pp-cli
    repository:
      owner: abe238
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Credible, real-time National Hurricane Center data for AI agents: active storms, parsed advisories"
    install: |
      bin.install "nhc-pp-cli"
      bin.install "nhc-pp-mcp"
