version: 2
project_name: shelters-pp-cli
changelog:
  disable: true
builds:
  - id: shelters-pp-cli
    main: ./cmd/shelters-pp-cli
    binary: shelters-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/shelters/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: shelters-pp-mcp
    main: ./cmd/shelters-pp-mcp
    binary: shelters-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: shelters-pp-cli
    repository:
      owner: abe-diaz-abe238
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Credible, real-time disaster shelter information for AI agents and people"
    install: |
      bin.install "shelters-pp-cli"
      bin.install "shelters-pp-mcp"
