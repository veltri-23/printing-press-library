version: 2
project_name: function-health-pp-cli
changelog:
  disable: true
builds:
  - id: function-health-pp-cli
    main: ./cmd/function-health-pp-cli
    binary: function-health-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/function-health/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: function-health-pp-mcp
    main: ./cmd/function-health-pp-mcp
    binary: function-health-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: function-health-pp-cli
    repository:
      owner: DamienStevens
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Function Health feature, plus a local SQLite store with biomarker trends across every round you've ever drawn"
    install: |
      bin.install "function-health-pp-cli"
      bin.install "function-health-pp-mcp"
