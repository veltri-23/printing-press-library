name: ars-sicilia
description: "CLI per il portale documentale dell'Assemblea Regionale Siciliana (dati.ars.sicilia.it): leggi, DDL, atti politici, lavori d'aula e di commissione."
version: "0.1.0"
base_url: "https://dati.ars.sicilia.it"
spec_source: sniffed
http_transport: standard
health_check_path: "/home/cerca/help.jsp"

required_headers:
  - name: User-Agent
    value: "ars-sicilia-pp-cli/0.1.0 (+https://github.com/aborruso/ars-trasparente)"
  - name: Accept-Language
    value: "it-IT,it;q=0.9"

auth:
  type: none
  header: ""
  format: ""
  env_vars: []

config:
  format: toml
  path: "~/.config/ars-sicilia-pp-cli/config.toml"

resources:
  leggi:
    description: "Leggi della Regione Siciliana (archivio 201): testo storico delle leggi regionali."
    endpoints:
      cerca:
        method: GET
        path: "/icaro/default.jsp"
        description: "Cerca leggi regionali per legislatura, anno, numero o testo."
        params:
          - name: legisl
            type: int
            description: "Legislatura (es. 18 per XVIII)."
          - name: anno
            type: int
            description: "Anno della legge."
          - name: numero
            type: int
            description: "Numero della legge."
          - name: testo
            type: string
            description: "Ricerca testuale libera."
          - name: limit
            type: int
            default: 50
            description: "Max risultati da scaricare."
        response:
          type: array
          item: Legge
        response_format: html
      get:
        method: GET
        path: "/icaro/doc201-1.jsp"
        description: "Scarica una singola legge regionale."
        params:
          - name: legisl
            type: int
            required: true
            positional: true
            description: "Legislatura."
          - name: numero
            type: int
            required: true
            positional: true
            description: "Numero progressivo della legge."
        response:
          type: object
          item: Legge
        response_format: html

  ddl:
    description: "Disegni di Legge (archivio 221): proposte di legge presentate all'ARS."
    endpoints:
      cerca:
        method: GET
        path: "/icaro/default.jsp"
        description: "Cerca disegni di legge per legislatura, anno, firmatario, materia o testo."
        params:
          - name: legisl
            type: int
            description: "Legislatura (es. 18 per XVIII)."
          - name: anno
            type: int
            description: "Anno di presentazione."
          - name: firmatario
            type: string
            description: "Nome o cognome del firmatario."
          - name: materia
            type: string
            description: "Materia/settore."
          - name: testo
            type: string
            description: "Ricerca testuale libera."
          - name: iter
            type: string
            description: "Stato dell'iter (atto/storico)."
          - name: limit
            type: int
            default: 50
            description: "Max risultati."
        response:
          type: array
          item: DDL
        response_format: html
      get:
        method: GET
        path: "/icaro/doc221-1.jsp"
        description: "Scarica un singolo disegno di legge."
        params:
          - name: legisl
            type: int
            required: true
            positional: true
            description: "Legislatura."
          - name: numero
            type: int
            required: true
            positional: true
            description: "Numero DDL."
        response:
          type: object
          item: DDL
        response_format: html

  interrogazioni:
    description: "Interrogazioni parlamentari (archivio 233)."
    endpoints:
      cerca:
        method: GET
        path: "/icaro/default.jsp"
        description: "Cerca interrogazioni per legislatura, firmatario o rubrica."
        params:
          - name: legisl
            type: int
            description: "Legislatura."
          - name: firmatario
            type: string
            description: "Firmatario."
          - name: rubrica
            type: string
            description: "Rubrica/materia."
          - name: testo
            type: string
            description: "Ricerca testuale."
          - name: limit
            type: int
            default: 50
            description: "Max risultati."
        response:
          type: array
          item: Atto
        response_format: html
      get:
        method: GET
        path: "/icaro/doc233-1.jsp"
        description: "Scarica una singola interrogazione."
        params:
          - name: legisl
            type: int
            required: true
            positional: true
            description: "Legislatura."
          - name: numero
            type: int
            required: true
            positional: true
            description: "Numero progressivo."
        response:
