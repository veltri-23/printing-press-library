version: 2
project_name: rechtspraak-pp-cli
changelog:
  disable: true
builds:
  - id: rechtspraak-pp-cli
    main: ./cmd/rechtspraak-pp-cli
    binary: rechtspraak-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/rechtspraak/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: rechtspraak-pp-mcp
    main: ./cmd/rechtspraak-pp-mcp
    binary: rechtspraak-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: rechtspraak-pp-cli
    repository:
      owner: markvandeven
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The first CLI for Dutch court decisions with rich local narrowing for long-tail legal keywords, an appeal-chain walker"
    install: |
      bin.install "rechtspraak-pp-cli"
      bin.install "rechtspraak-pp-mcp"
