version: 2
project_name: finra-pp-cli
changelog:
  disable: true
builds:
  - id: finra-pp-cli
    main: ./cmd/finra-pp-cli
    binary: finra-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/finra/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: finra-pp-mcp
    main: ./cmd/finra-pp-mcp
    binary: finra-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: finra-pp-cli
    repository:
      owner: mschreib28
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every FINRA Query API dataset, plus local trend detection and batch registration checks no other FINRA tool offers."
    install: |
      bin.install "finra-pp-cli"
      bin.install "finra-pp-mcp"
