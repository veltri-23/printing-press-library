version: 2
project_name: fred-pp-cli
changelog:
  disable: true
builds:
  - id: fred-pp-cli
    main: ./cmd/fred-pp-cli
    binary: fred-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/fred/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: fred-pp-mcp
    main: ./cmd/fred-pp-mcp
    binary: fred-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: fred-pp-cli
    repository:
      owner: luketheojohnson
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every FRED endpoint, plus a local SQLite store, offline search, and macro commands no other FRED tool has."
    install: |
      bin.install "fred-pp-cli"
      bin.install "fred-pp-mcp"
