version: 2
project_name: nypl-digital-collections-pp-cli
changelog:
  disable: true
builds:
  - id: nypl-digital-collections-pp-cli
    main: ./cmd/nypl-digital-collections-pp-cli
    binary: nypl-digital-collections-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/other/nypl-digital-collections/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: nypl-digital-collections-pp-mcp
    main: ./cmd/nypl-digital-collections-pp-mcp
    binary: nypl-digital-collections-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: nypl-digital-collections-pp-cli
    repository:
      owner: kierandotai
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "New York Public Library Digital Collections API. Source docs: https://api.repo.nypl.org/."
    install: |
      bin.install "nypl-digital-collections-pp-cli"
      bin.install "nypl-digital-collections-pp-mcp"
