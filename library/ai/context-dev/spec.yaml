components:
  schemas:
    HeaderMap:
      type: object
      additionalProperties:
        type: string
        maxLength: 8192
        pattern: ^[^\r\n]*$
    PageMetadataValue:
      oneOf:
        - type: string
        - type: array
          items:
            type: string
    PageMetadataAlternate:
      type: object
      properties:
        href:
          type: string
          description: Resolved alternate URL.
        hreflang:
          type: string
          description: Language or locale for the alternate URL, when present.
        type:
          type: string
          description: Alternate resource MIME type, when present.
        title:
          type: string
          description: Alternate resource title, when present.
      required:
        - href
      additionalProperties: false
    PageMetadata:
      type: object
      description: Metadata extracted from the scraped page HTML.
      properties:
        sourceUrl:
          type: string
          description: Original URL requested by the caller.
        finalUrl:
          type: string
          description: >-
            Final URL scraped after redirects or scraper fallback, when known.
            Falls back to sourceUrl when unavailable.
        title:
          type: string
          description: Best title extracted from the page.
        description:
          type: string
          description: >-
            Best description extracted from standard, Open Graph, or Twitter
            metadata.
        language:
          type: string
          description: Language extracted from html lang or language meta tags.
        keywords:
          type: array
          description: Keywords extracted from the page's keywords meta tag.
          items:
            type: string
        canonicalUrl:
          type: string
          description: Resolved canonical URL, when present.
        author:
          type: string
          description: Author metadata, when present.
        siteName:
          type: string
          description: Site or application name from page metadata.
        image:
          type: string
          description: >-
            Primary resolved preview image from Open Graph, Twitter, or image
            metadata.
        favicon:
          type: string
          description: Resolved favicon URL, when present.
        publishedTime:
          type: string
          description: Published timestamp/date from page metadata, when present.
        modifiedTime:
          type: string
          description: Modified timestamp/date from page metadata, when present.
        robots:
          type: string
          description: Robots meta directive, when present.
        openGraph:
          type: object
          description: >-
            Open Graph metadata with the og: prefix removed and keys
            camel-cased.
          additionalProperties:
            $ref: '#/components/schemas/PageMetadataValue'
        twitter:
          type: object
          description: >-
            Twitter card metadata with the twitter: prefix removed and keys
            camel-cased.
          additionalProperties:
            $ref: '#/components/schemas/PageMetadataValue'
        alternates:
          type: array
          description: Resolved alternate links from link rel=alternate tags.
          items:
            $ref: '#/components/schemas/PageMetadataAlternate'
        jsonLd:
          type: array
          description: JSON-LD structured data blocks parsed from the page.
          items:
            type: object
            additionalProperties: true
        additionalMeta:
          type: object
          description: >-
            Additional non-social meta tags not promoted to top-level metadata
            fields.
          additionalProperties:
            $ref: '#/components/schemas/PageMetadataValue'
      required:
        - sourceUrl
        - finalUrl
    BrandResponse:
      type: object
      properties:
        status:
          type: string
          description: Status of the response, e.g., 'ok'
        brand:
          type: object
          description: Detailed brand information
          properties:
            domain:
              type: string
              description: The domain name of the brand
            title:
              type: string
              description: The title or name of the brand
            description:
              type: string
              description: A brief description of the brand
            slogan:
              type: string
              description: The brand's slogan
            colors:
              type: array
              description: An array of brand colors
              items:
                type: object
                properties:
                  hex:
                    type: string
                    description: Color in hexadecimal format
                  name:
                    type: string
                    description: Name of the color
            logos:
              type: array
              description: An array of logos associated with the brand
              items:
                type: object
                properties:
                  url:
                    type: string
                    description: CDN hosted url of the logo (ready for display)
                  mode:
                    type: string
                    enum:
                      - light
                      - dark
                      - has_opaque_background
                    description: >-
                      Indicates when this logo is best used: 'light' = best for
                      light mode, 'dark' = best for dark mode,
                      'has_opaque_background' = can be used for either as image
                      has its own background
                  colors:
                    type: array
                    description: Array of colors in the logo
                    items:
                      type: object
                      properties:
                        hex:
                          type: string
                          description: Color in hexadecimal format
                        name:
                          type: string
                          description: Name of the color
                  resolution:
                    type: object
                    description: Resolution of the logo image
                    properties:
                      width:
                        type: integer
                        description: Width of the image in pixels
                      height:
                        type: integer
                        description: Height of the image in pixels
                      aspect_ratio:
                        type: number
                        description: Aspect ratio of the image (width/height)
                  type:
                    type: string
                    enum:
                      - icon
                      - logo
                    description: >-
                      Type of the logo based on resolution (e.g., 'icon',
                      'logo')
            backdrops:
              type: array
              description: An array of backdrop images for the brand
              items:
                type: object
                properties:
                  url:
                    type: string
                    description: URL of the backdrop image
                  colors:
                    type: array
                    description: Array of colors in the backdrop image
                    items:
                      type: object
                      properties:
                        hex:
                          type: string
                          description: Color in hexadecimal format
                        name:
                          type: string
                          description: Name of the color
                  resolution:
                    type: object
                    description: Resolution of the backdrop image
                    properties:
                      width:
                        type: integer
                        description: Width of the image in pixels
                      height:
                        type: integer
                        description: Height of the image in pixels
                      aspect_ratio:
                        type: number
                        description: Aspect ratio of the image (width/height)
            socials:
              type: array
              description: An array of social media links for the brand
              items:
                type: object
                properties:
                  type:
                    type: string
                    description: Type of social media platform
                    enum:
                      - x
                      - facebook
                      - instagram
                      - linkedin
                      - youtube
                      - pinterest
                      - tiktok
                      - dribbble
                      - github
                      - behance
                      - snapchat
                      - whatsapp
                      - telegram
                      - line
                      - discord
                      - twitch
                      - vimeo
                      - imdb
                      - tumblr
                      - flickr
                      - giphy
                      - medium
                      - spotify
                      - soundcloud
                      - tripadvisor
                      - yelp
                      - producthunt
                      - reddit
                      - crunchbase
                      - appstore
                      - playstore
                  url:
                    type: string
                    description: URL of the social media page
            address:
              type: object
              description: Physical address of the brand
              properties:
                street:
                  type: string
                  description: Street address
                city:
                  type: string
                  description: City name
                country:
                  type: string
                  description: Country name
                country_code:
                  type: string
                  description: Country code
                state_province:
                  type: string
                  description: State or province name
                state_code:
                  type: string
                  description: State or province code
                postal_code:
                  type: string
                  description: Postal or ZIP code
            stock:
              type: object
              description: >-
                Stock market information for this brand (will be null if not a
                publicly traded company)
              properties:
                ticker:
                  type: string
                  description: Stock ticker symbol
                exchange:
                  type: string
                  description: Stock exchange name
            is_nsfw:
              type: boolean
              description: Indicates whether the brand content is not safe for work (NSFW)
            email:
              type: string
              description: Company email address
            phone:
              type: string
              description: Company phone number
            industries:
              type: object
              description: Industry classification information for the brand
              properties:
