                  domain:
                    type: string
                    description: Domain found for the brand
                  type:
                    type: string
                    description: Industry classification type, for sic api it will be `sic`
                  classification:
                    type: string
                    enum:
                      - original_sic
                      - latest_sec
                    description: >-
                      Echoes back which SIC dataset was used to classify the
                      brand.
                  codes:
                    type: array
                    description: >-
