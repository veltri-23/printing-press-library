  /web/styleguide:
    get:
      summary: Scrape Styleguide
      description: >-
        Extract a comprehensive design system from a website including colors,
        typography, spacing, shadows, and UI components.
      parameters:
        - name: domain
          in: query
          required: false
          schema:
            type: string
          description: >-
            Domain name to extract styleguide from (e.g., 'example.com',
            'google.com'). The domain will be automatically normalized and
            validated. You must provide either 'domain' or 'directUrl', but not
            both.
        - name: directUrl
          in: query
          required: false
          schema:
            type: string
            format: uri
          description: >-
            A specific URL to fetch the styleguide from directly, bypassing
            domain resolution (e.g., 'https://example.com/design-system'). When
            provided, the styleguide is extracted from this exact URL. You must
            provide either 'domain' or 'directUrl', but not both.
        - $ref: '#/components/parameters/CacheMaxAgeMs'
        - $ref: '#/components/parameters/TimeoutMS'
      x-oneOf-query:
        - title: By Domain
          required:
            - domain
          properties:
            domain:
              type: string
              description: >-
                Domain name to extract styleguide from (e.g., 'example.com',
                'google.com').
            maxAgeMs:
              type: integer
              minimum: 86400000
              maximum: 31536000000
              default: 7776000000
              description: >-
                Maximum age in milliseconds for cached styleguide data before a
                hard refresh. Defaults to 3 months. Ignored when 'directUrl' is
                used.
            timeoutMS:
              $ref: '#/components/schemas/TimeoutMS'
        - title: By Direct URL
          required:
            - directUrl
          properties:
            directUrl:
              type: string
              format: uri
              description: >-
                A specific URL to fetch the styleguide from directly, bypassing
                domain resolution.
            timeoutMS:
              $ref: '#/components/schemas/TimeoutMS'
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    description: Status of the response, e.g., 'ok'
                  domain:
                    type: string
                    description: The normalized domain that was processed
                  styleguide:
                    type: object
                    description: Comprehensive styleguide data extracted from the website
                    required:
                      - mode
                      - colors
                      - typography
                      - elementSpacing
                      - shadows
                      - components
                      - fontLinks
                    properties:
                      mode:
                        type: string
                        enum:
                          - light
                          - dark
                        description: The primary color mode of the website design
                      colors:
                        type: object
                        description: Primary colors used on the website
                        required:
                          - accent
                          - background
                          - text
                        properties:
                          accent:
                            type: string
                            description: Accent color (hex format)
                          background:
                            type: string
                            description: Background color (hex format)
                          text:
                            type: string
                            description: Text color (hex format)
                      typography:
                        type: object
                        description: Typography styles used on the website
                        required:
                          - headings
                        properties:
                          headings:
                            type: object
                            description: Heading styles
                            properties:
                              h1:
                                type: object
