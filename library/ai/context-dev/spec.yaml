  responses:
    RateLimited:
      description: Rate limit exceeded
      headers:
        Retry-After:
          description: Seconds until the per-minute rate limit window resets
          schema:
            type: integer
            minimum: 1
            maximum: 60
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                description: Error message
              error_code:
                type: string
                enum:
                  - RATE_LIMITED
                description: Error code indicating the rate limit was exceeded
              key_metadata:
                $ref: '#/components/schemas/KeyMetadata'
            required:
              - message
              - error_code
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    ScrapeHeaders:
      name: headers
      in: query
      required: false
      style: deepObject
      explode: true
      schema:
        $ref: '#/components/schemas/HeaderMap'
      description: >-
        Optional outbound HTTP headers forwarded only to the target URL, sent as
        deep-object query params such as headers[X-Custom]=value. When provided,
        caching is bypassed: the result is neither read from nor written to
        cache.
    BrandRetrieveMaxAgeMs:
      name: maxAgeMs
      in: query
      required: false
      schema:
        type: integer
        minimum: 86400000
        maximum: 31536000000
        default: 7776000000
      description: >-
        Maximum age in milliseconds for cached brand data before the API
        performs a hard refresh. Defaults to 3 months (7776000000 ms). Values
        below 1 day (86400000 ms) are clamped to 1 day; values above 1 year
        (31536000000 ms) are clamped to 1 year.
    CacheMaxAgeMs:
      name: maxAgeMs
      in: query
      required: false
      schema:
        type: integer
        minimum: 86400000
        maximum: 31536000000
        default: 7776000000
      description: >-
        Maximum age in milliseconds for cached data before the API performs a
        hard refresh. Defaults to 3 months (7776000000 ms). Values below 1 day
        (86400000 ms) are clamped to 1 day; values above 1 year (31536000000 ms)
        are clamped to 1 year.
    ForceLanguage:
      name: force_language
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/SupportedLanguage'
      description: Optional parameter to force the language of the retrieved brand data.
    TimeoutMS:
      name: timeoutMS
      in: query
      required: false
      schema:
        $ref: '#/components/schemas/TimeoutMS'
      description: >-
        Optional timeout in milliseconds for the request. If the request takes
        longer than this value, it will be aborted with a 408 status code.
        Maximum allowed value is 300000ms (5 minutes).
