version: 2
project_name: openart-pp-cli
changelog:
  disable: true
builds:
  - id: openart-pp-cli
    main: ./cmd/openart-pp-cli
    binary: openart-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/ai/openart/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: openart-pp-mcp
    main: ./cmd/openart-pp-mcp
    binary: openart-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: openart-pp-cli
    repository:
      owner: mvanhorn
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Generate videos and images on OpenArt from the terminal. Spend your existing OpenArt credits across Seedance, Kling,..."
    install: |
      bin.install "openart-pp-cli"
      bin.install "openart-pp-mcp"
