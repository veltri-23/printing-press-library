version: 2
project_name: ollama-cloud-pp-cli
changelog:
  disable: true
builds:
  - id: ollama-cloud-pp-cli
    main: ./cmd/ollama-cloud-pp-cli
    binary: ollama-cloud-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/ai/ollama-cloud/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: ollama-cloud-pp-mcp
    main: ./cmd/ollama-cloud-pp-mcp
    binary: ollama-cloud-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: ollama-cloud-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Routes every prompt to the right hosted Ollama model. Wraps chat, embeddings, catalog, and the OpenAI-compatible..."
    install: |
      bin.install "ollama-cloud-pp-cli"
      bin.install "ollama-cloud-pp-mcp"
