version: 2
project_name: mixlayer-pp-cli
changelog:
  disable: true
builds:
  - id: mixlayer-pp-cli
    main: ./cmd/mixlayer-pp-cli
    binary: mixlayer-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/ai/mixlayer/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: mixlayer-pp-mcp
    main: ./cmd/mixlayer-pp-mcp
    binary: mixlayer-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: mixlayer-pp-cli
    repository:
      owner: cathrynlavery
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Privacy-first Mixlayer CLI for OpenAI-compatible chat, local PII redaction and vaulting, reasoning-aware model ladders, live model catalog refresh, and ledger-backed cost proofs."
    install: |
      bin.install "mixlayer-pp-cli"
      bin.install "mixlayer-pp-mcp"
