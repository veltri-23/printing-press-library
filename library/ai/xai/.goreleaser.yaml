version: 2
project_name: xai-pp-cli
changelog:
  disable: true
builds:
  - id: xai-pp-cli
    main: ./cmd/xai-pp-cli
    binary: xai-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/ai/xai/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: xai-pp-mcp
    main: ./cmd/xai-pp-mcp
    binary: xai-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: xai-pp-cli
    repository:
      owner: cathrynlavery
      name: homebrew-tap
    homepage: "https://github.com/cathrynlavery/printing-press-library"
    description: "REST API for xAI compatible with other providers."
    install: |
      bin.install "xai-pp-cli"
      bin.install "xai-pp-mcp"
