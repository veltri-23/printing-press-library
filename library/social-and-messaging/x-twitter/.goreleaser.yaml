version: 2
project_name: x-twitter-pp-cli
changelog:
  disable: true
builds:
  - id: x-twitter-pp-cli
    main: ./cmd/x-twitter-pp-cli
    binary: x-twitter-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/social-and-messaging/x-twitter/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: x-twitter-pp-mcp
    main: ./cmd/x-twitter-pp-mcp
    binary: x-twitter-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: x-twitter-pp-cli
    repository:
      owner: tmchow
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Use X/Twitter with local searchable archives, post and conversation resolvers, collections, analytics, MCP tools, and tier diagnostics."
    install: |
      bin.install "x-twitter-pp-cli"
      bin.install "x-twitter-pp-mcp"
