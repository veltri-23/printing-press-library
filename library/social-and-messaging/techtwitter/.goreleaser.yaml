version: 2
project_name: techtwitter-pp-cli
changelog:
  disable: true
builds:
  - id: techtwitter-pp-cli
    main: ./cmd/techtwitter-pp-cli
    binary: techtwitter-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/social-and-messaging/techtwitter/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: techtwitter-pp-mcp
    main: ./cmd/techtwitter-pp-mcp
    binary: techtwitter-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: techtwitter-pp-cli
    repository:
      owner: danielkhunter
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Tech Twitter read endpoint, plus an offline-searchable local mirror and cited evidence bundles no other tool has."
    install: |
      bin.install "techtwitter-pp-cli"
      bin.install "techtwitter-pp-mcp"
