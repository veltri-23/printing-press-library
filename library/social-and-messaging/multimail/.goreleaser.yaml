version: 2
project_name: multimail-pp-cli
changelog:
  disable: true
builds:
  - id: multimail-pp-cli
    main: ./cmd/multimail-pp-cli
    binary: multimail-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X multimail-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: multimail-pp-mcp
    main: ./cmd/multimail-pp-mcp
    binary: multimail-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: multimail-pp-cli
    repository:
      owner: h179922
      name: homebrew-tap
    homepage: "https://github.com/h179922/multimail-pp-cli"
    description: "Every MultiMail feature plus oversight velocity, trust ladder status, and cross-mailbox search no other tool has."
    install: |
      bin.install "multimail-pp-cli"
      bin.install "multimail-pp-mcp"
