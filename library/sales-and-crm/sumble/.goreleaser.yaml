version: 2
project_name: sumble-pp-cli
changelog:
  disable: true
builds:
  - id: sumble-pp-cli
    main: ./cmd/sumble-pp-cli
    binary: sumble-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/sales-and-crm/sumble/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: sumble-pp-mcp
    main: ./cmd/sumble-pp-mcp
    binary: sumble-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: sumble-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Sumble v6 feature, plus the credit-awareness the API itself won't give you"
    install: |
      bin.install "sumble-pp-cli"
      bin.install "sumble-pp-mcp"
