        params: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
      list:
        method: GET
        path: /satisfaction-surveys
        description: |-
          List satisfaction-survey instances (each one tied to a single ticket). Filter with `ticket_id` to fetch the survey for one ticket, or paginate via `cursor`/`limit`. Use for CSAT reporting and to surface scores per ticket.
        params: []
        body: []
        response:
          type: ''
