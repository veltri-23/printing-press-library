        description: |-
          Update a satisfaction-survey instance (`id`) — typically to record/correct the customer's `score` (1–5), `body_text`, or to schedule/cancel its send via `should_send_datetime`. There is no template wording or trigger logic at this endpoint. Required: id.
        params: []
