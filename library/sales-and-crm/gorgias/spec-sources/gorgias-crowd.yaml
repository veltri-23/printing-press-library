  widgets:
    description: Configure on-site chat/contact widget instances
    endpoints:
      create:
        method: POST
        path: /widgets
        description: |-
          Create a new agent-facing sidebar widget shown inside the Gorgias helpdesk (on ticket, customer, or user views — set by `context`). Required: `template` (defines the data source, e.g. Shopify, Stripe, HTTP). Optional: `order`, `integration_id` (required for HTTP), `app_id`, `deactivated_datetime`. This is NOT a customer-facing chat widget — those are managed via the Gorgias Chat integration.
        params: []
        body:
        - name: template
          type: object
          required: true
          positional: false
          default: null
          description: 'Template to render the data of the widget. (example: {''type'':
            ''wrapper'', ''widgets'': [{''path'': ''account_info'', ''type'': ''card'',
            ''tit...)'
          fields: []
        - name: type
          type: string
          required: true
          positional: false
          default: null
          description: 'Type of data the widget is attached to. (enum: bigcommerce,
            custom, customer_external_data, http, magento2, recharge, shopify, smile)
            (example: http)'
          fields: []
        - name: context
          type: string
          required: false
          positional: false
          default: null
          description: 'The context to display this widget in. (enum: ticket, customer,
            user) (example: ticket)'
          fields: []
        - name: deactivated_datetime
          type: string|null
          required: false
          positional: false
          default: null
          description: 'When the widget was deactivated. (example: 2020-12-03T13:00:00.123456)'
          fields: []
        - name: integration_id
          type: integer|null
          required: false
          positional: false
          default: null
          description: |-
            ID of the integration that the widget's data is attached to. Only used for widgets attached to HTTP integrations. Widgets are the same for all Shopify integrations, but each HTTP integration needs a specific widget.
          fields: []
        - name: app_id
          type: string|null
          required: false
          positional: false
          default: null
          description: 'The ID of the 3rd party app that  the widget''s data is attached
            to. Used for customer external data widgets. (example: 60b9f144096cf92533e0a14d)'
          fields: []
        - name: order
          type: integer
          required: false
          positional: false
          default: null
          description: 'Order of precedence of the widget. Widgets with lower order
