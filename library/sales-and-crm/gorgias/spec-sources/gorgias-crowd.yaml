  tags:
    description: Ticket tags — the labels that drive routing rules and reporting
    endpoints:
      create:
        method: POST
        path: /tags
        description: |-
          Create a new tag in the account's tag library. Body: `name` (required, max 256 chars, case-sensitive), `description` (optional, max 1024), `decoration` (optional, styling object). Use when the agent needs a new label that doesn't exist yet — prefer reusing an existing tag where possible.
        params: []
        body:
        - name: name
          type: string
          required: true
          positional: false
          default: null
          description: 'Name of the tag. Tags'' names are case sensitive. (example:
            urgent)'
          fields: []
        - name: decoration
          type: object
          required: false
          positional: false
          default: null
          description: Information related to the style of the tag.
          fields: []
        - name: description
          type: string
          required: false
          positional: false
          default: null
          description: 'Short description of the tag. (example: Mark a ticket as urgent)'
          fields: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
          schema_source: openapi-1.5.1
          body_shape: object
          operation_id: create-tag
          doc_url: https://developers.gorgias.com/reference/create-tag
      delete:
        method: DELETE
        path: /tags/{id}
        description: Delete a tag by `id`. Removes it from the library and unassociates
          it from every ticket/customer that carries it. Destructive — prefer merging
          into another tag if you want to preserve history.
        params: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
      delete-all:
        method: DELETE
        path: /tags
        description: |-
          Bulk-delete tags. Required body: `ids` (array of tag IDs, min 1). Tags currently referenced by macros or rules cannot be deleted, and views using them will be deactivated. Reserve for housekeeping; destructive.
        params: []
        body:
        - name: ids
          type: array<integer>
          required: true
          positional: false
          default: null
          description: 'IDs of the tags to delete (example: [123, 456, 789])'
          fields: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
          schema_source: openapi-1.5.1
          body_shape: object
          operation_id: delete-tags
          doc_url: https://developers.gorgias.com/reference/delete-tags
      get:
        method: GET
        path: /tags/{id}
        description: Fetch a single tag (`id`) with its name, decoration, and metadata.
          Use to verify a tag exists before applying it, or to read its display style.
        params: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
      list:
        method: GET
        path: /tags
        description: List all tags in the account, optionally filtered by name. The
          agent's lookup endpoint for finding the right existing tag (and avoiding
          duplicates) before tagging a ticket or customer.
        params: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
      merge:
        method: PUT
        path: /tags/{id}/merge
        description: |-
          Merge other tags INTO this tag — path `{id}` is the destination (surviving) tag, and the body field `source_tags_ids` (array of integer IDs) lists the source tags to be merged and deleted. Use to consolidate duplicate or near-duplicate labels. Required: id.
