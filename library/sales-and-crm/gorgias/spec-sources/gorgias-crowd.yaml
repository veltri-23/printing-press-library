  satisfaction-surveys:
    description: CSAT survey definitions and customer ratings/comments
    endpoints:
      create:
        method: POST
        path: /satisfaction-surveys
        description: |-
          Create a satisfaction-survey instance attached to one ticket and customer. Required body: `customer_id`, `ticket_id`. Optional: `score` (1–5), `body_text` (customer comment), `should_send_datetime` (set to `null` to skip sending). Use to manually attach or backfill a CSAT result on a ticket — NOT to define a reusable survey template (Gorgias's CSAT templates are managed via integrations/settings, not this endpoint).
        params: []
        body:
        - name: customer_id
          type: integer
          required: true
          positional: false
          default: null
          description: 'The ID of the customer who filled the survey. (example: 120)'
          fields: []
        - name: ticket_id
          type: integer
          required: true
          positional: false
          default: null
          description: 'The ID of the ticket the survey is associated with. (example:
            12)'
          fields: []
        - name: body_text
          type: string|null
          required: false
          positional: false
          default: null
          description: 'The comment sent by the customer. (example: Such speed, much
            pertinent.)'
          fields: []
        - name: created_datetime
          type: string|null
          required: false
          positional: false
          default: null
          description: 'When the survey was created. (example: 2019-11-16T15:59:41.966927)'
          fields: []
        - name: meta
          type: object|null
          required: false
          positional: false
          default: null
          description: |-
            Data associated with the satisfaction survey. You can use this parameter to store structured information (key-value data) about the satisfaction survey. This field is not used by Gorgias. (example: {'externalData': {'id': 1234}})
          fields: []
        - name: score
          type: integer|null
          required: false
          positional: false
          default: null
          description: 'The level of satisfaction. Scores range from 1 to 5. (example:
            2)'
          fields: []
        - name: scored_datetime
          type: string|null
          required: false
          positional: false
          default: null
          description: 'When the survey was filled by the customer. (example: 2019-11-25T15:59:41.966927)'
          fields: []
        - name: sent_datetime
          type: string|null
          required: false
          positional: false
          default: null
          description: 'When the survey was sent. If is not set it means that it was
            not sent yet. (example: 2019-11-23T15:59:41.966927)'
          fields: []
        - name: should_send_datetime
          type: string|null
          required: false
          positional: false
          default: null
          description: 'When the survey should be sent. If not set then the survey
            will not be sent by Gorgias. (example: 2019-11-23T15:59:41.966927)'
          fields: []
