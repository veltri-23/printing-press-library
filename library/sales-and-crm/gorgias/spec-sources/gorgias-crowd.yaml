name: gorgias
description: Discovered API spec for gorgias (crowd-sniff)
version: 0.1.0
base_url: https://app.gorgias.com/api
spec_source: community
auth:
  type: api_key
  header: Authorization
  format: Basic {username}:{password}
  env_vars:
  - GORGIAS_USERNAME
  - GORGIAS_API_KEY
  env_var_specs:
  - name: GORGIAS_USERNAME
    kind: per_call
    required: true
    sensitive: false
  - name: GORGIAS_API_KEY
    kind: per_call
    required: true
    sensitive: true
  in: header
  key_url: https://docs.gorgias.com/en-US/rest-api-208286
  instructions: Settings → REST API → API key (use your email as username)
  verify_path: /account
config:
  format: toml
  path: ~/.config/gorgias-pp-cli/config.toml
mcp:
  transport:
  - stdio
  - http
  orchestration: code
  endpoint_tools: hidden
  addr: :7777
resources:
  account:
    description: Account-level settings and tenant metadata
    endpoints:
      settings-create:
        method: POST
        path: /account/settings
        description: |-
          Create a new account-level settings record for the current Gorgias tenant. Use when bootstrapping a fresh tenant or when an integration needs to seed default settings flags (locale, business hours, branding) that don't exist yet.
        params: []
        body:
        - name: type
          type: string
          required: true
          positional: false
          default: null
          description: 'example: business-hours'
          fields: []
        - name: data
          type: object
          required: false
          positional: false
          default: null
          description: 'example: {''timezone'': ''UTC'', ''business_hours'': {''days'':
            ''1,2,3,4,5'', ''from_time'': ''09:...'
          fields: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
          schema_source: openapi-1.5.1
          body_shape: object
          operation_id: create-account-setting
          doc_url: https://developers.gorgias.com/reference/create-account-setting
      get:
        method: GET
        path: /account
        description: |-
          Retrieve the current Gorgias account's metadata: subdomain, plan, billing state, and account-level flags. Use this to confirm credentials are wired up, detect the tenant/subdomain in a multi-tenant agent, or branch logic on plan tier.
        params: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
      settings-list:
        method: GET
        path: /account/settings
        description: |-
          List the global settings on the current Gorgias account (business hours, language, default channels, notification preferences, etc.). Reach for this when an agent needs to honor tenant-wide configuration before composing a reply or routing a ticket.
        params: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
      settings-update:
        method: PUT
        path: /account/settings/{id}
        description: |-
          Update an account settings record by `id`. Use this to flip a tenant-wide flag, change business hours, or adjust a default channel — but only when the agent has authority to mutate account-level config (admin-grade operation).
        params: []
        body:
        - name: type
          type: string
          required: true
          positional: false
          default: null
          description: 'example: business-hours'
          fields: []
        - name: data
          type: object
          required: false
          positional: false
          default: null
          description: 'example: {''timezone'': ''UTC'', ''business_hours'': {''days'':
            ''1,2,3,4,5'', ''from_time'': ''09:...'
          fields: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
          schema_source: openapi-1.5.1
          body_shape: object
          operation_id: update-account-setting
          doc_url: https://developers.gorgias.com/reference/update-account-setting
  custom-fields:
    description: Define and manage custom fields on tickets and customers
    endpoints:
      create:
        method: POST
        path: /custom-fields
        description: |-
          Define a new custom field on tickets or customers (the only supported `object_type` values). Required body: `object_type`, `label`, `definition` (the type-specific settings, e.g. boolean/number/text and any picklist values live inside `definition`). Optional: `description`, `priority`, `required`, `external_id`. Use to extend the schema, not to set a value on an existing record.
        params: []
        body:
        - name: object_type
          type: object<ObjectType>
          required: true
          positional: false
          default: null
          description: 'Type of entity on which to use this custom field. (example:
            Ticket)'
          fields: []
        - name: label
          type: string
          required: true
          positional: false
          default: null
          description: 'The name of the custom field. (example: Test field)'
          fields: []
        - name: definition
          type: oneOf
          required: true
          positional: false
          default: null
          description: 'The settings for this custom field, dependent on the data
            type. (example: {''input_settings'': {''placeholder'': ''Enter this here...''}})'
          fields: []
        - name: external_id
          type: string
          required: false
          positional: false
          default: null
          description: 'ID of the custom field in a foreign system (ex: Zendesk).
            (example: custom-field-84203241)'
          fields: []
        - name: description
          type: string
          required: false
          positional: false
          default: null
          description: 'The description of the custom field. (example: An amazing
            field description.)'
          fields: []
        - name: priority
          type: integer
          required: false
          positional: false
          default: null
          description: 'Order in which custom fields are displayed. (example: 1)'
          fields: []
        - name: required
          type: boolean
          required: false
          positional: false
          default: null
          description: 'Whether this custom field is required. (example: True)'
          fields: []
        - name: managed_type
          type: ManagedTicketFieldType|ManagedCustomerFieldType
          required: false
          positional: false
          default: null
          description: 'The type of the managed field. (example: contact_reason)'
          fields: []
        - name: deactivated_datetime
          type: string
          required: false
          positional: false
          default: null
          description: 'When the custom field was deactivated. (example: 2021-01-02T03:04:05.123456)'
          fields: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
          schema_source: openapi-1.5.1
          body_shape: object
          operation_id: create-custom-field
          doc_url: https://developers.gorgias.com/reference/create-custom-field
      get:
        method: GET
        path: /custom-fields/{id}
        description: |-
          Fetch a single custom field definition by `id`, returning its data type, label, target object, and option list. Use to introspect schema before writing a value, especially to discover the legal enum options for picklist fields.
        params: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
      list:
        method: GET
        path: /custom-fields
        description: |-
          List custom field definitions for a single `object_type` (`Ticket` or `Customer` — REQUIRED query param). Optional: `search`, `archived`, `order_by`, `cursor`, `limit`. Call once per object type to discover what extensible schema exists before reading or writing values.
        params:
        - name: object_type
          type: string
          required: true
          positional: false
          default: null
          description: 'Filter to a single resource type: Ticket or Customer. REQUIRED
            by Gorgias — calls without it return 400.'
          fields: []
        - name: search
          type: string
          required: false
          positional: false
          default: null
          description: Substring search across custom-field names.
          fields: []
        - name: archived
          type: boolean
          required: false
          positional: false
          default: null
          description: Include archived fields when true.
          fields: []
        - name: limit
          type: integer
          required: false
          positional: false
          default: null
          description: 'Page size (Gorgias hard cap: 100).'
          fields: []
        - name: cursor
          type: string
          required: false
          positional: false
          default: null
          description: Pagination cursor from a prior response's meta.next_cursor.
          fields: []
        - name: order_by
          type: string
          required: false
          positional: false
          default: null
          description: Sort expression, e.g. 'created_datetime:desc'.
          fields: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
      update:
        method: PUT
        path: /custom-fields/{id}
        description: |-
          Update one custom field definition by `id` — relabel it, change its options, or toggle visibility. Note: this mutates the schema for every record that carries the field, so use sparingly and prefer per-record updates for one-off changes.
        params: []
        body:
        - name: external_id
          type: string
          required: false
          positional: false
          default: null
          description: 'ID of the custom field in a foreign system (ex: Zendesk).
            (example: custom-field-84203241)'
          fields: []
        - name: object_type
          type: object<ObjectType>
          required: false
          positional: false
          default: null
          description: 'Type of entity on which to use this custom field. (example:
            Ticket)'
          fields: []
        - name: label
          type: string
          required: false
          positional: false
          default: null
          description: 'The name of the custom field. (example: Test field)'
          fields: []
        - name: description
          type: string
          required: false
          positional: false
          default: null
          description: 'The description of the custom field. (example: An amazing
            field description.)'
          fields: []
        - name: priority
          type: integer
          required: false
          positional: false
          default: null
          description: 'Order in which custom fields are displayed. (example: 1)'
          fields: []
        - name: required
          type: boolean
          required: false
          positional: false
          default: null
          description: 'Whether this custom field is required. (example: True)'
          fields: []
        - name: managed_type
          type: ManagedTicketFieldType|ManagedCustomerFieldType
          required: false
          positional: false
          default: null
          description: 'The type of the managed field. (example: contact_reason)'
          fields: []
        - name: definition
          type: oneOf
          required: false
          positional: false
          default: null
          description: 'The settings for this custom field, dependent on the data
            type. (example: {''input_settings'': {''placeholder'': ''Enter this here...''}})'
          fields: []
        - name: deactivated_datetime
          type: string
          required: false
          positional: false
          default: null
          description: 'When the custom field was deactivated. (example: 2021-01-02T03:04:05.123456)'
          fields: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
          schema_source: openapi-1.5.1
          body_shape: object
          operation_id: update-custom-field
          doc_url: https://developers.gorgias.com/reference/update-custom-field
      update-all:
        method: PUT
        path: /custom-fields
        description: |-
          Bulk-update multiple custom field definitions in one call (no path id). Useful when reordering picklist options or applying the same label change across several fields; avoid unless the agent really needs a batched schema edit.
        params: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
          schema_source: openapi-1.5.1
          body_shape: array<UpdateCustomFieldItem>
          operation_id: update-custom-fields
          doc_url: https://developers.gorgias.com/reference/update-custom-fields
  customers:
    description: Read and write Gorgias customer records (CRM core)
    endpoints:
      create:
        method: POST
        path: /customers
        description: |-
          Create a new customer record. Pass `name`, `email`, optional `channels` (email/phone/social handles), and `data` for arbitrary key-value attributes. Use when an inbound message references a person who doesn't yet exist in Gorgias.
        params: []
        body:
        - name: channels
          type: array<object>
          required: true
          positional: false
          default: null
          description: The [customer's contact channels](#the-customerchannel-object).
          fields: []
        - name: email
          type: string|null
          required: false
          positional: false
          default: null
          description: 'Primary email address of the customer. (example: example-email-value)'
          fields: []
        - name: external_id
          type: string|null
          required: false
          positional: false
          default: null
          description: 'ID of the customer in a foreign system (Stripe, Aircall, etc...).
            This field is not used by Gorgias, feel free to set it as you wish. (example:
            customer-84203241)'
          fields: []
        - name: language
          type: string|null
          required: false
          positional: false
          default: null
          description: 'The customer''s preferred language (format: ISO_639-1). (enum:
            aa, ab, af, ak, sq, am, ar, an) (example: fr)'
          fields: []
        - name: name
          type: string|null
          required: false
          positional: false
          default: null
          description: 'Full name of the customer. (example: John Smith)'
          fields: []
        - name: timezone
          type: string|null
          required: false
          positional: false
          default: null
          description: |-
            The customer's preferred timezone (format: IANA timezone name). (enum: Africa/Abidjan, Africa/Accra, Africa/Addis_Ababa, Africa/Algiers, Africa/Asmara, Africa/Asmera, Africa/Bamako, Africa/Bangui) (example: UTC)
          fields: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
          schema_source: openapi-1.5.1
          body_shape: object
          operation_id: create-customer
          doc_url: https://developers.gorgias.com/reference/create-customer
      custom-fields-unset:
        method: DELETE
        path: /customers/{customer_id}/custom-fields/{id}
        description: |-
          Clear a custom field value on a customer: first `{id}` is the customer ID, second `{id}` is the custom field ID. Use to unset (not delete) a per-customer attribute — the field definition itself remains.
        params: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
      delete:
        method: DELETE
        path: /customers/{id}
        description: |-
          Delete one customer by `id`. Hard-deletes the record and may cascade to associated tickets/messages depending on account settings — reach for this only when handling GDPR-style erasure requests or scrubbing test data.
        params: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
      delete-all:
        method: DELETE
        path: /customers
        description: |-
          Bulk-delete customers. Required body: `ids` (array of customer IDs to delete). Does NOT accept query-style filters — you must enumerate the IDs explicitly. Reserve for cleanup jobs or compliance erasure; destructive and irreversible.
        params: []
        body:
        - name: ids
          type: array<integer>
          required: true
          positional: false
          default: null
          description: A list of customer IDs to delete.
          fields: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
          schema_source: openapi-1.5.1
          body_shape: object
          operation_id: delete-customers
          doc_url: https://developers.gorgias.com/reference/delete-customers
      custom-fields-list:
        method: GET
        path: /customers/{id}/custom-fields
        description: |-
          List every custom field value attached to a single customer (`id`). Use to read CRM-style attributes (lifetime value, segment, loyalty tier) before deciding how to respond to or route a customer's ticket.
        params: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
      get:
        method: GET
        path: /customers/{id}
        description: |-
          Fetch a single customer by `id`, including their channels (email, phone, social handles), `data` blob, and account-level attributes. Use after identifying a customer (e.g. via search) to load full profile context.
        params: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
      list:
        method: GET
        path: /customers
        description: |-
          List customers with pagination and optional filter params (`email`, `external_id`, `name`, `language`, `channel_type`, `channel_address`, `view_id`). All params are optional. The agent's primary way to look up a customer by email or external system ID before reading tickets or sending a reply.
        params:
        - name: email
          type: string
          required: false
          positional: false
          default: null
          description: ''
          fields: []
        - name: limit
          type: integer
          required: false
          positional: false
          default: null
          description: ''
          fields: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
      custom-fields-set:
        method: PUT
        path: /customers/{customer_id}/custom-fields/{id}
        description: 'Set a single custom field value on a customer: first `{id}`
          is the customer, second `{id}` is the custom field. Use for one-off mutations
          like flagging a VIP or recording a churn-risk score.'
        params:
        - name: id
          type: string
          required: false
          positional: false
          default: null
          description: ''
          fields: []
        - name: value
          type: string
          required: false
          positional: false
          default: null
          description: ''
          fields: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
          schema_source: openapi-1.5.1
          body_shape: oneOf(string|integer|boolean)
          operation_id: update-customer-custom-field-value
          doc_url: https://developers.gorgias.com/reference/update-customer-custom-field-value
      custom-fields-set-all:
        method: PUT
        path: /customers/{id}/custom-fields
        description: |-
          Bulk-set custom field values on a single customer (`id`) — pass an array of field/value pairs. Preferred over the singular form when an agent needs to write several attributes at once after enriching a profile.
        params: []
        body: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
          schema_source: openapi-1.5.1
          body_shape: array<CustomerCustomFieldValue>
          operation_id: update-customer-custom-field-values
          doc_url: https://developers.gorgias.com/reference/update-customer-custom-field-values
      update:
        method: PUT
        path: /customers/{id}
        description: Update a customer (`id`) — change name, add/remove channels,
          edit external IDs, or overwrite top-level fields. Use after merging records,
          fixing a typo, or syncing data from an external CRM.
        params: []
        body:
        - name: channels
          type: array<object>
          required: false
          positional: false
          default: null
          description: The [customer's contact channels](#the-customerchannel-object).
          fields: []
        - name: email
          type: string|null
          required: false
          positional: false
          default: null
          description: 'Primary email address of the customer. (example: example-email-value)'
          fields: []
        - name: external_id
          type: string|null
          required: false
          positional: false
          default: null
          description: 'ID of the customer in a foreign system (Stripe, Aircall, etc...).
            This field is not used by Gorgias, feel free to set it as you wish. (example:
            customer-84203241)'
          fields: []
        - name: language
          type: string|null
          required: false
          positional: false
          default: null
          description: 'The customer''s preferred language (format: ISO_639-1). (enum:
            aa, ab, af, ak, sq, am, ar, an) (example: fr)'
          fields: []
        - name: name
          type: string|null
          required: false
          positional: false
          default: null
          description: 'Full name of the customer. (example: John Smith)'
          fields: []
        - name: timezone
          type: string|null
          required: false
          positional: false
          default: null
          description: |-
            The customer's preferred timezone (format: IANA timezone name). (enum: Africa/Abidjan, Africa/Accra, Africa/Addis_Ababa, Africa/Algiers, Africa/Asmara, Africa/Asmera, Africa/Bamako, Africa/Bangui) (example: UTC)
          fields: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
          schema_source: openapi-1.5.1
          body_shape: object
          operation_id: update-customer
          doc_url: https://developers.gorgias.com/reference/update-customer
      data-update:
        method: PUT
        path: /customers/{id}/data
        description: |-
          Set a customer's `data` blob (`id` in path). Body: `data` (required) plus optional `version` for last-write-wins (requests with an older version are ignored). Use when an integration pushes CRM context that should be displayed alongside the customer.
        params: []
        body:
        - name: data
          type: object
          required: true
          positional: false
          default: null
          description: 'The customer data. (example: {''key'': ''value''})'
          fields: []
        - name: version
          type: string|null
          required: false
          positional: false
          default: null
          description: 'The date of the customer data. If we already have a more recent
            version, the request will be ignored. (example: 2022-05-13T12:34:21.918927)'
          fields: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
          schema_source: openapi-1.5.1
          body_shape: object
          operation_id: update-customer-data
          doc_url: https://developers.gorgias.com/reference/update-customer-data
      merge:
        method: PUT
        path: /customers/merge
        description: |-
          Merge one customer into another. Required query params: `source_id` (the duplicate, will be merged in and deleted) and `target_id` (the surviving customer). Body fields (channels, email, name, language, timezone, external_id) overwrite the target. Use when a duplicate is detected by email/phone; merges happen one pair at a time.
        params:
        - name: source_id
          type: integer
          required: true
          positional: false
          default: null
          description: The ID of the customer to merge (which will be merged into
            the targeted customer).
          fields: []
        - name: target_id
          type: integer
          required: true
          positional: false
          default: null
          description: The ID of the targeted customer (which will still be here after
            the merge).
          fields: []
        body:
        - name: channels
          type: array<object>
          required: false
          positional: false
          default: null
          description: The [customer's contact channels](#the-customerchannel-object).
          fields: []
        - name: email
          type: string|null
          required: false
          positional: false
          default: null
          description: 'Primary email address of the customer. (example: example-email-value)'
          fields: []
        - name: external_id
          type: string|null
          required: false
          positional: false
          default: null
          description: 'ID of the customer in a foreign system (Stripe, Aircall, etc...).
            This field is not used by Gorgias, feel free to set it as you wish. (example:
            customer-84203241)'
          fields: []
        - name: language
          type: string|null
          required: false
          positional: false
          default: null
          description: 'The customer''s preferred language (format: ISO_639-1). (enum:
            aa, ab, af, ak, sq, am, ar, an) (example: fr)'
          fields: []
        - name: name
          type: string|null
          required: false
          positional: false
          default: null
          description: 'Full name of the customer. (example: John Smith)'
          fields: []
        - name: timezone
          type: string|null
          required: false
          positional: false
          default: null
          description: |-
            The customer's preferred timezone (format: IANA timezone name). (enum: Africa/Abidjan, Africa/Accra, Africa/Addis_Ababa, Africa/Algiers, Africa/Asmara, Africa/Asmera, Africa/Bamako, Africa/Bangui) (example: UTC)
          fields: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
          schema_source: openapi-1.5.1
          body_shape: object
          operation_id: merge-customers
          doc_url: https://developers.gorgias.com/reference/merge-customers
  events:
    description: Audit log of who-changed-what across tickets, customers, settings
    endpoints:
      get:
        method: GET
        path: /events/{id}
