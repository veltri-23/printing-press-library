  gorgias-jobs:
    description: Schedule and track async Gorgias jobs (bulk exports, macro applies)
    endpoints:
      create:
        method: POST
        path: /jobs
        description: |-
          Kick off an asynchronous Gorgias job. Required body: `type` (enum: applyMacro, deleteTicket, exportTicket, importMacro, exportMacro, updateTicket, exportTicketDrilldown, exportConvertCampaignSalesDrilldown) and `params` (job-specific). Optional: `scheduled_datetime` (max 60 min in the future), `meta`. Poll with `gorgias-jobs_get` until the status leaves pending/running.
        params: []
        body:
        - name: params
          type: object
          required: true
          positional: false
          default: null
          description: 'The parameters of the job. (example: {''ticket_ids'': [1,
            2, 3], ''updates'': {''status'': ''open''}})'
          fields: []
        - name: type
          type: string
          required: true
          positional: false
          default: null
          description: |-
            The type of the job. Options: applyMacro, deleteTicket, exportTicket, importMacro, exportMacro, updateTicket, exportTicketDrilldown, exportConvertCampaignSalesDrilldown (enum: applyMacro, deleteTicket, exportTicket, importMacro, exportMacro, updateTicket, exportTicketDrilldown, exportConvertCampaignSalesDrilldown) (example: updateTicket)
          fields: []
        - name: meta
          type: object|null
          required: false
          positional: false
          default: null
          description: |-
            Metadata associated with the job. You can use this parameter to store structured information (key-value data) about the job. This field is not used by Gorgias. (example: {'description': 'This job closes all tickets created in 2018'})
          fields: []
        - name: scheduled_datetime
          type: string|null
          required: false
          positional: false
          default: null
          description: |-
            When the job was scheduled to be started. A job cannot be scheduled more than 60 minutes in the future. If unspecified, the job is queued for execution immediately after creation. (example: 2019-11-23T16:30:00.966927)
          fields: []
        response:
          type: ''
          item: ''
        pagination: null
        meta:
          source_count: '1'
          source_tier: community-sdk
