name: copper
description: "Copper CRM CLI — full CRUD, search, and a local database for the Copper sales CRM"
version: "0.1.0"
base_url: "https://api.copper.com/developer_api/v1"
health_check_path: "/account"
required_headers:
  - name: X-PW-Application
    value: "developer_api"
auth:
  type: api_key
  header: "X-PW-AccessToken"
  format: "{token}"
  env_vars:
    - COPPER_API_KEY
  additional_headers:
    - header: X-PW-UserEmail
      in: header
      env_var:
        name: COPPER_USER_EMAIL
        kind: per_call

resources:
  people:
    description: "Manage people (contacts)"
    endpoints:
      search:
        method: POST
        path: "/people/search"
        description: "List/search people"
        body:
          - name: page_number
            type: int
            default: 1
            description: "Page number (1-based)"
          - name: page_size
            type: int
            default: 20
            description: "Results per page (max 200)"
          - name: sort_by
            type: string
            description: "Field to sort by (e.g. name, date_created)"
          - name: sort_direction
            type: string
            description: "Sort direction: asc or desc"
          - name: name
            type: string
            description: "Filter by full name"
          - name: email
            type: string
            description: "Filter by email address"
          - name: phone_number
            type: string
            description: "Filter by phone number"
          - name: assignee_ids
            type: string
            description: "JSON array of assignee (user) ids to filter by"
          - name: company_ids
            type: string
            description: "JSON array of company ids to filter by"
          - name: tags
            type: string
            description: "JSON array of tag strings to filter by"
        response:
          type: array
          item: Person
        pagination:
          type: offset
      get:
        method: GET
        path: "/people/{id}"
        description: "Fetch a person by id"
        params:
          - name: id
            type: int
            required: true
            positional: true
            description: "Person id"
        response:
          type: object
          item: Person
      fetch-by-email:
        method: POST
        path: "/people/fetch_by_email"
        description: "Fetch a person by email address"
        body:
          - name: email
            type: string
            required: true
            description: "Email address to look up"
        response:
          type: object
          item: Person
      create:
        method: POST
        path: "/people"
        description: "Create a new person"
        body:
          - name: name
            type: string
            required: true
            description: "Full name"
          - name: emails
            type: string
            description: "JSON array of email objects, e.g. [{\"email\":\"a-at-b.example\",\"category\":\"work\"}]"
          - name: phone_numbers
            type: string
            description: "JSON array of phone number objects"
          - name: address
            type: string
            description: "JSON address object (street, city, state, postal_code, country)"
          - name: title
            type: string
            description: "Job title"
          - name: company_id
            type: int
            description: "Primary company id"
          - name: assignee_id
            type: int
            description: "Owner (user) id"
          - name: contact_type_id
            type: int
            description: "Contact type id"
          - name: details
            type: string
            description: "Free-text details/notes"
          - name: tags
            type: string
            description: "JSON array of tag strings"
        response:
          type: object
          item: Person
      update:
        method: PUT
        path: "/people/{id}"
        description: "Update a person"
        params:
          - name: id
            type: int
            required: true
            positional: true
            description: "Person id"
        body:
          - name: name
            type: string
            description: "Full name"
          - name: emails
            type: string
            description: "JSON array of email objects"
          - name: phone_numbers
            type: string
            description: "JSON array of phone number objects"
          - name: address
            type: string
            description: "JSON address object"
          - name: title
            type: string
            description: "Job title"
          - name: company_id
            type: int
            description: "Primary company id"
          - name: assignee_id
            type: int
            description: "Owner (user) id"
          - name: details
            type: string
            description: "Free-text details/notes"
          - name: tags
            type: string
            description: "JSON array of tag strings"
        response:
          type: object
          item: Person
      delete:
        method: DELETE
        path: "/people/{id}"
        description: "Delete a person"
        params:
          - name: id
            type: int
            required: true
            positional: true
            description: "Person id"
      activities:
        method: POST
        path: "/people/{id}/activities"
        description: "List a person's activities"
        params:
          - name: id
            type: int
            required: true
            positional: true
            description: "Person id"
        body:
          - name: page_number
            type: int
            default: 1
            description: "Page number (1-based)"
          - name: page_size
            type: int
            default: 20
            description: "Results per page (max 200)"
        response:
          type: array
          item: Activity

