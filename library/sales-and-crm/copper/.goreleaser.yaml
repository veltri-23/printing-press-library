version: 2
project_name: copper-pp-cli
changelog:
  disable: true
builds:
  - id: copper-pp-cli
    main: ./cmd/copper-pp-cli
    binary: copper-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/sales-and-crm/copper/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: copper-pp-mcp
    main: ./cmd/copper-pp-mcp
    binary: copper-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: copper-pp-cli
    repository:
      owner: kmorebetter
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The Copper CRM command line no one else built: full CRUD plus a local database, weighted pipeline forecasting, stale-deal detection, and the bulk operations Copper's own API refuses to provide."
    install: |
      bin.install "copper-pp-cli"
      bin.install "copper-pp-mcp"
