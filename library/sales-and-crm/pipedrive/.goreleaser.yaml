version: 2
project_name: pipedrive-pp-cli
changelog:
  disable: true
builds:
  - id: pipedrive-pp-cli
    main: ./cmd/pipedrive-pp-cli
    binary: pipedrive-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X pipedrive-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: pipedrive-pp-mcp
    main: ./cmd/pipedrive-pp-mcp
    binary: pipedrive-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: pipedrive-pp-cli
    repository:
      owner: debgotwired
      name: homebrew-tap
    homepage: "https://github.com/debgotwired/pipedrive-pp-cli"
    description: "Printing Press CLI for Pipedrive."
    install: |
      bin.install "pipedrive-pp-cli"
      bin.install "pipedrive-pp-mcp"
