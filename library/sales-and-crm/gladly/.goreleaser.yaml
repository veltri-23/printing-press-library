version: 2
project_name: gladly-pp-cli
changelog:
  disable: true
builds:
  - id: gladly-pp-cli
    main: ./cmd/gladly-pp-cli
    binary: gladly-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/sales-and-crm/gladly/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: gladly-pp-mcp
    main: ./cmd/gladly-pp-mcp
    binary: gladly-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: gladly-pp-cli
    repository:
      owner: debgotwired
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Read-first Gladly API surface for customer timelines, conversations, agents, topics, answers, and support operations."
    install: |
      bin.install "gladly-pp-cli"
      bin.install "gladly-pp-mcp"
