name: tenderned
display_name: TenderNed
description: |-
  Every Dutch public tender, with the sub-threshold long tail that EU TED never sees, in a local-first CLI you can pipe.

  TenderNed is the Dutch national public procurement platform run by PIANOo / Ministerie van EZK. Every Dutch contracting authority must publish above- and below-threshold tender notices here. Above-threshold notices are forwarded to EU TED; the sub-threshold long tail (€40k–€220k) is TenderNed-only.

  This CLI covers the unauthenticated TNS publication webservice (search/list/filter publications, document download, contracting-authority directory, RSS feed) and the Basic-auth eForms XML endpoint. Data is CC-0 public domain.
cli_description: Dutch public-tender CLI with offline search, document corpus, and the sub-threshold long tail TED never sees.
version: "0.1.0"
base_url: "https://www.tenderned.nl/papi/tenderned-rs-tns/v2"

regions: ["NL"]
api_language: "nl"

auth:
  type: none

config:
  format: toml
  path: "~/.config/tenderned-pp-cli/config.toml"

resources:
  notices:
    description: "Search, list and fetch tender notices (aankondigingen) from TenderNed — mirrors 'eu-tenders notices' for the Dutch market"
    endpoints:
      list:
        method: GET
        path: "/publicaties"
        description: "Search and list tender publications with rich filters (CPV, dates, buyer, procedure, scope)"
        params:
          - name: search
            type: string
            description: "Full-text keyword search across title and description"
          - name: cpvCodes
            type: string
            description: "CPV code in 8-digit-plus-check-digit form (e.g. 45000000-7). Repeat for multi-CPV intersection."
          - name: publicatieType
            type: string
            description: "Publication type filter (AAO=open call, AGO=awarded, VOP=prior info, RVO=cancellation, WNO=ex-ante, MAC=market consultation, REC=rectification)"
          - name: typeOpdracht
            type: string
            description: "Contract type: D=services (Diensten), L=supplies (Leveringen), W=works (Werken)"
          - name: procedure
            type: string
            description: "Procedure code (Openbaar, Niet-openbaar, Onderhandeling, Concurrentiegerichte dialoog, etc.)"
          - name: nationaalOfEuropees
            type: string
            description: "Scope: NA=national-only (sub-threshold), EU=European (above-threshold). National-only notices never reach TED."
          - name: publicatieDatumVanaf
            flag_name: since
            type: string
            description: "Earliest publication date (YYYY-MM-DD)"
          - name: publicatieDatumTot
            flag_name: until
            type: string
            description: "Latest publication date (YYYY-MM-DD)"
          - name: sluitingsDatumVanaf
            flag_name: closing-since
            type: string
            description: "Earliest closing date (YYYY-MM-DD)"
          - name: sluitingsDatumTot
            flag_name: closing-until
            type: string
            description: "Latest closing date (YYYY-MM-DD)"
          - name: aanbestedendeDienstId
            flag_name: buyer-id
            type: string
            description: "Filter by contracting-authority UUID (use 'buyers list' to find IDs)"
          - name: typeAanbestedendeDienst
            flag_name: buyer-type
            type: string
            description: "Filter by contracting-authority type code"
          - name: page
            type: int
            description: "Page number (0-based)"
          - name: size
            type: int
            description: "Page size (default 50, max 100)"
        pagination:
          type: page
          cursor_param: page
          limit_param: size
          has_more_field: last
        response:
          type: object
          item: PublicationPage

      get:
        method: GET
        path: "/publicaties/{publicatieId}"
        description: "Fetch full structured metadata for one publication"
        params:
          - name: publicatieId
            type: int
            required: true
            positional: true
            description: "TenderNed publication ID (e.g. 425283)"
        response:
          type: object
          item: Publication

  docs:
    description: "List and download tender documents (bestek, PvE, evaluation criteria, Q&A)"
    endpoints:
      list:
        method: GET
        path: "/publicaties/{publicatieId}/documenten"
        description: "List attached documents for one publication"
        params:
          - name: publicatieId
            type: int
            required: true
            positional: true
            description: "Publication ID"
        response:
          type: object
          item: DocumentList

      get:
        method: GET
        path: "/publicaties/{publicatieId}/documenten/{documentId}/content"
        description: "Download a single document's binary content (PDF/Word/etc.)"
        params:
          - name: publicatieId
            type: int
            required: true
            positional: true
            description: "Publication ID"
          - name: documentId
            type: string
            required: true
            positional: true
            description: "Document ID (from 'documents list')"
        response:
          type: object
          item: BinaryContent

      download:
        method: GET
        path: "/publicaties/{publicatieId}/documenten/zip"
        description: "Download all documents for one publication as a zip archive"
        params:
          - name: publicatieId
            type: int
            required: true
            positional: true
            description: "Publication ID"
        response:
          type: object
          item: BinaryContent

  buyers:
    description: "Browse contracting authorities (aanbestedende diensten) — Dutch public buyers"
    endpoints:
      list:
        method: GET
        path: "/aanbestedendediensten"
        description: "List Dutch contracting authorities (paginated)"
        params:
          - name: page
            type: int
            description: "Page number (0-based)"
          - name: size
            type: int
            description: "Page size (default 50, max 100)"
        pagination:
          type: page
          cursor_param: page
          limit_param: size
          has_more_field: last
        response:
          type: object
          item: BuyerPage

      get:
        method: GET
        path: "/aanbestedendediensten/{aanbestedendedienstId}"
        description: "Fetch one contracting authority by ID"
        params:
          - name: aanbestedendedienstId
            type: string
            required: true
            positional: true
            description: "Contracting authority UUID"
        response:
          type: object
          item: Buyer

mcp:
  transport: [stdio, http]
  orchestration: endpoint-mirror
