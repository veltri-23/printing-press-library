version: 2
project_name: salesloft-pp-cli
changelog:
  disable: true
builds:
  - id: salesloft-pp-cli
    main: ./cmd/salesloft-pp-cli
    binary: salesloft-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X salesloft-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: salesloft-pp-mcp
    main: ./cmd/salesloft-pp-mcp
    binary: salesloft-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: salesloft-pp-cli
    repository:
      owner: debgotwired
      name: homebrew-tap
    homepage: "https://github.com/debgotwired/salesloft-pp-cli"
    description: "Read-first Salesloft API surface for agent workflows, based on the public Salesloft v2 developer documentation."
    install: |
      bin.install "salesloft-pp-cli"
      bin.install "salesloft-pp-mcp"
