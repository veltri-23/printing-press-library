version: 2
project_name: jobber-pp-cli
changelog:
  disable: true
builds:
  - id: jobber-pp-cli
    main: ./cmd/jobber-pp-cli
    binary: jobber-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/sales-and-crm/jobber/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: jobber-pp-mcp
    main: ./cmd/jobber-pp-mcp
    binary: jobber-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: jobber-pp-cli
    repository:
      owner: melanson633
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library/tree/main/library/sales-and-crm/jobber"
    description: "Jobber API surface as a read-only CLI and MCP peer (printing-press generated)."
    install: |
      bin.install "jobber-pp-cli"
      bin.install "jobber-pp-mcp"
