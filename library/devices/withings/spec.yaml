name: withings
description: "Withings health data CLI — offline-first, agent-native access to your Withings measurements, activity, sleep, heart/ECG and workouts, with a local SQLite mirror and analytics no single API call gives you."
version: "0.1.0"
base_url: "https://wbsapi.withings.net"
category: devices
health_check_path: "/v2/user"

auth:
  type: bearer_token
  header: "Authorization"
  format: "Bearer {token}"
  env_vars:
    - WITHINGS_ACCESS_TOKEN

config:
  format: toml
  path: "~/.config/withings-pp-cli/config.toml"

resources:
  measure:
    description: "Body measurements: weight, body composition, blood pressure, SpO2, temperature, ECG intervals"
    endpoints:
      get:
        method: POST
        path: "/measure"
        description: "Get body measurements (getmeas). Filter by type codes and date range."
        body:
          - name: action
            type: string
            default: "getmeas"
            description: "API action (getmeas)"
          - name: meastypes
            type: string
            description: "Comma-separated measure type codes, e.g. 1,5,6,8 (1=weight,6=fat ratio,9=diastolic,10=systolic,11=heart pulse,54=SpO2)"
          - name: category
            type: int
            default: 1
            description: "1=real measures, 2=user objectives"
          - name: startdate
            type: int
            description: "Range start (unix epoch)"
          - name: enddate
            type: int
            description: "Range end (unix epoch)"
          - name: lastupdate
            type: int
            description: "Return only rows updated since this epoch (sync mode)"
          - name: offset
            type: int
            description: "Pagination cursor from prior response body.offset"
        response_path: "body.measuregrps"
        response:
          type: array
          item: MeasureGroup

  activity:
    description: "Daily and intraday activity: steps, distance, calories, heart-rate zones"
    endpoints:
      get:
        method: POST
        path: "/v2/measure"
        description: "Daily activity aggregates (getactivity)."
        body:
          - name: action
            type: string
            default: "getactivity"
            description: "API action (getactivity)"
          - name: startdateymd
            type: string
            description: "Range start YYYY-MM-DD"
          - name: enddateymd
            type: string
            description: "Range end YYYY-MM-DD"
          - name: lastupdate
            type: int
            description: "Return only rows updated since this epoch (sync mode)"
          - name: data_fields
            type: string
            description: "Comma-separated fields: steps,distance,elevation,calories,totalcalories,hr_average,hr_min,hr_max,hr_zone_0,hr_zone_1,hr_zone_2,hr_zone_3"
          - name: offset
            type: int
            description: "Pagination cursor"
        response_path: "body.activities"
        response:
          type: array
          item: Activity
      intraday:
        method: POST
        path: "/v2/measure"
        description: "High-resolution intraday activity series (getintradayactivity)."
        body:
          - name: action
            type: string
            default: "getintradayactivity"
            description: "API action (getintradayactivity)"
          - name: startdate
            type: int
            required: true
            description: "Range start (unix epoch)"
          - name: enddate
            type: int
            required: true
            description: "Range end (unix epoch)"
          - name: data_fields
            type: string
            description: "Comma-separated: steps,elevation,calories,distance,stroke,pool_lap,duration,heart_rate,spo2_auto"
        response_path: "body"
        response:
          type: object
          item: IntradayResult

  workouts:
    description: "Workout sessions with HR zones, distance, calories"
    endpoints:
      list:
        method: POST
        path: "/v2/measure"
        description: "List workout sessions (getworkouts)."
        body:
          - name: action
            type: string
            default: "getworkouts"
            description: "API action (getworkouts)"
          - name: startdateymd
            type: string
            description: "Range start YYYY-MM-DD"
          - name: enddateymd
            type: string
            description: "Range end YYYY-MM-DD"
          - name: lastupdate
            type: int
            description: "Return only rows updated since this epoch (sync mode)"
          - name: data_fields
            type: string
            description: "Comma-separated workout data fields (calories,hr_average,hr_zone_0..3,distance,elevation,steps,spo2_average,...)"
          - name: offset
            type: int
            description: "Pagination cursor"
        response_path: "body.series"
        response:
          type: array
          item: Workout

  sleep:
    description: "Sleep stage series and per-night summaries"
    endpoints:
      series:
        method: POST
        path: "/v2/sleep"
        description: "High-frequency sleep stage series (get)."
        body:
          - name: action
            type: string
            default: "get"
            description: "API action (get)"
          - name: startdate
            type: int
            required: true
            description: "Night start (unix epoch)"
          - name: enddate
            type: int
            required: true
            description: "Night end (unix epoch)"
          - name: data_fields
            type: string
            description: "Comma-separated: hr,rr,snoring,sdnn_1,rmssd,mvt_score"
        response_path: "body.series"
        response:
          type: array
          item: SleepPhase
      summary:
        method: POST
        path: "/v2/sleep"
        description: "Per-night sleep summary (getsummary): durations, HR, RR, snoring, AHI, sleep score."
        body:
          - name: action
            type: string
            default: "getsummary"
            description: "API action (getsummary)"
          - name: startdateymd
            type: string
            description: "Range start YYYY-MM-DD"
          - name: enddateymd
            type: string
            description: "Range end YYYY-MM-DD"
          - name: lastupdate
            type: int
            description: "Return only rows updated since this epoch (sync mode)"
          - name: data_fields
            type: string
            description: "Comma-separated summary fields (total_sleep_time,deepsleepduration,remsleepduration,sleep_score,apnea_hypopnea_index,snoring,hr_average,...)"
        response_path: "body.series"
        response:
          type: array
          item: SleepSummary

  heart:
    description: "ECG/AFib recordings and blood-pressure readings"
    endpoints:
      list:
        method: POST
        path: "/v2/heart"
        description: "List heart recordings (list): ECG signalids, AFib classification, BP."
        body:
          - name: action
            type: string
            default: "list"
            description: "API action (list)"
          - name: startdate
            type: int
            description: "Range start (unix epoch)"
          - name: enddate
            type: int
            description: "Range end (unix epoch)"
          - name: offset
            type: int
            description: "Pagination cursor"
        response_path: "body.series"
        response:
          type: array
          item: HeartRecord
      ecg:
        method: POST
        path: "/v2/heart"
        description: "Get a single raw ECG signal by signalid (get)."
        body:
          - name: action
            type: string
            default: "get"
            description: "API action (get)"
          - name: signalid
            type: int
            required: true
            description: "ECG signal id from 'heart list'"
        response_path: "body"
        response:
          type: object
          item: EcgSignal

  devices:
    description: "Linked Withings devices"
    endpoints:
      list:
        method: POST
        path: "/v2/user"
        description: "List linked devices (getdevice): model, battery, last sync."
        body:
          - name: action
            type: string
            default: "getdevice"
            description: "API action (getdevice)"
        response_path: "body.devices"
        response:
          type: array
          item: Device

  goals:
    description: "User goals: steps, sleep, weight"
    endpoints:
      get:
        method: POST
        path: "/v2/user"
        description: "Get user goals (getgoals)."
        body:
          - name: action
            type: string
            default: "getgoals"
            description: "API action (getgoals)"
        response_path: "body.goals"
        response:
          type: object
          item: Goals

  notify:
    description: "Webhook subscriptions (Notify)"
    endpoints:
      list:
        method: POST
        path: "/notify"
        description: "List webhook subscriptions (list)."
        body:
          - name: action
            type: string
            default: "list"
            description: "API action (list)"
          - name: appli
            type: int
            description: "Filter by category code (1=weight,4=BP/HR,16=activity,44=sleep,54=ECG,...)"
        response_path: "body.profiles"
        response:
          type: array
          item: NotifyProfile
      get:
        method: POST
        path: "/notify"
        description: "Get one subscription (get)."
        body:
          - name: action
            type: string
            default: "get"
            description: "API action (get)"
          - name: callbackurl
            type: string
            required: true
            description: "The subscribed callback URL"
          - name: appli
            type: int
            required: true
            description: "Category code"
        response_path: "body"
        response:
          type: object
          item: NotifyProfile
      subscribe:
        method: POST
        path: "/notify"
        description: "Subscribe a webhook (subscribe)."
        body:
          - name: action
            type: string
            default: "subscribe"
            description: "API action (subscribe)"
          - name: callbackurl
            type: string
            required: true
            description: "HTTPS callback URL (must return 200 to verification probe)"
          - name: appli
            type: int
            required: true
            description: "Category code to subscribe to"
          - name: comment
            type: string
            description: "Optional label"
        response_path: "body"
        response:
          type: object
          item: NotifyResult
      revoke:
        method: POST
        path: "/notify"
        description: "Revoke a webhook subscription (revoke)."
        body:
          - name: action
            type: string
            default: "revoke"
            description: "API action (revoke)"
          - name: callbackurl
            type: string
            required: true
            description: "The callback URL to revoke"
          - name: appli
            type: int
            description: "Category code"
        response_path: "body"
        response:
          type: object
          item: NotifyResult

types:
  MeasureGroup:
    fields:
      - name: grpid
        type: int
      - name: attrib
        type: int
      - name: date
        type: int
      - name: created
        type: int
      - name: modified
        type: int
      - name: category
        type: int
      - name: deviceid
        type: string
      - name: hash_deviceid
        type: string
      - name: comment
        type: string
  Activity:
    fields:
      - name: date
        type: string
      - name: timezone
        type: string
      - name: deviceid
        type: string
      - name: steps
        type: int
      - name: distance
        type: float
      - name: elevation
        type: float
      - name: calories
        type: float
      - name: totalcalories
        type: float
      - name: hr_average
        type: int
      - name: hr_min
        type: int
      - name: hr_max
        type: int
  IntradayResult:
    fields:
      - name: series
        type: string
  Workout:
    fields:
      - name: id
        type: int
      - name: category
        type: int
      - name: timezone
        type: string
      - name: model
        type: int
      - name: startdate
        type: int
      - name: enddate
        type: int
      - name: date
        type: string
      - name: deviceid
        type: string
  SleepPhase:
    fields:
      - name: startdate
        type: int
      - name: enddate
        type: int
      - name: state
        type: int
  SleepSummary:
    fields:
      - name: id
        type: int
      - name: timezone
        type: string
      - name: model
        type: int
      - name: startdate
        type: int
      - name: enddate
        type: int
      - name: date
        type: string
      - name: created
        type: int
      - name: modified
        type: int
  HeartRecord:
    fields:
      - name: deviceid
        type: string
      - name: model
        type: int
      - name: heart_rate
        type: int
      - name: timestamp
        type: int
      - name: timezone
        type: string
  EcgSignal:
    fields:
      - name: sampling_frequency
        type: int
      - name: wearposition
        type: int
  Device:
    fields:
      - name: type
        type: string
      - name: model
        type: string
      - name: model_id
        type: int
      - name: battery
        type: string
      - name: deviceid
        type: string
      - name: hash_deviceid
        type: string
      - name: timezone
        type: string
      - name: last_session_date
        type: int
  Goals:
    fields:
      - name: steps
        type: int
      - name: sleep
        type: int
  NotifyProfile:
    fields:
      - name: appli
        type: int
      - name: callbackurl
        type: string
      - name: comment
        type: string
      - name: expires
        type: int
  NotifyResult:
    fields:
      - name: status
        type: int
