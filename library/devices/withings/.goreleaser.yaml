version: 2
project_name: withings-pp-cli
changelog:
  disable: true
builds:
  - id: withings-pp-cli
    main: ./cmd/withings-pp-cli
    binary: withings-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/devices/withings/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: withings-pp-mcp
    main: ./cmd/withings-pp-mcp
    binary: withings-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: withings-pp-cli
    repository:
      owner: stellato
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Withings metric in one offline-first, agent-native CLI — with a local SQLite mirror and recomposition, recovery"
    install: |
      bin.install "withings-pp-cli"
      bin.install "withings-pp-mcp"
