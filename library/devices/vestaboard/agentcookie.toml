# agentcookie.toml: secrets-bus adoption manifest v2
# See docs/spec-agentcookie-secrets-bus-v2-adoption.md
schema_version = 2
name = "vestaboard-pp-cli"
display_name = "Vestaboard"
description = "Read, render, and write your Vestaboard from the terminal — with a board preview and character-code table no other Vestaboard tool ships."
project_kind = "cli"

[secrets.file]
path = "~/.config/vestaboard-pp-cli/config.toml"

[sync]
default = false

[sync.keys]
VESTABOARD_API_KEY = true
