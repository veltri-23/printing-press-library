version: 2
project_name: gl-inet-pp-cli
changelog:
  disable: true
builds:
  - id: gl-inet-pp-cli
    main: ./cmd/gl-inet-pp-cli
    binary: gl-inet-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/devices/gl-inet/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: gl-inet-pp-mcp
    main: ./cmd/gl-inet-pp-mcp
    binary: gl-inet-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: gl-inet-pp-cli
    repository:
      owner: paulbockewitz
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The first maintained CLI for GL.iNet travel routers — named config profiles, travel macros, and version-aware diagnostics no other GL.iNet tool ships."
    install: |
      bin.install "gl-inet-pp-cli"
      bin.install "gl-inet-pp-mcp"
