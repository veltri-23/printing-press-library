version: 2
project_name: walkingpad-pp-cli
changelog:
  disable: true
builds:
  - id: walkingpad-pp-cli
    main: ./cmd/walkingpad-pp-cli
    binary: walkingpad-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/devices/walkingpad/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: walkingpad-pp-mcp
    main: ./cmd/walkingpad-pp-mcp
    binary: walkingpad-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: walkingpad-pp-cli
    repository:
      owner: contributors
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "WalkingPad device CLI"
    install: |
      bin.install "walkingpad-pp-cli"
      bin.install "walkingpad-pp-mcp"
