version: 2
project_name: ankiweb-pp-cli
changelog:
  disable: true
builds:
  - id: ankiweb-pp-cli
    main: ./cmd/ankiweb-pp-cli
    binary: ankiweb-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/education/ankiweb/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: ankiweb-pp-mcp
    main: ./cmd/ankiweb-pp-mcp
    binary: ankiweb-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: ankiweb-pp-cli
    repository:
      owner: paul-bockewitz
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The only terminal-native way to search, rank"
    install: |
      bin.install "ankiweb-pp-cli"
      bin.install "ankiweb-pp-mcp"
