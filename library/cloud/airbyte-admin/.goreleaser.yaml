version: 2
project_name: airbyte-admin-pp-cli
changelog:
  disable: true
builds:
  - id: airbyte-admin-pp-cli
    main: ./cmd/airbyte-admin-pp-cli
    binary: airbyte-admin-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/cloud/airbyte-admin/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: airbyte-admin-pp-mcp
    main: ./cmd/airbyte-admin-pp-mcp
    binary: airbyte-admin-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: airbyte-admin-pp-cli
    repository:
      owner: sdhilip200
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Read-only Airbyte administration CLI for inspecting workspaces, connections, sync jobs, and connector metadata."
    install: |
      bin.install "airbyte-admin-pp-cli"
      bin.install "airbyte-admin-pp-mcp"
