<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<style>
  :root { color-scheme: light dark; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; --accent:#2563eb; }
  body { font:17px/1.7 Georgia, "Times New Roman", serif; color:var(--ink);
         max-width:40rem; margin:3.5rem auto; padding:0 1.25rem; }
  h1 { font-family:-apple-system, system-ui, sans-serif; font-size:2.1rem; line-height:1.2; margin:0 0 0.5rem; }
  .meta { font-family:-apple-system, system-ui, sans-serif; color:var(--muted); font-size:0.9rem; margin:0 0 2rem; border-bottom:1px solid var(--line); padding-bottom:1rem; }
  h2 { font-family:-apple-system, system-ui, sans-serif; font-size:1.3rem; margin:2rem 0 0.5rem; }
  a { color:var(--accent); }
  pre { background:#f3f4f6; padding:1rem; border-radius:0.5rem; overflow:auto; font-size:0.9rem; }
  blockquote { border-left:3px solid var(--line); margin:1rem 0; padding-left:1rem; color:var(--muted); }
</style>
</head>
<body>
<h1>{{HEADING}}</h1>
<div class="meta">{{BODY}}</div>
<p>Start writing here. This template is tuned for long-form reading: an article, a write-up, a spec, or documentation.</p>
<h2>Section</h2>
<p>Replace with your content.</p>
</body>
</html>
