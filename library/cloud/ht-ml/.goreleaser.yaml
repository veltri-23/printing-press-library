version: 2
project_name: ht-ml-pp-cli
changelog:
  disable: true
builds:
  - id: ht-ml-pp-cli
    main: ./cmd/ht-ml-pp-cli
    binary: ht-ml-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/cloud/ht-ml/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: ht-ml-pp-mcp
    main: ./cmd/ht-ml-pp-mcp
    binary: ht-ml-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: ht-ml-pp-cli
    repository:
      owner: bobeglz
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The only ht-ml.app tool that remembers what you published, a local registry of every site, its once-only update_key, and full version history, plus one-command publish-with-assets."
    install: |
      bin.install "ht-ml-pp-cli"
      bin.install "ht-ml-pp-mcp"
