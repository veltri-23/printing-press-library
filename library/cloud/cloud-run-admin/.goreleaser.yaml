version: 2
project_name: cloud-run-admin-pp-cli
changelog:
  disable: true
builds:
  - id: cloud-run-admin-pp-cli
    main: ./cmd/cloud-run-admin-pp-cli
    binary: cloud-run-admin-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/cloud/cloud-run-admin/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: cloud-run-admin-pp-mcp
    main: ./cmd/cloud-run-admin-pp-mcp
    binary: cloud-run-admin-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: cloud-run-admin-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Inspect and operate Google Cloud Run services, jobs, revisions, executions, and local inventory for serverless container fleets."
    install: |
      bin.install "cloud-run-admin-pp-cli"
      bin.install "cloud-run-admin-pp-mcp"
