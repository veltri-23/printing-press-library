version: 2
project_name: cloudflare-pp-cli
changelog:
  disable: true
builds:
  - id: cloudflare-pp-cli
    main: ./cmd/cloudflare-pp-cli
    binary: cloudflare-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/cloud/cloudflare/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: cloudflare-pp-mcp
    main: ./cmd/cloudflare-pp-mcp
    binary: cloudflare-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: cloudflare-pp-cli
    repository:
      owner: 
      name: homebrew-tap
    homepage: "https://github.com//cloudflare-pp-cli"
    description: "Agent-ready CLI for Cloudflare accounts, zones, DNS, Workers, Pages, R2, tunnels, Zero Trust, and infrastructure operations."
    install: |
      bin.install "cloudflare-pp-cli"
      bin.install "cloudflare-pp-mcp"
