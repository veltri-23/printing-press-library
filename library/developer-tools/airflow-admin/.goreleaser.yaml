version: 2
project_name: airflow-admin-pp-cli
changelog:
  disable: true
builds:
  - id: airflow-admin-pp-cli
    main: ./cmd/airflow-admin-pp-cli
    binary: airflow-admin-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/airflow-admin/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: airflow-admin-pp-mcp
    main: ./cmd/airflow-admin-pp-mcp
    binary: airflow-admin-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: airflow-admin-pp-cli
    repository:
      owner: sdhilip200
      name: homebrew-tap
    homepage: "https://github.com/sdhilip200/airflow-admin-pp-cli"
    description: "Focused read-first API surface for inspecting Apache Airflow DAGs, DAG runs, task instances, pools, variables"
    install: |
      bin.install "airflow-admin-pp-cli"
      bin.install "airflow-admin-pp-mcp"
