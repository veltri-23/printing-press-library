version: 2
project_name: claude-agent-sdk-python-docs-pp-cli
changelog:
  disable: true
builds:
  - id: claude-agent-sdk-python-docs-pp-cli
    main: ./cmd/claude-agent-sdk-python-docs-pp-cli
    binary: claude-agent-sdk-python-docs-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/claude-agent-sdk-python-docs/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: claude-agent-sdk-python-docs-pp-mcp
    main: ./cmd/claude-agent-sdk-python-docs-pp-mcp
    binary: claude-agent-sdk-python-docs-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: claude-agent-sdk-python-docs-pp-cli
    repository:
      owner: nikships
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "A source-grounded CLI for exploring and verifying the Claude Agent SDK Python docs."
    install: |
      bin.install "claude-agent-sdk-python-docs-pp-cli"
      bin.install "claude-agent-sdk-python-docs-pp-mcp"
