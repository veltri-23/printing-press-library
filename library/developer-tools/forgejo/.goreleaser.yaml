version: 2
project_name: forgejo-pp-cli
changelog:
  disable: true
builds:
  - id: forgejo-pp-cli
    main: ./cmd/forgejo-pp-cli
    binary: forgejo-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/forgejo/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: forgejo-pp-mcp
    main: ./cmd/forgejo-pp-mcp
    binary: forgejo-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: forgejo-pp-cli
    repository:
      owner: jrimmer
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The `gh` for Forgejo — works with any instance, stores your data locally, and speaks Forgejo natively."
    install: |
      bin.install "forgejo-pp-cli"
      bin.install "forgejo-pp-mcp"
