version: 2
project_name: github-intel-pp-cli
changelog:
  disable: true
builds:
  - id: github-intel-pp-cli
    main: ./cmd/github-intel-pp-cli
    binary: github-intel-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github-intel-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: github-intel-pp-mcp
    main: ./cmd/github-intel-pp-mcp
    binary: github-intel-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: github-intel-pp-cli
    repository:
      owner: hnshah
      name: homebrew-tap
    homepage: "https://github.com/hnshah/github-intel-pp-cli"
    description: "Public GitHub repository, release, search, and security advisory signals for agent research."
    install: |
      bin.install "github-intel-pp-cli"
      bin.install "github-intel-pp-mcp"
