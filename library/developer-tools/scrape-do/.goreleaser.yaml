version: 2
project_name: scrape-do-pp-cli
changelog:
  disable: true
builds:
  - id: scrape-do-pp-cli
    main: ./cmd/scrape-do-pp-cli
    binary: scrape-do-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/scrape-do/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: scrape-do-pp-mcp
    main: ./cmd/scrape-do-pp-mcp
    binary: scrape-do-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: scrape-do-pp-cli
    repository:
      owner: charles-garrison
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The first CLI for Scrape-do with Google SERP scraping plus a credit and concurrency governor"
    install: |
      bin.install "scrape-do-pp-cli"
      bin.install "scrape-do-pp-mcp"
