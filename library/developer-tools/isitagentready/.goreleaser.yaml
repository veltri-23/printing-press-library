version: 2
project_name: isitagentready-pp-cli
changelog:
  disable: true
builds:
  - id: isitagentready-pp-cli
    main: ./cmd/isitagentready-pp-cli
    binary: isitagentready-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/isitagentready/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: isitagentready-pp-mcp
    main: ./cmd/isitagentready-pp-mcp
    binary: isitagentready-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: isitagentready-pp-cli
    repository:
      owner: bobeglz
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The terminal scanner for AI-agent readiness: every check the web tool runs, plus copy-paste fixes, CI gating, scan history, and a local store the web UI has no answer for."
    install: |
      bin.install "isitagentready-pp-cli"
      bin.install "isitagentready-pp-mcp"
