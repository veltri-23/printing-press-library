version: 2
project_name: agent-desktop-pp-cli
changelog:
  disable: true
builds:
  - id: agent-desktop-pp-cli
    main: ./cmd/agent-desktop-pp-cli
    binary: agent-desktop-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/agent-desktop/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: agent-desktop-pp-cli
    repository:
      owner: lahfir
      name: homebrew-tap
    homepage: "https://github.com/lahfir/agent-desktop"
    description: "Printing Press bridge for the Rust agent-desktop desktop automation CLI."
    install: |
      bin.install "agent-desktop-pp-cli"
