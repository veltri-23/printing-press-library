version: 2
project_name: github-contents-pp-cli
changelog:
  disable: true
builds:
  - id: github-contents-pp-cli
    main: ./cmd/github-contents-pp-cli
    binary: github-contents-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/github-contents/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: github-contents-pp-mcp
    main: ./cmd/github-contents-pp-mcp
    binary: github-contents-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: github-contents-pp-cli
    repository:
      owner: rvdlaar
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Download any GitHub folder without cloning — plan it first, verify it after, re-sync only what changed."
    install: |
      bin.install "github-contents-pp-cli"
      bin.install "github-contents-pp-mcp"
