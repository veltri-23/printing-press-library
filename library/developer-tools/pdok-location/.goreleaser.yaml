version: 2
project_name: pdok-location-pp-cli
changelog:
  disable: true
builds:
  - id: pdok-location-pp-cli
    main: ./cmd/pdok-location-pp-cli
    binary: pdok-location-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/pdok-location/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: pdok-location-pp-mcp
    main: ./cmd/pdok-location-pp-mcp
    binary: pdok-location-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: pdok-location-pp-cli
    repository:
      owner: markvandeven
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "One Go binary for every Dutch location workflow — geocode, reverse-geocode, batch CSVs, full GeoJSON geometries,..."
    install: |
      bin.install "pdok-location-pp-cli"
      bin.install "pdok-location-pp-mcp"
