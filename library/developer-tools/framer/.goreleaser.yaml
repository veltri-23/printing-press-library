version: 2
project_name: framer-pp-cli
changelog:
  disable: true
builds:
  - id: framer-pp-cli
    main: ./cmd/framer-pp-cli
    binary: framer-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/developer-tools/framer/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: framer-pp-mcp
    main: ./cmd/framer-pp-mcp
    binary: framer-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: framer-pp-cli
    repository:
      owner: ioncom
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "CLI for managing Framer websites — CMS, canvas, code files, publishing, and site migration. Requires Node."
    install: |
      bin.install "framer-pp-cli"
      bin.install "framer-pp-mcp"
