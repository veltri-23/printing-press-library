# agentcookie.toml: secrets-bus adoption manifest v2
# See docs/spec-agentcookie-secrets-bus-v2-adoption.md
schema_version = 2
name = "framer-pp-cli"
display_name = "Framer"
description = "CLI for managing Framer websites — CMS, canvas, code files, publishing, and site migration. Requires Node."
project_kind = "cli"

[secrets.file]
path = "~/.config/framer-pp-cli/config.toml"

[sync]
default = false

[sync.keys]
FRAMER_API_KEY = true
