    transport: shopify_suggest
    categories: [hvac]
    auth:
      type: none
    notes: Public Shopify `/search/suggest.json` endpoint returns mini-split and heat-pump products with IDs, vendor/title, type, product URL, image URL, and price fields. Reno Goat ranks equipment rows ahead of accessories for HVAC queries.
  sylvane:
