resources:
  product-search:
    description: Fan-out product search across active sources. Category-based routing sends queries to relevant sources. Returns normalized products with unified price, rating, and brand fields.
    endpoints:
      ferguson-search:
        method: POST
        source: ferguson
        source_base_url: https://www.fergusonhome.com
        path: /graphql/ProductSearch
        description: Search products via Ferguson GraphQL. Returns ProductSearchResult (count + products) or SearchRedirect. Primary source for foundational fixtures and appliances.
        content_type: application/json
        params:
        - name: query
          type: string
          required: true
          positional: true
          description: Product search query text.
        - name: first
          flag_name: per-page
          type: int
          default: 20
          description: Number of results per page.
        - name: offset
          type: int
          default: 0
          description: Pagination offset (0-indexed).
        - name: sort
          type: string
          default: relevance
          description: Sort order for results.
          enum:
          - relevance
          - price-asc
          - price-desc
        response:
          type: object
          item: FergusonSearchResult
      westelm-search:
        method: GET
        source: west-elm
        source_base_url: https://ac.cnstrc.com
        path: /search/{query}
        description: Search products via West Elm Constructor.io API. Returns faceted results with product data, prices, and images.
        params:
        - name: query
          type: string
          required: true
          positional: true
          in: path
          description: Product search query text.
        - name: key
          type: string
          default: key_SQBuGmXjiXmP0UNI
          description: Constructor.io API key.
        - name: num_results_per_page
          flag_name: per-page
          type: int
          default: 20
          description: Number of results per page.
        - name: page
          type: int
          default: 1
          description: Page number (1-indexed).
        - name: sort_by
          flag_name: sort
          type: string
          default: relevance
          description: Sort field.
          enum:
          - relevance
          - lowestPrice
          - highestPrice
          - name
        - name: sort_order
          type: string
          default: ascending
          description: Sort direction (used with sort_by).
          enum:
          - ascending
          - descending
        - name: filters
          flag_name: facet
          type: string
          description: 'Facet filter expression. Format: facet_name=value (e.g. "Product Type=Vanities", "Material=Wood", "Color=White").'
        - name: i
          type: string
