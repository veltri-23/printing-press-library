    base_url: https://plumbtile.com
    transport: shopify_suggest
    categories: [plumbing]
    auth:
      type: none
    notes: Public Shopify `/search/suggest.json` endpoint returns bath/plumbing showroom product rows with vendor/title, product URL, image URL, price and compare-at fields, manufacturer part numbers, and linked spec-sheet PDFs in product body HTML.
  modern-bathroom:
    display_name: Modern Bathroom
    base_url: https://www.modernbathroom.com
    transport: shopify_suggest
    categories: [plumbing]
    auth:
      type: none
    notes: Public Shopify `/search/suggest.json` endpoint returns bath showroom product rows with vendor/title, product type, URL, image URL, price and compare-at fields, and body metadata. Reno Goat routes it to plumbing, skips vanity sidesplashes/countertop accessory rows for vanity queries, keeps shower valve/trim parts when the query asks for them, and normalizes vanity handles into compact selection IDs.
  kbauthority:
