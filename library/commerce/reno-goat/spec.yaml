    notes: Public Searchspring search endpoint with siteId `yncuaq` returns price-bearing bath showroom JSON rows. Reno Goat parses SKU, brand, title, product URL, image URL, current price, category hierarchy, and description fields for plumbing and bath decor queries.
  signature-hardware:
