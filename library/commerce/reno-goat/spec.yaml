    notes: Public Hyva/Magento HVAC category page renders server-side product cards with SKU, product ID, title, product URL, image URL, and price fields. Reno Goat routes HVAC system/equipment queries to the stable full-systems category and filters out warranty, line-set, adapter, control-board, and other service-part cards.
