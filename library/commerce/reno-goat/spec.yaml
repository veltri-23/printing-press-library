    transport: shopify_suggest
    categories: [hvac]
    auth:
      type: none
    notes: Public Shopify `/search/suggest.json` endpoint returns HVAC-adjacent products such as whole-house dehumidifiers, bath fans, air quality equipment, and ductless-system products with IDs, vendor/title, type, product URL, image URL, and price fields.
  iwae:
