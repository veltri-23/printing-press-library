# agentcookie.toml: secrets-bus adoption manifest v2
# See docs/spec-agentcookie-secrets-bus-v2-adoption.md
schema_version = 2
name = "grubhub-pp-cli"
display_name = "Grubhub"
description = "Every Grubhub restaurant search, plus a sortable delivery-fee comparison board, a cross-restaurant deal radar, and offline menu-item search no Grubhub tool has."
project_kind = "cli"

[secrets.file]
path = "~/.config/grubhub-pp-cli/config.toml"

[sync]
default = false

[sync.keys]
GRUBHUB_TOKEN = true
