version: 2
project_name: restaurant365-odata-pp-cli
changelog:
  disable: true
builds:
  - id: restaurant365-odata-pp-cli
    main: ./cmd/restaurant365-odata-pp-cli
    binary: restaurant365-odata-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/commerce/restaurant365-odata/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: restaurant365-odata-pp-mcp
    main: ./cmd/restaurant365-odata-pp-mcp
    binary: restaurant365-odata-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: restaurant365-odata-pp-cli
    repository:
      owner: dhilip-subramanian
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Read-only OpenAPI description for documented Restaurant365 OData v2 reporting views."
    install: |
      bin.install "restaurant365-odata-pp-cli"
      bin.install "restaurant365-odata-pp-mcp"
