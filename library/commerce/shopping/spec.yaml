  /retailers/{retailer_id}/products:
    get:
      tags:
        - Retailers
      summary: Search/Filter Products by Retailer (Cursor Paginated)
      description: |
        Retrieves a paginated list of products for a specific retailer with advanced search and filtering capabilities.
        The API searches across 115+ million products with sub-second response times.

        ## Search Capabilities

        ## Common Query Patterns

        **Text Search with Auto-Detection (NEW!):**
        ```
        GET /retailers/walmart/products?search_query=Nike%20Socks
        # Auto-detects as text search - Returns 13.6M+ Nike sock products

        GET /retailers/walmart/products?search_query=gaming%20laptop&min_price=500&max_price=2000
        # Auto-detects as text search - Gaming laptops in $500-2000 price range

        GET /retailers/walmart/products?search_query=08004608232285
        # Auto-detects as GTIN barcode - Returns specific product

        GET /retailers/walmart/products?search_query=123456789012,987654321098
        # Auto-detects as multiple GTINs - Returns products matching any barcode

        GET /retailers/walmart/products?lookup_type=text&search_query=12345
        # Force text search even for numeric queries (optional override)
        ```

        **Barcode/Identifier Lookups:**
        ```
        GET /retailers/walmart/products?upc=123456789012
        # Filter by UPC barcode (exact match)

        GET /retailers/walmart/products?ean=1234567890123
        # Filter by EAN barcode (exact match)

        GET /retailers/walmart/products?gtin=12345678901234&condition=New
        # GTIN filter with condition

        GET /retailers/walmart/products?mpn=WIDGET-PRO-123&brand=Acme
        # Filter by Manufacturer Part Number with brand
        ```

        **SKU and Model Searches:**
        ```
        GET /retailers/walmart/products/873973300
        # Get specific product by SKU (direct lookup endpoint)

        GET /retailers/walmart/products?unique_merchant_sku=873973300
        # Search by SKU using filter parameter

        GET /retailers/walmart/products?model=iPhone-15-Pro&brand=Apple&color=Natural%20Titanium
        # Find products by model number with attributes
        ```

        **Category & Subcategory Filtering:**
        ```
        GET /retailers/walmart/products?category=Clothing>Fashion%20Brands>Nike
        # All Nike fashion products

        GET /retailers/walmart/products?subcategory=Athletic%20Socks&color=Black&size=Large
        # Black athletic socks in large size

        GET /retailers/walmart/products?category=Electronics&subcategory=Gaming%20Laptops&min_price=1000
        # Gaming laptops over $1000 in Electronics category
        ```

        **Discount & Sale Filtering (Enhanced!):**
        ```
        GET /retailers/walmart/products?on_sale=true&sort_by=discount_desc
        # All sale items sorted by highest discount percentage first

        GET /retailers/walmart/products?min_discount_percent=30
        # Products with at least 30% off

        GET /retailers/walmart/products?min_discount_percent=20&max_discount_percent=50
        # Products with 20-50% discount range

        GET /retailers/walmart/products?min_discount_percent=25&category=Electronics&in_stock=true
        # Electronics with 25%+ discount that are in stock

        GET /retailers/walmart/products?on_sale=true&min_discount_percent=40&sort_by=price_asc
        # Sale items with 40%+ off, sorted by lowest price

        GET /retailers/walmart/products?brand=Nike&min_discount_percent=15&max_price=100
        # Nike products with 15%+ discount under $100
        ```

        **Advanced Multi-Parameter Filtering:**
        ```
        GET /retailers/walmart/products?min_price=10&max_price=50&on_sale=true&in_stock=true&currency=USD
        # Sale items in stock between $10-50 in USD

        GET /retailers/walmart/products?min_rating=4.5&min_reviews=100&max_shipping=0
        # Highly rated products with free shipping

        GET /retailers/walmart/products?material=Cotton&size=Large&color=Blue&condition=New&in_stock=true
        # Specific product attributes with stock availability

        GET /retailers/walmart/products?created_since=2025-01-01T00:00:00Z&min_rating=4.0&min_reviews=50&sort_by=created_at_desc
        # Recently added well-reviewed products

        GET /retailers/walmart/products?min_weight=1.0&max_weight=5.0&category=Sports%20%26%20Outdoors
        # Sports equipment within specific weight range

        GET /retailers/walmart/products?stock_availability=In%20Stock&max_shipping=15.99&min_reviews=10
        # In-stock items with affordable shipping and reviews
        ```

        **Sorting Options with Examples:**
        ```
        GET /retailers/walmart/products?category=Electronics&sort_by=price_asc
        # Electronics sorted by lowest price first

        GET /retailers/walmart/products?on_sale=true&sort_by=discount_desc
        # Sale items sorted by highest discount percentage first

        GET /retailers/walmart/products?search_query=laptop&sort_by=price_desc
        # Laptops sorted by highest price first

        GET /retailers/walmart/products?brand=Nike&sort_by=discount_asc
        # Nike products sorted by lowest discount first

        GET /retailers/walmart/products?category=Clothing&sort_by=updated_at_desc
        # Recently updated clothing items first

        GET /retailers/walmart/products?min_rating=4.0&sort_by=created_at_desc
        # Newest highly-rated products first

        GET /retailers/walmart/products?search_query=shoes
        # Shoes with relevance-based sorting (default when sort_by omitted)
        ```

        GET /retailers/walmart/products?search_query=laptop&sort_by=price_desc
        # Laptops sorted by highest price (premium products first)
        ```

        ## Pagination Guide

        **Efficient Cursor-Based Pagination:**
        ```
        # Step 1: First request (omit 'after' parameter)
        GET /retailers/walmart/products?lookup_type=text&search_query=laptop&limit=100&sort_by=price_asc

        # Response includes next_cursor: "WzU5OS45OSw3ODkxMjNd"

        # Step 2: Use cursor for next page
        GET /retailers/walmart/products?lookup_type=text&search_query=laptop&limit=100&sort_by=price_asc&after=WzU5OS45OSw3ODkxMjNd

        # Step 3: Continue until next_cursor is null (last page)
        ```

        **Pagination Best Practices:**
        - **Use consistent parameters**: Keep `search_query`, `limit`, and `sort_by` the same across requests
        - **Handle large datasets**: Maximum 10,000 items per request - paginate for larger datasets
        - **Performance optimization**: Smaller page sizes (25-100) provide faster response times
        - **Error handling**: Check for 400 errors if limit exceeds 10,000
        - **Cursor format**: Base64-encoded sort values ensure stable pagination even with data changes

        **Common Pagination Patterns:**
        - **Small previews**: `limit=10` for quick product previews
        - **Standard browsing**: `limit=25-50` for user-facing product lists
        - **Bulk processing**: `limit=1000-10000` for data analysis or batch operations
        - **Real-time sync**: Use `sort_by=updated_at_desc` with pagination for incremental updates

      operationId: findRetailerProductsCursor
      security:
        - ApiKeyAuth: []
      parameters:
        - name: retailer_id
          in: path
          required: true
          description: |
            The ID of the retailer. Use the `/retailers` endpoint for the full current list.
            Examples: walmart, homedepot, target, nike, kohls, macys, nordstrom, sephora, chewy, uniqlo, carhartt, hugo_boss, alo_yoga, ariat, warby_parker, and more.
          schema:
            type: string
          examples:
            walmart:
              summary: Walmart products
              value: "walmart"
              description: "Search Walmart's 115+ million product catalog"
            homedepot:
              summary: Home Depot products
              value: "homedepot"
              description: "Search Home Depot's product catalog"
            target:
              summary: Target products
              value: "target"
              description: "Search Target's product catalog"
            ace_hardware:
              summary: Ace Hardware products
              value: "ace_hardware"
              description: "Search Ace Hardware's product catalog"
        - name: lookup_type
          in: query
          description: |
            **OPTIONAL**: Type of lookup to perform when search_query is provided.

            **Auto-Detection (Recommended)**: When omitted, the API automatically detects the query type:
            - **Numeric queries** (8-14 digits): Automatically detected as GTIN search
            - **Text queries**: Automatically detected as text search
            - **Multiple GTINs**: Comma-separated numeric codes are detected as GTIN search

            **Manual Override**: You can explicitly specify the lookup type:
            - `gtin`: Force GTIN/UPC/EAN search mode for identifier lookups
            - `text`: Force text search mode for name/description matching

            **Examples of Auto-Detection**:
            - `search_query=123456789012` → Auto-detected as `gtin`
            - `search_query=Nike Shoes` → Auto-detected as `text`
            - `search_query=123456789012,987654321098` → Auto-detected as `gtin` (multiple)
          required: false
          schema:
            type: string
            enum: [gtin, text]
          examples:
            auto_detection:
              summary: Auto-detection (recommended)
              description: "Omit lookup_type to use automatic detection based on query format"
            gtin_override:
              summary: Force GTIN search
              value: gtin
              description: "Explicitly search as GTIN/UPC/EAN codes"
            text_override:
              summary: Force text search
              value: text
              description: "Explicitly search as text in product names/descriptions"
        - name: search_query
          in: query
          required: false
          description: |
            Search query string with automatic detection of search type.

            **GTIN/Barcode Queries** (automatically detected):
            - Single GTIN: `123456789012` (8-14 digits)
            - Multiple GTINs: `123456789012,987654321098` (comma-separated)
            - Max identifiers per request: 10,000 (configurable)
            - Searches exact matches in UPC, EAN, GTIN, and MPN fields

            **Text Queries** (automatically detected):
            - Product searches: `Nike shoes`, `gaming laptop`, `coffee maker`
            - Brand queries: `Apple`, `Samsung`, `Nike`
            - Category searches: `wireless headphones`, `kitchen appliances`
            - Uses fuzzy matching across names, descriptions, brands, and categories

            **Auto-Detection Examples:**
            - Brand + Product: `Nike shoes` → Text search across 13.6M+ results
            - GTIN lookup: `123456789012` → Exact barcode match
            - Category search: `gaming laptops` → Text search with fuzzy matching
            - Multiple codes: `123456789012,987654321098` → Batch GTIN lookup
          schema:
            type: string
          examples:
            brand_search:
              summary: Search for Nike products
              value: "Nike"
              description: "Returns 12.7M+ Nike products across all categories"
            brand_product:
              summary: Search for Nike socks specifically
              value: "Nike Socks"
              description: "Returns 13.6M+ Nike sock products with detailed information"
            electronics:
              summary: Search for gaming laptops
              value: "gaming laptop"
              description: "Find gaming laptops across different brands and price ranges"
            appliances:
              summary: Search for coffee makers
              value: "coffee maker"
              description: "Kitchen appliances - coffee makers and espresso machines"
            clothing:
              summary: Search for winter jackets
              value: "winter jacket"
              description: "Seasonal clothing items with various styles and brands"
            accessories:
              summary: Search for wireless headphones
              value: "wireless headphones"
              description: "Audio accessories with Bluetooth connectivity"
            home_goods:
              summary: Search for memory foam mattress
              value: "memory foam mattress"
              description: "Bedding and sleep products with comfort features"
