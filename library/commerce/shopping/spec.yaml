  /retailers/{retailer_id}/products/{product_id}:
    get:
      tags:
        - Retailers
      summary: Get Product Details by SKU
      description: |
        Retrieves detailed information for a specific product within a retailer's catalog, looking up by Unique Merchant SKU.

        ## Common Use Cases

        **Direct Product Access:**
        ```
        GET /retailers/walmart/products/226595547
        # Get Nike sock product by SKU

        GET /retailers/walmart/products/ASUS-ROG-G15-2024
        # Get gaming laptop by alphanumeric SKU

        GET /retailers/homedepot/products/HD-12345-XL
        # Get Home Depot product by SKU format
        ```

        **Integration Patterns:**
        - Product detail pages: Use SKU from search results
        - Inventory management: Direct SKU lookups
        - Price monitoring: Regular SKU-based checks
        - Catalog synchronization: Bulk SKU validation

        **Performance:** Sub-50ms response times for direct SKU lookups with full product details.
      operationId: getRetailerProductDetailsBySKU
      security:
        - ApiKeyAuth: []
      parameters:
        - name: retailer_id
          in: path
          required: true
          description: |
            The ID of the retailer. Use the `/retailers` endpoint for the full current list.
            Examples: walmart, homedepot, target, nike, kohls, macys, nordstrom, sephora, chewy, uniqlo, carhartt, hugo_boss, alo_yoga, ariat, warby_parker, and more.
          schema:
            type: string
          examples:
            walmart:
              summary: Walmart products
              value: "walmart"
              description: "Access Walmart's 115+ million product catalog"
            homedepot:
              summary: Home Depot products
              value: "homedepot"
              description: "Access Home Depot's product catalog"
            target:
              summary: Target products
              value: "target"
              description: "Access Target's product catalog"
        - name: product_id # Path parameter name remains product_id for URL compatibility
          in: path
          required: true
          description: |
            The Unique Merchant SKU of the product. SKU formats vary by retailer:
            - Walmart: Numeric (e.g., "226595547") or alphanumeric (e.g., "ASUS-ROG-G15-2024")
            - Home Depot: Typically alphanumeric with retailer prefix (e.g., "HD-12345-XL")
          schema:
            type: string
          examples:
