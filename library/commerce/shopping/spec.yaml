openapi: 3.0.3
info:
  title: LemmeBuyIt API
  description: |
    Main REST API for accessing LemMeBuyIt's aggregated retail product data.
    Authenticate requests with the `X-API-Key` header and call the production
    API at `https://api.lemmebuyit.com/v1`.

    These docs cover direct API access only. MCP access is configured separately
    and is not documented in this OpenAPI specification.
  version: 1.0.0 # Corresponds to API version /v1
  contact:
    name: LemmeBuyIt API Support
    url: https://www.lemmebuyit.com/developer
    email: support@lemmebuyit.com

servers:
  - url: https://api.lemmebuyit.com/v1 # Corrected server URL
    description: Production server

# Define global tags for grouping paths
tags:
  - name: Retailers
    description: Operations related to retailers and their products.
  - name: Status
    description: API health and status checks.

# All endpoints require the X-API-Key (the live gateway returns 401 even for
# /status, which the per-operation security blocks below omit). A global
# security requirement makes every generated command send the key.
security:
  - ApiKeyAuth: []

# Define reusable components like security schemes and schemas
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key # As defined in PRD
      description: API key for authenticating direct REST API requests.

  schemas:
    # --- Error Schemas --- (Used by public API)
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: A human-readable error message.
      required:
        - error
      example:
        error: Invalid API key

    # --- Basic Schemas --- (Used by public API)
    Retailer:
      type: object
      properties:
        id:
          type: string
          description: The unique identifier for the retailer (e.g., 'walmart').
          example: walmart
        name:
          type: string
          description: The display name of the retailer.
          example: Walmart
        product_count:
          type: integer
          format: int64
          description: Total number of products currently indexed for this retailer.
          example: 115000000
        last_updated:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recently updated product for this retailer.
          example: "2026-05-08T12:30:00Z"
        category:
          type: string
          nullable: true
          description: The retailer's business category (e.g., 'General Merchandise', 'Footwear', 'Beauty').
          example: "General Merchandise"
      required:
        - id
        - name
        - product_count

    # --- Product Schemas --- (Used by public API)
    Product:
      type: object
      description: Represents a product listing from a specific retailer.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the product within the retailer's catalog.
          example: 123456789
        retailer_id:
          type: string
          nullable: true
          description: Retailer identifier for the product record.
          example: "walmart"
        unique_merchant_sku:
          type: string
          description: Retailer's specific Stock Keeping Unit (SKU).
          example: "ABC-12345"
        product_name:
          type: string
          description: The name or title of the product.
          example: "Example Widget Pro (Red)"
        product_description:
          type: string
          nullable: true
          description: Detailed description of the product.
          example: "An improved widget with advanced features..."
        product_url:
          type: string
          format: url
          nullable: true
          description: Direct URL to the product page on the retailer's website.
          example: "https://example-retailer.com/product/abc-12345"
        image_url:
          type: string
          format: url
          nullable: true
          description: "URL of the primary product image. (Deprecated: use primary_image_url)"
          example: "https://images.example-retailer.com/abc-12345.jpg"
        primary_image_url:
          type: string
          nullable: true
          description: URL of the main product image.
          example: "https://images.example-retailer.com/main-abc-12345.jpg"
        additional_images:
          type: array
          nullable: true
          description: Array of additional product image URLs.
          items:
            type: string
          example: ["https://images.example.com/product-2.jpg", "https://images.example.com/product-3.jpg"]
        current_price:
          type: number
          format: double
          nullable: true
          description: The current selling price.
          example: 19.99
        original_price:
          type: number
          format: double
          nullable: true
          description: The original price before discounts (MSRP).
          example: 24.99
        currency:
          type: string
          nullable: true
          description: Currency code (ISO 4217).
          example: "USD"
        discount_percentage:
          type: number
          format: double
          nullable: true
          description: Calculated discount percentage from original to current price.
          example: 20.5
        category:
          type: string
          nullable: true
          description: Product category path or name.
          example: "Electronics > Gadgets"
        category_id:
          type: string
          nullable: true
          description: Retailer's specific category ID.
          example: "CAT123"
        brand:
          type: string
          nullable: true
          description: The product brand name.
          example: "Nike"
        manufacturer:
          type: string
          nullable: true
          description: The product manufacturer.
          example: "WidgetCorp"
        sold_by:
          type: string
          nullable: true
          description: The seller or vendor name for the product (e.g., "Walmart.com", "CREAT3D"). Indicates whether the product is sold by the retailer directly or by a third-party marketplace seller.
          example: "Walmart.com"
        stock_availability:
          type: string
          nullable: true
          description: Stock status indicator (e.g., 'In Stock', 'Out of Stock').
          example: "In Stock"
        upc:
          type: string
          nullable: true
          description: Universal Product Code.
          example: "123456789012"
        ean:
          type: string
          nullable: true
          description: European Article Number.
          example: "1234567890123"
        mpn:
          type: string
          nullable: true
          description: Manufacturer Part Number.
          example: "WIDGET-PRO-R"
        asins:
          type: array
          description: Amazon ASIN mappings associated with the retailer product.
          items:
            type: string
          example: ["B0CJMX93TS", "B0CJMX93TT"]
        subcategory:
          type: string
          nullable: true
          description: Product subcategory.
          example: "Athletic Socks"
        in_stock:
          type: boolean
          nullable: true
          description: Boolean indicating if the product is currently in stock.
          example: true
        gtin:
          type: string
          nullable: true
          description: Global Trade Item Number.
          example: "12345678901234"
        model:
          type: string
          nullable: true
          description: Product model name or number.
          example: "Pro-2024"
        condition:
          type: string
          nullable: true
          description: Product condition (e.g., New, Used, Refurbished).
          example: "New"
        color:
          type: string
          nullable: true
          description: Product color.
          example: "Red"
        size:
          type: string
          nullable: true
          description: Product size.
          example: "Large"
        material:
          type: string
          nullable: true
          description: Product material.
          example: "Cotton"
        weight:
          type: number
          format: double
          nullable: true
          description: Product weight (in product's weight unit).
          example: 2.5
        rating:
          type: number
          format: double
          nullable: true
          description: Average product rating (0-5 scale).
          example: 4.2
        review_count:
          type: integer
          nullable: true
          description: Number of customer reviews.
          example: 156
        shipping_cost:
          type: number
          format: double
          nullable: true
          description: Shipping cost for the product.
          example: 7.99
        amazon_price:
          type: number
          format: double
          nullable: true
          description: Latest matched Amazon offer price for the mapped ASIN.
          example: 27.49
        amazon_reviews:
          allOf:
            - $ref: "#/components/schemas/AmazonReviews"
          nullable: true
        amazon_marketplace:
          allOf:
            - $ref: "#/components/schemas/AmazonMarketplace"
          nullable: true
        profitability:
          allOf:
            - $ref: "#/components/schemas/Profitability"
          nullable: true
        price_averages:
          allOf:
            - $ref: "#/components/schemas/PriceAverages"
          nullable: true
          description: |
            Pre-computed lifetime / 30 / 90 / 180 / 365-day averages for
            Amazon retail / 3P New / Buy Box / monthly_sold and Walmart
            price. Populated by the daily price-history sampler — fields
            within each window may be null until enough samples accumulate.
        canonical_identifier:
          type: string
          nullable: true
          description: Stable canonical identifier derived from internal identifier mapping.
          example: "WM-ABC-12345"
        created_at:
          type: string
          format: date-time
          description: Timestamp when the record was created in the Linkscopic system.
          example: "2024-04-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the record was last updated in the Linkscopic system.
          example: "2024-04-20T15:00:00Z"
        indexed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the product was last indexed into the search system.
          example: "2024-04-20T15:05:00Z"

    ShoppingProduct:
      type: object
      description: Shopping-safe product response returned by shopping endpoints.
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the product within the retailer's catalog.
          example: 123456789
        retailer_id:
          type: string
          nullable: true
          description: Retailer identifier for the product record.
          example: "walmart"
        unique_merchant_sku:
          type: string
          description: Retailer's specific Stock Keeping Unit (SKU).
          example: "ABC-12345"
        product_id:
          type: string
          nullable: true
          description: Retailer product identifier when available.
          example: "ABC-12345"
        product_name:
          type: string
          description: The name or title of the product.
          example: "Example Widget Pro (Red)"
        name:
          type: string
          description: Alternate product display name when available.
          example: "Example Widget Pro"
        product_description:
          type: string
          nullable: true
          description: Detailed description of the product.
          example: "An improved widget with advanced features..."
        product_url:
          type: string
          format: url
          nullable: true
          description: Shopping destination URL for the product.
          example: "https://example-retailer.com/product/abc-12345"
        image_url:
          type: string
          format: url
          nullable: true
          description: "URL of the primary product image. (Deprecated: use primary_image_url)"
          example: "https://images.example-retailer.com/abc-12345.jpg"
        primary_image_url:
          type: string
          nullable: true
          description: URL of the main product image.
          example: "https://images.example-retailer.com/main-abc-12345.jpg"
        additional_images:
          type: array
          nullable: true
          description: Array of additional product image URLs.
          items:
            type: string
          example: ["https://images.example.com/product-2.jpg", "https://images.example.com/product-3.jpg"]
        current_price:
          type: number
          format: double
          nullable: true
          description: The current selling price.
          example: 19.99
        original_price:
          type: number
          format: double
          nullable: true
          description: The original price before discounts.
          example: 24.99
        compare_at_price:
          type: number
          format: double
          nullable: true
          description: Compare-at price when supplied by the retailer.
          example: 24.99
        sale_price:
          type: number
          format: double
          nullable: true
          description: Sale price when supplied by the retailer.
          example: 19.99
        currency:
          type: string
          nullable: true
          description: Currency code (ISO 4217).
          example: "USD"
        discount:
          type: number
          format: double
          nullable: true
          description: Discount amount from original to current price.
          example: 5.0
        discount_percentage:
          type: number
          format: double
          nullable: true
          description: Calculated discount percentage from original to current price.
          example: 20.5
        category:
          type: string
          nullable: true
          description: Product category path or name.
          example: "Electronics > Gadgets"
        category_id:
          type: string
          nullable: true
          description: Retailer's specific category ID.
          example: "CAT123"
        subcategory:
          type: string
          nullable: true
          description: Product subcategory.
          example: "Gadgets"
        brand:
          type: string
          nullable: true
          description: The product brand name.
          example: "ExampleCo"
        manufacturer:
          type: string
          nullable: true
          description: The product manufacturer.
          example: "WidgetCorp"
        sold_by:
          type: string
          nullable: true
          description: The seller or vendor name for the product.
          example: "Example Retailer"
        stock_availability:
          type: string
          nullable: true
          description: Stock status indicator.
          example: "In Stock"
        in_stock:
          type: boolean
          nullable: true
          description: Boolean indicating if the product is currently in stock.
          example: true
        upc:
          type: string
          nullable: true
          description: Universal Product Code.
          example: "123456789012"
        ean:
          type: string
          nullable: true
          description: European Article Number.
          example: "1234567890123"
        gtin:
          type: string
          nullable: true
          description: Global Trade Item Number.
          example: "12345678901234"
        barcode:
          type: string
          nullable: true
          description: Barcode value when available.
          example: "123456789012"
        mpn:
          type: string
          nullable: true
          description: Manufacturer Part Number.
          example: "WIDGET-PRO-R"
        model:
          type: string
          nullable: true
          description: Product model name or number.
          example: "Pro-2024"
        condition:
          type: string
          nullable: true
          description: Product condition.
          example: "New"
        color:
          type: string
          nullable: true
          description: Product color.
          example: "Red"
        size:
          type: string
          nullable: true
          description: Product size.
          example: "Large"
        material:
          type: string
          nullable: true
          description: Product material.
          example: "Cotton"
        weight:
          type: number
          format: double
          nullable: true
          description: Product weight.
          example: 2.5
        rating:
          type: number
          format: double
          nullable: true
          description: Average product rating.
          example: 4.2
        review_count:
          type: integer
          nullable: true
          description: Number of customer reviews.
          example: 156
        shipping_cost:
          type: number
          format: double
          nullable: true
          description: Shipping cost for the product.
          example: 7.99
        created_at:
          type: string
          format: date-time
          description: Timestamp when the record was created in the Linkscopic system.
          example: "2024-04-15T10:30:00Z"
        updated_at:
          type: string
          format: date-time
          description: Timestamp when the record was last updated in the Linkscopic system.
          example: "2024-04-20T15:00:00Z"
        indexed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the product was last indexed into the search system.
          example: "2024-04-20T15:05:00Z"
        price_last_changed_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when the product price last changed.
          example: "2024-04-20T15:05:00Z"
      required:
        - id
        - unique_merchant_sku
        - product_name
        - created_at
        - updated_at

    AmazonReviews:
      type: object
      properties:
        count:
          type: integer
          nullable: true
          example: 4187
        stars:
          type: number
          format: double
          nullable: true
          example: 4.4

    AmazonFeeBreakdown:
      type: object
      properties:
        closing_fee:
          type: number
          format: double
          nullable: true
          example: 0.0
        fulfillment_fee:
          type: number
          format: double
          nullable: true
          example: 5.22
        referral_fee:
          type: number
          format: double
          nullable: true
          example: 4.12
        storage_fee:
          type: number
          format: double
          nullable: true
          example: 0.18
        total_per_unit:
          type: number
          format: double
          nullable: true
          example: 9.52

    AmazonFeeInputs:
      type: object
      properties:
        actual_weight_lbs:
          type: number
          format: double
          nullable: true
          example: 1.4
        dimensional_weight_lbs:
          type: number
          format: double
          nullable: true
          example: 1.8
        package_weight_lbs:
          type: number
          format: double
          nullable: true
          example: 1.5
        shipping_weight_lbs:
          type: number
          format: double
          nullable: true
          example: 1.8
        package_length_in:
          type: number
          format: double
          nullable: true
          example: 11.2
        package_width_in:
          type: number
          format: double
          nullable: true
          example: 8.4
        package_height_in:
          type: number
          format: double
          nullable: true
          example: 3.5
        category:
          type: string
          nullable: true
          example: "Electronics"
        program:
          type: string
          nullable: true
          example: "fba"
        size_tier:
          type: string
          nullable: true
          example: "Large Standard-Size"

    AmazonMarketplace:
      type: object
      properties:
        average30:
          type: number
          format: double
          nullable: true
          example: 28.12
        average90:
          type: number
          format: double
          nullable: true
          example: 29.03
        average180:
          type: number
          format: double
          nullable: true
          example: 30.44
        lowest_price:
          type: number
          format: double
          nullable: true
          example: 24.99
        highest_price:
          type: number
          format: double
          nullable: true
          example: 34.99
        offer_count:
          type: integer
          nullable: true
          example: 17
        estimated_sales:
          type: integer
          nullable: true
          example: 860
        sales_rank:
          type: integer
          nullable: true
          example: 2481
        score:
          type: number
          format: double
          nullable: true
          example: 82.4
        buy_box_is_amazon:
          type: boolean
          nullable: true
          example: false
        sold_by_amazon:
          type: boolean
          nullable: true
          example: false
        in_stock:
          type: boolean
          nullable: true
          example: true
        last_seen_at:
          type: string
          format: date-time
          nullable: true
          example: "2024-04-20T15:00:00Z"
        brand:
          type: string
          nullable: true
          example: "Nike"
        category:
          type: string
          nullable: true
          example: "Clothing"
        color:
          type: string
          nullable: true
          example: "White/Black"
        size:
          type: string
          nullable: true
          example: "Large"
        package_quantity:
          type: integer
          nullable: true
          example: 6
        title:
          type: string
          nullable: true
          example: "Nike Everyday Cushion Crew Socks"
        variation_parent_asin:
          type: string
          nullable: true
          example: "B0PARENT1234"
        variation_title:
          type: string
          nullable: true
          example: "Large / White-Black"

    ProfitabilityAdjustments:
      type: object
      properties:
        shipping_cost:
          type: number
          format: double
          nullable: true
          example: 1.75
        fixed_additional_cost:
          type: number
          format: double
          nullable: true
          example: 0.5
        percent_additional_cost:
          type: number
          format: double
          nullable: true
          example: 3.0

    Profitability:
      type: object
      properties:
        status:
          type: string
          nullable: true
          example: "profitable"
        amazon_price:
          type: number
          format: double
          nullable: true
          example: 27.49
        retailer_cost:
          type: number
          format: double
          nullable: true
          example: 13.99
        profit_per_unit:
          type: number
          format: double
          nullable: true
          example: 4.23
        margin:
          type: number
          format: double
          nullable: true
          example: 15.39
        roi:
          type: number
          format: double
          nullable: true
          example: 30.24
        adjustments:
          allOf:
            - $ref: "#/components/schemas/ProfitabilityAdjustments"
          nullable: true

    ProductDimensions:
      type: object
      description: Physical package dimensions in inches.
      properties:
        length_in:
          type: number
          format: double
          nullable: true
          example: 12.3
        width_in:
          type: number
          format: double
          nullable: true
          example: 8.4
        height_in:
          type: number
          format: double
          nullable: true
          example: 3.5

    PriceWindow:
      type: object
      description: |
        Lifetime + last-N-day averages for a single price metric, sampled
        daily by the price-history pipeline. Each window is the arithmetic
        mean of weekly samples that fall within the window relative to `as_of`.
        Fields are null when no samples cover the window (e.g., on day 1 the
        365-day field is unpopulated for a freshly-seen ASIN).
      properties:
        lifetime:
          type: number
          format: double
          nullable: true
          example: 48.20
        last_30_days:
          type: number
          format: double
          nullable: true
          example: 49.10
        last_90_days:
          type: number
          format: double
          nullable: true
          example: 48.50
        last_180_days:
          type: number
          format: double
          nullable: true
          example: 47.90
        last_365_days:
          type: number
          format: double
          nullable: true
          example: 48.20
        as_of:
          type: string
          format: date
          nullable: true
          description: Date of the most recent sample contributing to these averages.
          example: "2026-05-28"

    MonthlySoldBlock:
      type: object
      description: |
        Estimated-monthly-sold sub-block on `price_averages`. Carries the
        current value, a percent delta against the 90-day rolling average,
        and standard windowed means.
      properties:
        current:
          type: integer
          nullable: true
          description: Most recent monthly-sold value at the time of sampling.
          example: 1500
        change_vs_90d_avg_pct:
          type: number
          format: double
          nullable: true
          description: |
            ((current - last_90_days_avg) / last_90_days_avg) * 100.
            Positive values indicate accelerating sales; negative values a slowdown.
            Null when the 90-day average is unknown or zero.
          example: 12.5
        lifetime:
          type: number
          format: double
          nullable: true
          example: 1190.0
        last_30_days:
          type: number
          format: double
          nullable: true
          example: 1420.0
        last_90_days:
          type: number
          format: double
          nullable: true
          example: 1335.0
        last_180_days:
          type: number
          format: double
          nullable: true
          example: 1280.0
        last_365_days:
          type: number
          format: double
          nullable: true
          example: 1190.0
        as_of:
          type: string
          format: date
          nullable: true
          example: "2026-05-28"

    PriceHistoryPoint:
      type: object
      description: |
        One weekly observation in a price-history time series. Any
        metric field may be null when the underlying source had no
        observation that week. Amazon-side fields are Amazon retail
        prices, third-party offer prices, the buy-box landed price,
        manufacturer list price, plus sales rank (BSR), offer counts,
        rating (0–5 stars), review count, and estimated monthly sold.
      properties:
        ts:
          type: string
          format: date-time
          example: "2026-05-22T00:00:00Z"
        amz_retail:
          type: number
          format: double
          nullable: true
          description: Amazon-as-seller retail price (USD).
          example: 49.99
        amz_3p_new:
          type: number
          format: double
          nullable: true
          description: Lowest 3P-New offer including shipping (USD).
          example: 47.50
        amz_buy_box:
          type: number
          format: double
          nullable: true
          description: Buy Box landed price (price + shipping, USD).
          example: 49.99
        amz_list_price:
          type: number
          format: double
          nullable: true
          description: Manufacturer suggested list price (USD).
          example: 59.99
        sales_rank:
          type: integer
          nullable: true
          description: Amazon best-sellers rank (BSR). Lower is better.
          example: 12543
        offer_count_new:
          type: integer
          nullable: true
          description: Number of New-condition offers active on the listing.
          example: 8
        offer_count_used:
          type: integer
          nullable: true
          description: Number of Used-condition offers active on the listing.
          example: 2
        rating:
          type: number
          format: double
          nullable: true
          description: Average customer rating, 0–5 stars (one decimal).
          example: 4.6
        review_count:
          type: integer
          nullable: true
          description: Total Amazon customer review count at sample time.
          example: 2412
        monthly_sold:
          type: integer
          nullable: true
          description: Estimated monthly units sold at sample time.
          example: 1500
        walmart_price:
          type: number
          format: double
          nullable: true
          description: Walmart current price (USD) on the sample date.
          example: 41.47

    PriceHistorySeries:
      type: object
      description: |
        Chart-ready price-history response. `series` is sorted ascending by `ts`;
        weeks with no samples are omitted. `weeks_returned` may be less than
        `weeks_requested` when the data simply hasn't accumulated yet.
      properties:
        retailer_id:
          type: string
          example: walmart
        product_id:
          type: string
          example: "100000867"
        upc:
          type: string
          nullable: true
          example: "886774612614"
        asin:
          type: string
          nullable: true
          description: Resolved Amazon ASIN when the product's UPC has a mapping; otherwise null.
          example: "B0XYZ123"
        weeks_requested:
          type: integer
          example: 52
        weeks_returned:
          type: integer
          example: 47
        series:
          type: array
          items:
            $ref: "#/components/schemas/PriceHistoryPoint"

    PriceAverages:
      type: object
      description: |
        Pre-computed history averages produced by the price-history
        sampler, attached to the underlying mapping/products doc. Each
        sub-block carries lifetime + last-30/90/180/365-day windowed
        means. Fields are null when the underlying retailer doesn't
        carry that metric (e.g., a Walmart-only doc will have
        `walmart_price` populated and all `amz_*` fields null). The
        `PriceWindow` schema is reused as a generic numeric window;
        not all fields are prices.
      properties:
        amz_retail:
          allOf:
            - $ref: "#/components/schemas/PriceWindow"
          nullable: true
          description: Amazon-as-seller new lowest price averages (USD).
        amz_3p_new:
          allOf:
            - $ref: "#/components/schemas/PriceWindow"
          nullable: true
          description: Third-party merchant-fulfilled new lowest price averages (USD).
        amz_buy_box:
          allOf:
            - $ref: "#/components/schemas/PriceWindow"
          nullable: true
          description: Buy Box winner landed-price averages (USD).
        amz_list_price:
          allOf:
            - $ref: "#/components/schemas/PriceWindow"
          nullable: true
          description: Manufacturer suggested list-price averages (USD).
        sales_rank:
          allOf:
            - $ref: "#/components/schemas/PriceWindow"
          nullable: true
          description: |
            Amazon best-sellers rank (BSR) averages. Lower is better.
            Values are integer in source samples; averages may be fractional.
        offer_count_new:
          allOf:
            - $ref: "#/components/schemas/PriceWindow"
          nullable: true
          description: Average number of New-condition offers observed per sample.
        offer_count_used:
          allOf:
            - $ref: "#/components/schemas/PriceWindow"
          nullable: true
          description: Average number of Used-condition offers observed per sample.
        rating:
          allOf:
            - $ref: "#/components/schemas/PriceWindow"
          nullable: true
          description: Average customer rating (0–5 stars) over the windowed observations.
        review_count:
          allOf:
            - $ref: "#/components/schemas/PriceWindow"
          nullable: true
          description: |
            Average customer review count observed per sample. Note that
            review_count is monotonically nondecreasing, so the lifetime
            mean trails the most-recent observation.
        monthly_sold:
          allOf:
            - $ref: "#/components/schemas/MonthlySoldBlock"
          nullable: true
        walmart_price:
          allOf:
            - $ref: "#/components/schemas/PriceWindow"
          nullable: true
          description: Walmart current-price averages (USD).

