            minimum: 1
            maximum: 10000
        - name: after
          in: query
          required: false
          description: |
            **Cursor-based pagination parameter** for fetching the next page of results.

            ## How to Use:
            1. **First Request**: Omit this parameter to get the first page
            2. **Subsequent Requests**: Use the `next_cursor` value from the previous response
            3. **Last Page**: When `next_cursor` is `null`, you've reached the end

            ## Cursor Format:
            - Base64-encoded string containing sort values for efficient pagination
            - Uses Elasticsearch `search_after` for consistent results
            - Format: `[sort_value_1, sort_value_2, ...]` (price, id, etc.)

            ## Example Pagination Flow:
            ```
            # Step 1: First page
            GET /retailers/walmart/products?limit=10&sort_by=price_asc
            # Returns: next_cursor = "WzE5Ljk5LDEyMzQ1Nl0="

            # Step 2: Second page
            GET /retailers/walmart/products?limit=10&sort_by=price_asc&after=WzE5Ljk5LDEyMzQ1Nl0=
            # Returns: next_cursor = "WzI5Ljk5LDc4OTEyM10="

            # Step 3: Continue until next_cursor is null
            ```
          schema:
            type: string
          examples:
            first_page:
              summary: First page (omit cursor)
              description: "Start pagination by omitting the after parameter"
            price_sort_cursor:
              summary: Price-sorted pagination cursor
              value: "WzE5Ljk5LDEyMzQ1Nl0="
              description: "Base64 of [19.99, 123456] - price and product ID"
            default_sort_cursor:
              summary: Default sort pagination cursor
              value: "WzAuOTUsIDI5Ljk5LCA3ODkxMjNd"
              description: "Base64 of [0.95, 29.99, 789123] - score, price, and ID"
        - name: sort_by
          in: query
          required: false
          description: >
            Sorting order for the results. When not specified, results are returned in the database's physical order
            for optimal performance.

            When specified, must be one of the allowed values:
            - `price_asc`: Sort by price, lowest first
            - `price_desc`: Sort by price, highest first
            - `discount_asc`: Sort by discount percentage, lowest first
            - `discount_desc`: Sort by discount percentage, highest first (best deals first)
            - `top_seller_rank_asc`: Sort by Amazon sales rank, best rank first
            - `updated_at_asc/desc`: Sort by last update time
            - `created_at_asc/desc`: Sort by creation time

            Note that using explicit sorting may impact query performance on large datasets.
          schema:
            type: string
            enum:
              - "price_asc"
              - "price_desc"
              - "discount_asc"
              - "discount_desc"
              - "top_seller_rank_asc"
              - "updated_at_asc"
              - "updated_at_desc"
              - "created_at_asc"
              - "created_at_desc"
