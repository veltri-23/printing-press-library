  /amazon/asins/{asin}/price-history:
    get:
      tags:
        - Retailers
      summary: Get Weekly Amazon Price History by ASIN
      description: |
        Returns chart-ready weekly Amazon-side time-series data for a
        specific ASIN — direct access to amazon_price_history without
        going through a retailer's product_id. Useful when the consumer
        already knows the ASIN (e.g., charting the historical-backfill
        data without a Walmart UPC mapping in the path).

        The returned series carries Amazon retail / 3P-new / Buy Box
        prices plus monthly_sold per week, sorted ascending by `ts`.
        Weeks with no observed samples are omitted.

        For Walmart-side or merged history, use
        `/v1/retailers/walmart/products/{product_id}/price-history` instead.
      operationId: getAmazonPriceHistory
      security:
        - ApiKeyAuth: []
      parameters:
        - name: asin
          in: path
          required: true
          description: Amazon Standard Identification Number (e.g., "B082H4RKQQ").
          schema:
            type: string
          example: "B082H4RKQQ"
        - name: weeks
          in: query
          required: false
          description: Number of weeks of history to return (1..104). Defaults to 52.
          schema:
            type: integer
            minimum: 1
            maximum: 104
            default: 52
      responses:
        "200":
          description: Weekly Amazon time-series, sorted ascending by ts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceHistorySeries"
        "400":
          description: Invalid weeks parameter or missing asin.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: ASIN not found in price-history index.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /retailers/{retailer_id}/products/{product_id}/price-history:
    get:
      tags:
        - Retailers
      summary: Get Weekly Price History for a Product
      description: |
        Returns chart-ready weekly time-series data for a product, sourced from
        the daily price-history sampler + the one-time historical backfill. When the
        product's UPC maps to a resolved Amazon ASIN, Amazon retail / 3P-new /
        Buy-Box / monthly-sold series are merged on weekly timestamps alongside
        Walmart's own price series. Weeks with no observed samples are omitted.

        Use the rolled-up averages on the `Product.price_averages` block when
        you just need the lifetime / 30 / 90 / 180 / 365-day means. Use this
        endpoint when you actually want to plot a chart.
      operationId: getProductPriceHistory
      security:
        - ApiKeyAuth: []
      parameters:
        - name: retailer_id
          in: path
          required: true
          description: Retailer ID. Use the `/retailers` endpoint for the full list.
          schema:
            type: string
          example: walmart
        - name: product_id
          in: path
          required: true
          description: Retailer-native product identifier (Walmart product_id, Home Depot SKU, etc.).
          schema:
            type: string
          example: "100000867"
        - name: weeks
          in: query
          required: false
          description: Number of weeks of history to return (1..104). Defaults to 52.
          schema:
            type: integer
            minimum: 1
            maximum: 104
            default: 52
          example: 52
      responses:
        "200":
          description: Weekly time-series, sorted ascending by ts.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceHistorySeries"
        "400":
          description: Invalid weeks parameter or missing product_id.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Product not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /retailers/{retailer_id}/categories:
    get:
      tags:
        - Retailers
      summary: List Retailer Categories
      description: |
        Retrieves a list of distinct product categories for a specific retailer.
        Categories are hierarchical with ">" separators and are retailer-specific.

        ## Common Use Cases

        **Category Discovery:**
        ```
        GET /retailers/walmart/categories
        # Get all Walmart categories for filtering

        GET /retailers/homedepot/categories
        # Get all Home Depot categories for navigation
        ```

        **Integration Patterns:**
        - Product filtering: Use categories as filter options
        - Navigation menus: Build hierarchical category trees
        - Analytics: Category-based reporting
        - Search refinement: Narrow search results by category

        **Category Structure Examples:**
        - "Clothing>Fashion Brands>Nike>Nike Mens>Nike Mens Clothing"
        - "Electronics>Computers & Tablets>Laptops>Gaming Laptops"
        - "Home & Garden>Kitchen & Dining>Small Kitchen Appliances"

        **Performance:** Categories are cached and typically return in under 25ms.
      operationId: getRetailerCategories
      security:
        - ApiKeyAuth: []
      parameters:
        - name: retailer_id
          in: path
          required: true
          description: |
            The ID of the retailer. Use the `/retailers` endpoint for the full current list.
            Examples: walmart, homedepot, target, nike, kohls, macys, nordstrom, sephora, chewy, uniqlo, carhartt, hugo_boss, alo_yoga, ariat, warby_parker, and more.
          schema:
            type: string
          examples:
            walmart:
              summary: Walmart categories
              value: "walmart"
              description: "Get Walmart's product category hierarchy"
            homedepot:
              summary: Home Depot categories
              value: "homedepot"
              description: "Get Home Depot's product category structure"
            target:
              summary: Target categories
              value: "target"
              description: "Get Target's product category structure"
      responses:
        "200":
          description: A list of category names.
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string
                example: ["Electronics", "Clothing", "Home Goods"]
              examples:
                walmart_categories:
                  summary: Walmart Category Sample
                  description: Sample of Walmart's hierarchical category structure
                  value:
                    - "Clothing>Fashion Brands>Nike"
                    - "Clothing>Fashion Brands>Nike>Nike Mens"
                    - "Clothing>Fashion Brands>Nike>Nike Mens>Nike Mens Clothing"
                    - "Clothing>Fashion Brands>Nike>Nike Mens>Nike Mens Clothing>Nike Mens Socks"
                    - "Electronics>Computers & Tablets"
                    - "Electronics>Computers & Tablets>Laptops"
                    - "Electronics>Computers & Tablets>Laptops>Gaming Laptops"
