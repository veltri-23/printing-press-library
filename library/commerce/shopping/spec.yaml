  /retailers/{retailer_id}/shopping/products:
    get:
      tags:
        - Retailers
      summary: Search Shopping Products by Retailer
      description: |
        Retrieves a paginated list of shopping products for a specific retailer.
        Shopping products use a shopping-safe response contract and only include
        products with a shopping destination URL, returned as `product_url`.

        This endpoint supports the same API-key authentication, rate limiting,
        usage tracking, and retailer authorization as retailer product endpoints.

        Unsupported shopping query parameters return `400 Bad Request`:
        - `asin`
        - `min_sales_rank`
        - `max_sales_rank`
        - `sort_by=top_seller_rank_asc`
      operationId: getRetailerShoppingProducts
      security:
        - ApiKeyAuth: []
      parameters:
        - name: retailer_id
          in: path
          required: true
          description: The ID of the retailer.
          schema:
            type: string
          example: "walmart"
        - name: search_query
          in: query
          required: false
          description: Text, SKU, UPC, EAN, GTIN, or MPN search query.
          schema:
            type: string
          example: "Nike socks"
        - name: lookup_type
          in: query
          required: false
          description: Optional lookup mode override. Omit `lookup_type` for auto-detection.
          schema:
            type: string
            enum: [gtin, text]
        - name: unique_merchant_sku
          in: query
          required: false
          description: Filter by retailer SKU.
          schema:
            type: string
        - name: upc
          in: query
          required: false
          description: Filter by UPC barcode.
          schema:
            type: string
        - name: ean
          in: query
          required: false
          description: Filter by EAN barcode.
          schema:
            type: string
        - name: gtin
          in: query
          required: false
          description: Filter by GTIN barcode.
          schema:
            type: string
        - name: mpn
          in: query
          required: false
          description: Filter by Manufacturer Part Number.
          schema:
            type: string
        - name: min_price
          in: query
          required: false
          description: Minimum current price.
          schema:
            type: number
            format: double
        - name: max_price
          in: query
          required: false
          description: Maximum current price.
          schema:
            type: number
            format: double
        - name: brand
          in: query
          required: false
          description: Filter by brand.
          schema:
            type: string
        - name: category
          in: query
          required: false
          description: Filter by category.
          schema:
            type: string
        - name: in_stock
          in: query
          required: false
          description: Filter by stock status.
          schema:
            type: boolean
        - name: sort_by
          in: query
          required: false
          description: Sort order. `top_seller_rank_asc` is not supported by shopping endpoints.
          schema:
            type: string
            enum:
              - "relevance"
              - "price_asc"
              - "price_desc"
              - "discount_desc"
              - "discount_asc"
              - "created_at_desc"
              - "updated_at_desc"
        - name: limit
          in: query
          required: false
          description: Maximum number of products to return.
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 25
        - name: after
          in: query
          required: false
          description: Cursor for the next page of results.
          schema:
            type: string
      responses:
        "200":
          description: A list of shopping products with pagination information.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShoppingProductListResponse"
        "400":
          description: Bad Request (Invalid or unsupported query parameter).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                unsupported_shopping_parameter:
                  summary: Unsupported Shopping Parameter
                  value:
                    error: "asin is not supported for shopping products"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"

