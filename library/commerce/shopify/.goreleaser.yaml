version: 2
project_name: shopify-pp-cli
changelog:
  disable: true
builds:
  - id: shopify-pp-cli
    main: ./cmd/shopify-pp-cli
    binary: shopify-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/commerce/shopify/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: shopify-pp-mcp
    main: ./cmd/shopify-pp-mcp
    binary: shopify-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: shopify-pp-cli
    repository:
      owner: benjamin-huang
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Operate a Shopify store with Admin GraphQL commands, local sync, analytics, bulk exports, and ShopifyQL reporting."
    install: |
      bin.install "shopify-pp-cli"
      bin.install "shopify-pp-mcp"
