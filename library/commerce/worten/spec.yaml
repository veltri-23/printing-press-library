openapi: 3.0.3
info:
  title: Worten Reverse-Engineered Retail API
  version: 0.1.0
  description: |
    Local OpenAPI seed extracted from the working housebuy Worten CLI.
    This does not claim to describe the full Worten platform.
    It only captures the load-bearing endpoints currently used by the housebuy operator.
servers:
  - url: https://www.worten.pt
paths:
  /worten-api/search-suggestions:
    get:
      operationId: getSearchSuggestions
      summary: Fetch search suggestions for a text query.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
        - in: query
          name: max
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Suggestion payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntypedObject"
  /worten-api/products/details:
    get:
      operationId: getProductDetails
      summary: Fetch product details by Worten product identifier.
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: ref
          required: true
          schema:
            type: string
            enum: [product_id]
      responses:
        "200":
          description: Product details payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntypedObject"
  /worten-api/products/technical-specifications:
    get:
      operationId: getTechnicalSpecifications
      summary: Fetch technical specifications for a Worten product.
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
        - in: query
          name: ref
          required: true
          schema:
            type: string
            enum: [product_id]
      responses:
        "200":
          description: Product technical specifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntypedObject"
  /worten-api/search-products:
    post:
      operationId: searchProducts
      summary: Search Worten products by query and context.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [params, contexts]
              properties:
                params:
                  type: object
                  required: [query, page]
                  properties:
                    query:
                      type: string
                    page:
                      type: integer
                contexts:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Search results payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntypedObject"
  /worten-api/offers/get-offer-stock:
    get:
      operationId: getOfferStock
      summary: Fetch nearby store pickup stock for an offer.
      parameters:
        - in: query
          name: offerId
          required: true
          schema:
            type: string
        - in: query
          name: searchQuery
          required: true
          schema:
            type: string
        - in: query
          name: radius
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Offer stock payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UntypedObject"
components:
  schemas:
    UntypedObject:
      type: object
      additionalProperties: true