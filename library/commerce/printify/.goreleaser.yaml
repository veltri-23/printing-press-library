version: 2
project_name: printify-pp-cli
changelog:
  disable: true
builds:
  - id: printify-pp-cli
    main: ./cmd/printify-pp-cli
    binary: printify-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/commerce/printify/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: printify-pp-mcp
    main: ./cmd/printify-pp-mcp
    binary: printify-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: printify-pp-cli
    repository:
      owner: horknfbr
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Create and audit Printify products with manifest-driven image uploads, personalization checks, and local proofing."
    install: |
      bin.install "printify-pp-cli"
      bin.install "printify-pp-mcp"
