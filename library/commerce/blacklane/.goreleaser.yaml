version: 2
project_name: blacklane-pp-cli
changelog:
  disable: true
builds:
  - id: blacklane-pp-cli
    main: ./cmd/blacklane-pp-cli
    binary: blacklane-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/commerce/blacklane/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: blacklane-pp-mcp
    main: ./cmd/blacklane-pp-mcp
    binary: blacklane-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: blacklane-pp-cli
    repository:
      owner: omarshahine
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Upfront chauffeur quotes from the terminal — transfer and hourly, with a local price history no other tool has."
    install: |
      bin.install "blacklane-pp-cli"
      bin.install "blacklane-pp-mcp"
