[[schemas]]
kind = "sp-campaign-daily"
display_name = "Sponsored Products Campaign Daily"
ad_product = "sponsored_products"
entity_level = "campaign"
time_unit = "daily"
attribution_window = "account_default"
provenance = ["console_export", "ads_api_report"]
required_columns = ["date", "campaignId", "campaignName", "impressions", "clicks", "cost", "sales", "orders"]
apply_capable_columns = ["campaignId"]
sample_header = "date,campaignId,campaignName,impressions,clicks,cost,sales,orders,acos,dailyBudget"
export_path = "Campaign Manager -> Reports -> Sponsored Products -> Campaign -> Daily"
units.cost = "currency"
units.sales = "currency"
units.acos = "percent_or_ratio"

[schemas.column_aliases]
date = ["date", "start date", "startDate", "report date", "reportDate"]
campaignId = ["campaignId", "campaign id", "campaign_id"]
campaignName = ["campaignName", "campaign name", "campaign", "campaign_name"]
impressions = ["impressions"]
clicks = ["clicks"]
cost = ["cost", "spend"]
sales = ["sales", "sales7d", "14 day total sales", "total sales"]
orders = ["orders", "orders7d", "purchases", "purchases7d", "conversions"]
acos = ["acos", "advertising cost of sales"]
dailyBudget = ["dailyBudget", "daily budget", "budget"]

