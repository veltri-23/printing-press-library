[[recipes]]
command = "campaign-comparison"
accepted_kinds = ["sp-campaign-daily", "sp-campaign-summary"]
description = "Compare Sponsored Products campaign spend, sales, orders, and ACOS."

[[recipes]]
command = "portfolio-dashboard"
accepted_kinds = ["sp-campaign-daily", "sp-campaign-summary", "sp-advertised-product"]
description = "Summarize Sponsored Products portfolio spend, sales, orders, ACOS, CPC, CTR, and CVR."

[[recipes]]
command = "product-ad-profitability"
accepted_kinds = ["sp-advertised-product"]
description = "Join Sponsored Products advertised product spend and revenue to COGS."

[[recipes]]
command = "acos-vs-tacos"
accepted_kinds = ["sp-advertised-product", "sp-campaign-daily", "sp-campaign-summary"]
description = "Compare ad spend with attributed ad sales and seller-store total sales for TACOS by ASIN when available."

[[recipes]]
command = "search-term-mining"
accepted_kinds = ["sp-search-term"]
description = "Find Sponsored Products search terms to promote or negate."

[[recipes]]
command = "wasted-spend"
accepted_kinds = ["sp-search-term"]
description = "Find Sponsored Products search terms with spend and no orders."

[[recipes]]
command = "negative-keyword-generator"
accepted_kinds = ["sp-search-term"]
description = "Generate negative keyword candidates from Sponsored Products search terms."

[[recipes]]
command = "bid-optimizer"
accepted_kinds = ["sp-keyword"]
description = "Recommend Sponsored Products keyword bids from target ACOS and observed CVR/AOV."

[[recipes]]
command = "weekly-review"
accepted_kinds = ["sp-campaign-daily", "sp-campaign-summary", "sp-search-term", "sp-keyword"]
description = "Plan a Sponsored Products weekly review from campaign, search-term, and keyword reports."
