name: doordash
description: DoorDash GraphQL operation spec curated from sniffed traffic and ashah360/doordash-mcp query files.
  This skeleton is intentionally low-level; later phases add safe domain commands and session transport.
version: 0.2.0
base_url: https://www.doordash.com
spec_source: sniffed/browser-sniffed + curated source query map
auth:
  type: cookie
  header: Cookie
  format: DoorDash web session cookies plus x-csrftoken header
  env_vars: []
config:
  format: toml
  path: ~/.config/doordash-pp-cli/config.toml
resources:
  graphql:
    description: DoorDash web GraphQL operations. All operations POST JSON to /graphql/<operation>?operation=<operation>;
      mutations must be wrapped by guarded domain commands before live use.
    endpoints:
      create_autocompleteFacetFeed:
        method: POST
        path: /graphql/autocompleteFacetFeed
        description: Search DoorDash autocomplete/store facets by free-text query.
        params:
        - name: operation
          type: string
          required: false
          positional: false
          default: autocompleteFacetFeed
          description: DoorDash GraphQL operation query parameter; defaults to operationName.
          fields: []
        body:
        - name: operationName
          type: string
          required: true
          positional: false
          default: autocompleteFacetFeed
          description: GraphQL operationName.
          fields: []
        - name: query
          type: string
          required: true
          positional: false
          default: queries/autocompleteFacetFeed.graphql
          description: GraphQL document from upstream queries/autocompleteFacetFeed.graphql.
          fields: []
        - name: variables
          type: object
          required: true
          positional: false
          default: null
          description: GraphQL variables object.
          fields:
          - name: query
            type: string
            required: true
            positional: false
            default: null
            description: 'GraphQL variable $query: String!'
            fields: []
      create_storepageFeed:
        method: POST
        path: /graphql/storepageFeed
        description: Fetch a store page/menu feed for a DoorDash store ID.
        params:
        - name: operation
          type: string
          required: false
          positional: false
          default: storepageFeed
          description: DoorDash GraphQL operation query parameter; defaults to operationName.
