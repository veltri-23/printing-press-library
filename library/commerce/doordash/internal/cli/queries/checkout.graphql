query checkout(
  $orderCartId: ID!
  $corporateIndividualOrdersEnabled: Boolean
  $includeCompanyPaymentInfo: Boolean!
  $deliveryOptionType: DeliveryOptionType
  $isCardPayment: Boolean
  $programId: String
  $isDashPassUpsellSelected: Boolean
  $routineReorderItemIds: [String]
  $selectedBudgetId: String
  $scheduledTime: String
  $supplementalPaymentDetailsList: [SupplementalPaymentDetails!]
  $includeRewardBalanceAvailable: Boolean!
  $deliveryOptionInfo: DeliveryOptionInfo
  $landingPageType: LandingPageType
  $shouldApplyCredits: Boolean
  $paymentMethodUuid: String
  $paymentMethodType: PaymentMethodType
) {
  orderCart(
    id: $orderCartId
    corporateIndividualOrdersEnabled: $corporateIndividualOrdersEnabled
    deliveryOptionType: $deliveryOptionType
    isCardPayment: $isCardPayment
    programId: $programId
    isDashPassUpsellSelected: $isDashPassUpsellSelected
    routineReorderItemIds: $routineReorderItemIds
    selectedBudgetId: $selectedBudgetId
    scheduledTime: $scheduledTime
    supplementalPaymentDetailsList: $supplementalPaymentDetailsList
    includeRewardBalanceAvailable: $includeRewardBalanceAvailable
    deliveryOptionInfo: $deliveryOptionInfo
    landingPageType: $landingPageType
    shouldApplyCredits: $shouldApplyCredits
    paymentMethodUuid: $paymentMethodUuid
    paymentMethodType: $paymentMethodType
  ) {
    ...CheckoutOrderCartFragment
    __typename
  }
}

