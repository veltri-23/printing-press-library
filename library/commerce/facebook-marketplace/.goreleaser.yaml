version: 2
project_name: facebook-marketplace-pp-cli
changelog:
  disable: true
builds:
  - id: facebook-marketplace-pp-cli
    main: ./cmd/facebook-marketplace-pp-cli
    binary: facebook-marketplace-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/commerce/facebook-market/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: facebook-marketplace-pp-mcp
    main: ./cmd/facebook-marketplace-pp-mcp
    binary: facebook-marketplace-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: facebook-marketplace-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Search, draft, publish, mirror, and monitor Facebook Marketplace listings with seller helpers and explicit write checkpoints."
    install: |
      bin.install "facebook-marketplace-pp-cli"
      bin.install "facebook-marketplace-pp-mcp"
