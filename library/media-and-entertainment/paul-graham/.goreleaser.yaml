version: 2
project_name: paul-graham-pp-cli
changelog:
  disable: true
builds:
  - id: paul-graham-pp-cli
    main: ./cmd/paul-graham-pp-cli
    binary: paul-graham-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X paul-graham-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: paul-graham-pp-mcp
    main: ./cmd/paul-graham-pp-mcp
    binary: paul-graham-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: paul-graham-pp-cli
    repository:
      owner: debgotwired
      name: homebrew-tap
    homepage: "https://github.com/debgotwired/paul-graham-pp-cli"
    description: "Static public essay index for paulgraham.com."
    install: |
      bin.install "paul-graham-pp-cli"
      bin.install "paul-graham-pp-mcp"
