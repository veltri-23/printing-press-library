version: 2
project_name: substack-pp-cli
changelog:
  disable: true
builds:
  - id: substack-pp-cli
    main: ./cmd/substack-pp-cli
    binary: substack-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/substack/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: substack-pp-mcp
    main: ./cmd/substack-pp-mcp
    binary: substack-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: substack-pp-cli
    repository:
      owner: chirantan-rajhans
      name: homebrew-tap
    homepage: "https://github.com/chirantan-rajhans/substack-pp-cli"
    description: "Run your Substack growth loop from the command line — publish, schedule, engage"
    install: |
      bin.install "substack-pp-cli"
      bin.install "substack-pp-mcp"
