version: 2
project_name: blu-ray-pp-cli
changelog:
  disable: true
builds:
  - id: blu-ray-pp-cli
    main: ./cmd/blu-ray-pp-cli
    binary: blu-ray-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/blu-ray/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: blu-ray-pp-mcp
    main: ./cmd/blu-ray-pp-mcp
    binary: blu-ray-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: blu-ray-pp-cli
    repository:
      owner: vinnyp
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The disc-collector's CLI for Blu-ray.com — offline catalog, live deals, and a price-drop watchlist with zero account required."
    install: |
      bin.install "blu-ray-pp-cli"
      bin.install "blu-ray-pp-mcp"
