version: 2
project_name: drudgereport-pp-cli
changelog:
  disable: true
builds:
  - id: drudgereport-pp-cli
    main: ./cmd/drudgereport-pp-cli
    binary: drudgereport-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/drudgereport/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: drudgereport-pp-mcp
    main: ./cmd/drudgereport-pp-mcp
    binary: drudgereport-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: drudgereport-pp-cli
    repository:
      owner: mvanhorn
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Drudge Report in your terminal, with the editorial signal (splash, red, slot, tenure) the live page broadcasts but..."
    install: |
      bin.install "drudgereport-pp-cli"
      bin.install "drudgereport-pp-mcp"
