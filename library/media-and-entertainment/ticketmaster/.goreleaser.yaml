version: 2
project_name: ticketmaster-pp-cli
changelog:
  disable: true
builds:
  - id: ticketmaster-pp-cli
    main: ./cmd/ticketmaster-pp-cli
    binary: ticketmaster-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/ticketmaster/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: ticketmaster-pp-mcp
    main: ./cmd/ticketmaster-pp-mcp
    binary: ticketmaster-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: ticketmaster-pp-cli
    repository:
      owner: omarshahine
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Discovery v2 endpoint plus offline search, multi-venue watchlists, residency dedup, and on-sale tracking no API call exposes."
    install: |
      bin.install "ticketmaster-pp-cli"
      bin.install "ticketmaster-pp-mcp"
