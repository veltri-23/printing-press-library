version: 2
project_name: suno-pp-cli
changelog:
  disable: true
builds:
  - id: suno-pp-cli
    main: ./cmd/suno-pp-cli
    binary: suno-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/suno/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: suno-pp-mcp
    main: ./cmd/suno-pp-mcp
    binary: suno-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: suno-pp-cli
    repository:
      owner: horknfbr
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The correct, offline-first Suno CLI — every feature the abandoned clients have, plus a local SQLite library"
    install: |
      bin.install "suno-pp-cli"
      bin.install "suno-pp-mcp"
