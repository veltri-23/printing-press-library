version: 2
project_name: dice-fm-pp-cli
changelog:
  disable: true
builds:
  - id: dice-fm-pp-cli
    main: ./cmd/dice-fm-pp-cli
    binary: dice-fm-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/dice-fm/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: dice-fm-pp-mcp
    main: ./cmd/dice-fm-pp-mcp
    binary: dice-fm-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: dice-fm-pp-cli
    repository:
      owner: vinny-pasceri
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every ticket, fan, and pound of revenue from your DICE events — queryable, exportable, and joinable across shows."
    install: |
      bin.install "dice-fm-pp-cli"
      bin.install "dice-fm-pp-mcp"
