version: 2
project_name: soccer-goat-pp-cli
changelog:
  disable: true
builds:
  - id: soccer-goat-pp-cli
    main: ./cmd/soccer-goat-pp-cli
    binary: soccer-goat-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/soccer-goat/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: soccer-goat-pp-mcp
    main: ./cmd/soccer-goat-pp-mcp
    binary: soccer-goat-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: soccer-goat-pp-cli
    repository:
      owner: mvanhorn
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Type any player or club and get market value, EA FC rating, potential, and stats in one report, joined across sources that live in separate walled silos."
    install: |
      bin.install "soccer-goat-pp-cli"
      bin.install "soccer-goat-pp-mcp"
