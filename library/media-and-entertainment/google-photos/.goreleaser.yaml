version: 2
project_name: google-photos-pp-cli
changelog:
  disable: true
builds:
  - id: google-photos-pp-cli
    main: ./cmd/google-photos-pp-cli
    binary: google-photos-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/media-and-entertainment/google-photos/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: google-photos-pp-mcp
    main: ./cmd/google-photos-pp-mcp
    binary: google-photos-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: google-photos-pp-cli
    repository:
      owner: user
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Manage Google Photos app-created albums and media, upload files, and handle Picker sessions from terminal-friendly commands."
    install: |
      bin.install "google-photos-pp-cli"
      bin.install "google-photos-pp-mcp"
