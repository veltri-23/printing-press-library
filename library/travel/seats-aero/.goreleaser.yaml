version: 2
project_name: seats-aero-pp-cli
changelog:
  disable: true
builds:
  - id: seats-aero-pp-cli
    main: ./cmd/seats-aero-pp-cli
    binary: seats-aero-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X seats-aero-pp-cli/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: seats-aero-pp-mcp
    main: ./cmd/seats-aero-pp-mcp
    binary: seats-aero-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: seats-aero-pp-cli
    repository:
      owner: cathryn-lavery
      name: homebrew-tap
    homepage: "https://github.com/cathryn-lavery/seats-aero-pp-cli"
    description: "Search Seats.aero award-flight availability, route coverage, mileage-program feeds, and trip details from the terminal."
    install: |
      bin.install "seats-aero-pp-cli"
      bin.install "seats-aero-pp-mcp"
