version: 2
project_name: roadside-america-pp-cli
changelog:
  disable: true
builds:
  - id: roadside-america-pp-cli
    main: ./cmd/roadside-america-pp-cli
    binary: roadside-america-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/travel/roadside-america/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: roadside-america-pp-mcp
    main: ./cmd/roadside-america-pp-mcp
    binary: roadside-america-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: roadside-america-pp-cli
    repository:
      owner: dbryson
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every offbeat roadside attraction on RoadsideAmerica."
    install: |
      bin.install "roadside-america-pp-cli"
      bin.install "roadside-america-pp-mcp"
