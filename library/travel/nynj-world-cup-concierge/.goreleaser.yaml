version: 2
project_name: nynj-world-cup-concierge-pp-cli
changelog:
  disable: true
builds:
  - id: nynj-world-cup-concierge-pp-cli
    main: ./cmd/nynj-world-cup-concierge-pp-cli
    binary: nynj-world-cup-concierge-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/travel/nynj-world-cup-concierge/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: nynj-world-cup-concierge-pp-cli
    repository:
      owner: horknfbr
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Extract public NYNJ World Cup Concierge Explore NYNJ, Fan Experiences, and Watch Parties guidance."
    install: |
      bin.install "nynj-world-cup-concierge-pp-cli"
