version: 2
project_name: tripadvisor-pp-cli
changelog:
  disable: true
builds:
  - id: tripadvisor-pp-cli
    main: ./cmd/tripadvisor-pp-cli
    binary: tripadvisor-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/travel/tripadvisor/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: tripadvisor-pp-mcp
    main: ./cmd/tripadvisor-pp-mcp
    binary: tripadvisor-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: tripadvisor-pp-cli
    repository:
      owner: dbryson
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Tripadvisor Content API endpoint"
    install: |
      bin.install "tripadvisor-pp-cli"
      bin.install "tripadvisor-pp-mcp"
