schema_version = 2
name = "tripadvisor-pp-cli"
display_name = "Tripadvisor"
description = "Every Tripadvisor Content API endpoint, plus a local store and ranked compare/best/drift commands no other Tripadvisor tool has."
project_kind = "cli"

[secrets.file]
path = "~/.config/tripadvisor-pp-cli/config.toml"

[sync]
default = false

[sync.keys]
TRIPADVISOR_API_KEY = true
