version: 2
project_name: hotelist-pp-cli
changelog:
  disable: true
builds:
  - id: hotelist-pp-cli
    main: ./cmd/hotelist-pp-cli
    binary: hotelist-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/travel/hotelist/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: hotelist-pp-mcp
    main: ./cmd/hotelist-pp-mcp
    binary: hotelist-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: hotelist-pp-cli
    repository:
      owner: dbryson
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Hotelist feature, plus a local SQLite mirror that ranks rating-per-dollar across whole countries"
    install: |
      bin.install "hotelist-pp-cli"
      bin.install "hotelist-pp-mcp"
