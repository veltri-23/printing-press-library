version: 2
project_name: bento-pp-cli
changelog:
  disable: true
builds:
  - id: bento-pp-cli
    main: ./cmd/bento-pp-cli
    binary: bento-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/marketing/bento/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: bento-pp-mcp
    main: ./cmd/bento-pp-mcp
    binary: bento-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: bento-pp-cli
    repository:
      owner: bossriceshark
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every Bento feature, plus the ones their own CLI does not have"
    install: |
      bin.install "bento-pp-cli"
      bin.install "bento-pp-mcp"
