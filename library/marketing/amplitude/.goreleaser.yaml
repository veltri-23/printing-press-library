version: 2
project_name: amplitude-pp-cli
changelog:
  disable: true
builds:
  - id: amplitude-pp-cli
    main: ./cmd/amplitude-pp-cli
    binary: amplitude-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/marketing/amplitude/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: amplitude-pp-mcp
    main: ./cmd/amplitude-pp-mcp
    binary: amplitude-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: amplitude-pp-cli
    repository:
      owner: debgotwired
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Read-first Amplitude Analytics API surface for exports, cohorts, events, users, and chart-style analytics queries."
    install: |
      bin.install "amplitude-pp-cli"
      bin.install "amplitude-pp-mcp"
