schema_version = 2
name = "amplitude-pp-cli"
display_name = "Amplitude Read"
description = "Read-first Amplitude Analytics API surface for exports, cohorts, events, users, and chart-style analytics queries."
project_kind = "cli"

[secrets.file]
path = "~/.config/amplitude-pp-cli/config.toml"

[sync]
default = false

[sync.keys]
AMPLITUDE_PASSWORD = true
AMPLITUDE_USERNAME = false
