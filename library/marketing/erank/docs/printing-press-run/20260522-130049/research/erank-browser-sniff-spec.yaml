name: erank
description: Discovered API spec for members-erank
version: 0.1.0
category: marketing
base_url: https://members.erank.com
spec_source: sniffed
http_transport: browser-chrome-h2
auth:
    type: composed
    header: X-XSRF-TOKEN
    format: "{XSRF-TOKEN}"
    env_vars:
        - ERANK_XSRF_TOKEN
    env_var_specs:
        - name: ERANK_XSRF_TOKEN
          kind: harvested
          required: true
          sensitive: true
          description: XSRF token captured from a logged-in eRank browser session.
    in: header
    cookie_domain: members.erank.com
    cookies:
        - er_sess_x
        - sid_er
        - XSRF-TOKEN
    requires_browser_session: true
    browser_session_reason: eRank member Keyword Tool endpoints require logged-in browser cookies and an XSRF header.
    browser_session_validation_path: /api/keyword-tool/stats?keyword=dad+mug&country=USA&marketplace=etsy
    browser_session_validation_method: GET
    login_url: https://members.erank.com/login
    login_complete_selector: a[href*="/settings"], a[href*="/dashboard"], [class*="user"], [class*="account"]
config:
    format: toml
    path: ~/.config/erank-pp-cli/config.toml
