version: 2
project_name: kdpnichefinder-pp-cli
changelog:
  disable: true
builds:
  - id: kdpnichefinder-pp-cli
    main: ./cmd/kdpnichefinder-pp-cli
    binary: kdpnichefinder-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/marketing/kdpnichefinder/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: kdpnichefinder-pp-mcp
    main: ./cmd/kdpnichefinder-pp-mcp
    binary: kdpnichefinder-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: kdpnichefinder-pp-cli
    repository:
      owner: vcolombo
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Every KDP Niche Finder bucket as a local research database — rank niches across buckets"
    install: |
      bin.install "kdpnichefinder-pp-cli"
      bin.install "kdpnichefinder-pp-mcp"
