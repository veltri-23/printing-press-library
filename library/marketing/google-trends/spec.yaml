name: google-trends
description: Unofficial Google Trends search-interest and trending-topic data (no official public API exists; this wraps the reverse-engineered explore/widget contract)
version: 0.1.0
base_url: https://trends.google.com
spec_source: sniffed
category: marketing
http_transport: browser-chrome
auth:
  type: cookie
  cookie_domain: .google.com
  cookies:
    - NID
config:
  format: toml
  path: ~/.config/google-trends-pp-cli/config.toml
# Cache freshness is intentionally NOT enabled: this API has no single
# syncable "trends" resource. Each Priority-1 command (trends interest,
# trends region, trends related, trends trending) is itself the population
# path for its own synthetic gt_* local-store resource type; there is no
# generic list/sync endpoint the cache.commands hook could refresh against.
# An earlier draft of this spec mapped all 7 novel commands to a generic
# "trends" resource, which caused every local-only read (trends stale,
# trends history search) to attempt a spurious live fetch first.
learn:
  disabled: true
# learn no-entities escape: keywords are arbitrary free-text search terms, not
# a fixed/enumerable entity vocabulary the way an internal business API's
# customer/product names would be — no aliasable entity set exists to seed.
resources:
  trends:
    description: >
      Core Google Trends explore/widget flow. explore and pickers_* are
      directly callable; widget_* endpoints require a token minted by a prior
      explore call (chained by hand-written wrapper commands in Priority 0/1
      — see the absorb manifest). All responses are prefixed with Google's
      XSSI defense string )]}', which must be stripped before JSON decoding.
    endpoints:
      explore:
        method: POST
        path: /trends/api/explore
        description: Requests per-widget tokens for a comparison of up to 5 keywords. Response's ['widgets'] array yields {id, token, request} for TIMESERIES, GEO_MAP, and RELATED_QUERIES/TOPICS widgets.
        params:
          - name: hl
            type: string
            required: true
            positional: false
            description: UI/response language, e.g. en-US
          - name: tz
            type: integer
            required: true
            positional: false
            description: Timezone offset in minutes (e.g. 420 for PDT)
        body:
          - name: req
            type: string
            required: true
            positional: false
            description: >
              JSON-encoded object: {"comparisonItem":[{"keyword":str,"geo":str,"time":str}, ...up to 5],"category":int,"property":str}.
              property is "" (web, default), "images", "news", "youtube", or "froogle".
        request_content_type: application/x-www-form-urlencoded
        response:
          type: object
          item: explore
      widget_multiline:
        method: GET
        path: /trends/api/widgetdata/multiline
        description: Interest-over-time data for the TIMESERIES widget. req and token must come from a prior explore call's matching widget entry.
        params:
          - name: hl
            type: string
            required: true
            positional: false
            description: UI/response language, e.g. en-US
          - name: tz
            type: integer
            required: true
            positional: false
            description: Timezone offset in minutes
          - name: req
            type: string
            required: true
            positional: false
            description: JSON-encoded widget.request object copied verbatim from the matching explore() widget entry
          - name: token
            type: string
            required: true
            positional: false
            description: Widget token copied verbatim from the matching explore() widget entry
        body: []
        response:
          type: object
          item: multiline
      widget_comparedgeo:
        method: GET
        path: /trends/api/widgetdata/comparedgeo
        description: Interest-by-region data for the GEO_MAP widget. req and token must come from a prior explore call's matching widget entry.
        params:
          - name: hl
            type: string
            required: true
            positional: false
            description: UI/response language, e.g. en-US
          - name: tz
            type: integer
            required: true
            positional: false
            description: Timezone offset in minutes
          - name: req
            type: string
            required: true
            positional: false
            description: JSON-encoded widget.request object copied verbatim from the matching explore() widget entry
          - name: token
            type: string
            required: true
            positional: false
            description: Widget token copied verbatim from the matching explore() widget entry
        body: []
        response:
          type: object
          item: comparedgeo
      widget_relatedsearches:
        method: GET
        path: /trends/api/widgetdata/relatedsearches
        description: Related queries and related topics (both top and rising) for the RELATED_QUERIES/RELATED_TOPICS widgets. req and token must come from a prior explore call's matching widget entry.
        params:
          - name: hl
            type: string
            required: true
            positional: false
            description: UI/response language, e.g. en-US
          - name: tz
            type: integer
            required: true
            positional: false
            description: Timezone offset in minutes
          - name: req
            type: string
            required: true
            positional: false
            description: JSON-encoded widget.request object copied verbatim from the matching explore() widget entry
          - name: token
            type: string
            required: true
            positional: false
            description: Widget token copied verbatim from the matching explore() widget entry
        body: []
        response:
          type: object
          item: relatedsearches
      pickers_category:
        method: GET
        path: /trends/api/explore/pickers/category
        description: Full category id-to-name lookup tree. Openly accessible, no clearance cookie required.
        no_auth: true
        params:
          - name: hl
            type: string
            required: true
            positional: false
            description: UI language, e.g. en-US
          - name: tz
            type: integer
            required: true
            positional: false
            description: Timezone offset in minutes
        body: []
        response:
          type: object
          item: category
      pickers_geo:
        method: GET
        path: /trends/api/explore/pickers/geo
        description: Full geo code-to-name lookup tree (country/region/DMA/city). Openly accessible, no clearance cookie required.
        no_auth: true
        params:
          - name: hl
            type: string
            required: true
            positional: false
            description: UI language, e.g. en-US
          - name: tz
            type: integer
            required: true
            positional: false
            description: Timezone offset in minutes
        body: []
        response:
          type: object
          item: geo
types: {}
