description = "Our REST API lets you access to resources and perform actions on behalf of a store."
project_kind = "cli"

[secrets.file]
path = "~/.config/judge-me-pp-cli/config.toml"

[sync]
default = false

[sync.keys]
JUDGE_ME_PRIVATE_APIKEY = true
