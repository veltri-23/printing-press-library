version: 2
project_name: google-ad-manager-pp-cli
changelog:
  disable: true
builds:
  - id: google-ad-manager-pp-cli
    main: ./cmd/google-ad-manager-pp-cli
    binary: google-ad-manager-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/marketing/google-ad-manager/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: google-ad-manager-pp-mcp
    main: ./cmd/google-ad-manager-pp-mcp
    binary: google-ad-manager-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: google-ad-manager-pp-cli
    repository:
      owner: stellato
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The only REST-native Google Ad Manager CLI: report, search, and manage publisher inventory from the terminal"
    install: |
      bin.install "google-ad-manager-pp-cli"
      bin.install "google-ad-manager-pp-mcp"
