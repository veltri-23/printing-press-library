version: 2
project_name: oura-pp-cli
changelog:
  disable: true
builds:
  - id: oura-pp-cli
    main: ./cmd/oura-pp-cli
    binary: oura-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/health/oura/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: oura-pp-mcp
    main: ./cmd/oura-pp-mcp
    binary: oura-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: oura-pp-cli
    repository:
      owner: coopdogggs
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "The Oura API allows Oura users and partner applications to improve their user experience with Oura data."
    install: |
      bin.install "oura-pp-cli"
      bin.install "oura-pp-mcp"
