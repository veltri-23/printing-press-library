version: 2
project_name: drug-enforcement-pp-cli
changelog:
  disable: true
builds:
  - id: drug-enforcement-pp-cli
    main: ./cmd/drug-enforcement-pp-cli
    binary: drug-enforcement-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/health/drug-enforcement/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: drug-enforcement-pp-mcp
    main: ./cmd/drug-enforcement-pp-mcp
    binary: drug-enforcement-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: drug-enforcement-pp-cli
    repository:
      owner: laci141
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Search FDA drug recall enforcement records — keyless, offline-cacheable, agent-native. Reports FDA facts only; never says a drug is safe."
    install: |
      bin.install "drug-enforcement-pp-cli"
      bin.install "drug-enforcement-pp-mcp"
