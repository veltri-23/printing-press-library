# agentcookie.toml: secrets-bus adoption manifest v2
# See docs/spec-agentcookie-secrets-bus-v2-adoption.md
schema_version = 2
name = "peloton-pp-cli"
display_name = "Peloton"
description = "Read-only Peloton workout, class, and structural-provider facts in a private local store."
project_kind = "cli"

[secrets.file]
path = "~/.config/peloton-pp-cli/config.toml"

[sync]
default = false

[sync.keys]
PELOTON_OAUTH_PASSWORD = true
PELOTON_OAUTH_USERNAME = true
