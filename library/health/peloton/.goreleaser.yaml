version: 2
project_name: peloton-pp-cli
changelog:
  disable: true
builds:
  - id: peloton-pp-cli
    main: ./cmd/peloton-pp-cli
    binary: peloton-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/health/peloton/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: peloton-pp-mcp
    main: ./cmd/peloton-pp-mcp
    binary: peloton-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: peloton-pp-cli
    repository:
      owner: itsmefelix-
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Read-only Peloton workout, class, and structural-provider facts in a private local store."
    install: |
      bin.install "peloton-pp-cli"
      bin.install "peloton-pp-mcp"
