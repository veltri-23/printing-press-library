version: 2
project_name: authentik-pp-cli
changelog:
  disable: true
builds:
  - id: authentik-pp-cli
    main: ./cmd/authentik-pp-cli
    binary: authentik-pp-cli
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X github.com/mvanhorn/printing-press-library/library/auth/authentik/internal/cli.version={{ .Version }}
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
  - id: authentik-pp-mcp
    main: ./cmd/authentik-pp-mcp
    binary: authentik-pp-mcp
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    targets:
      - darwin_amd64
      - darwin_arm64
      - linux_amd64
      - linux_arm64
      - windows_amd64
      - windows_arm64
archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
brews:
  - name: authentik-pp-cli
    repository:
      owner: carlf01
      name: homebrew-tap
    homepage: "https://github.com/mvanhorn/printing-press-library"
    description: "Agent-native admin CLI for authentik identity provider with offline SQLite cache and an MCP server for Claude Desktop."
    install: |
      bin.install "authentik-pp-cli"
      bin.install "authentik-pp-mcp"
